<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>东莞市巨人纺织有限公司 ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#1565C0;--pd:#0D47A1;--pl:#E3F2FD;--g:#2E7D32;--gl:#E8F5E9;--o:#E65100;--r:#C62828;--rl:#FFEBEE;--y:#F57F17;--yl:#FFFDE7;--bg:#F4F6FA;--w:#fff;--b3:#EEF2F7;--bd:#D0D9E8;--tx:#1A2332;--t2:#455A74;--t3:#8699AF;--f:"Noto Sans SC",sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--f);font-size:13px;display:flex;height:100vh;overflow:hidden}
#app{display:flex;flex:1;overflow:hidden}
#sb{width:200px;min-width:200px;background:var(--pd);display:flex;flex-direction:column;overflow-y:auto}
.la{padding:14px 14px 12px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:8px}
.la img{width:38px;height:38px;object-fit:contain;border-radius:4px;background:#fff;padding:2px}
.ln{color:#fff;font-size:12px;font-weight:700;line-height:1.3}
.ls{color:rgba(255,255,255,.45);font-size:10px}
.nl{color:rgba(255,255,255,.4);font-size:10px;padding:8px 14px 3px;letter-spacing:.7px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:8px 14px;cursor:pointer;color:rgba(255,255,255,.72);font-size:12px;transition:all .15s;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.on{background:rgba(255,255,255,.13);color:#fff;border-left-color:#90CAF9}
.nic{font-size:14px;width:17px;text-align:center}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topb{background:var(--w);border-bottom:1px solid var(--bd);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.topb h1{font-size:14px;font-weight:700}
.topb p{font-size:11px;color:var(--t3);margin-top:1px}
.pg{flex:1;overflow-y:auto;padding:18px}
.card{background:var(--w);border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.ch{padding:11px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--b3);border-radius:8px 8px 0 0}
.ct{font-size:13px;font-weight:700;color:var(--pd)}
.cb{padding:14px}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.st{background:var(--w);border:1px solid var(--bd);border-radius:8px;padding:13px 14px}
.sl{font-size:11px;color:var(--t3);margin-bottom:4px}
.sv{font-size:20px;font-weight:700}
.ss{font-size:10px;color:var(--t3);margin-top:3px}
.st.sb .sv{color:var(--p)}.st.sg .sv{color:var(--g)}.st.so .sv{color:var(--y)}.st.sr2 .sv{color:var(--r)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-family:var(--f);font-weight:500;transition:all .15s;white-space:nowrap}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pd)}
.bs{background:#fff;color:var(--t2);border:1px solid var(--bd)}.bs:hover{background:var(--b3)}
.bgn{background:var(--g);color:#fff}
.boo{background:var(--o);color:#fff}
.brd{background:var(--r);color:#fff}
.by{background:#D97706;color:#fff}.by:hover{background:#B45309}
.bq{background:transparent;color:var(--p);border:1px solid var(--p)}.bq:hover{background:var(--pl)}
.bsm{padding:3px 8px;font-size:11px}
.bg2{display:flex;gap:5px;flex-wrap:wrap}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--b3);text-align:left;padding:8px 10px;font-size:11px;color:var(--t2);font-weight:600;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bd);font-size:12px;vertical-align:middle}
tr:hover td{background:#F6F9FF}
tr:last-child td{border-bottom:none}
.tc{font-family:monospace;color:var(--p);font-size:12px;font-weight:700}
.bx{display:inline-flex;align-items:center;padding:2px 7px;border-radius:11px;font-size:10px;font-weight:600}
.bxb{background:var(--pl);color:var(--p)}.bxg{background:var(--gl);color:var(--g)}.bxo{background:#FFF3E0;color:var(--o)}.bxr{background:var(--rl);color:var(--r)}.bxk{background:#ECEFF1;color:#546E7A}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.fg2{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.ff{grid-column:1/-1}
.fv{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--t2);font-weight:600}
.rq{color:var(--r);margin-left:2px}
input,select,textarea{background:#fff;border:1px solid var(--bd);border-radius:5px;padding:7px 9px;color:var(--tx);font-size:12px;font-family:var(--f);outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 2px rgba(21,101,192,.1)}
input::placeholder{color:var(--t3)}
textarea{resize:vertical;min-height:60px}
.fro{background:var(--b3);color:var(--t3)}
.sh{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.4px;padding:10px 0 7px;border-bottom:2px solid var(--pl);margin-bottom:10px}
.ubtn{padding:7px 9px;background:var(--b3);border:1px solid var(--bd);border-radius:0 5px 5px 0;cursor:pointer;font-size:11px;color:var(--p);font-weight:600;border-left:none}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.mo{background:#fff;border-radius:10px;width:100%;max-width:860px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.mxl{max-width:1040px}
.mh{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mt{font-size:14px;font-weight:700;color:var(--pd)}
.mb2{padding:18px}
.mf{padding:11px 18px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.mc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);line-height:1;padding:0 4px}
.cbk{background:var(--b3);border:1px solid var(--bd);border-radius:6px;padding:11px;margin-bottom:7px}
.cbh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cbt{font-size:12px;font-weight:700;color:var(--p)}
.al{display:flex;gap:8px;padding:9px 12px;border-radius:6px;margin-bottom:10px;font-size:12px}
.alr{background:var(--rl);border:1px solid #EF9A9A;color:#B71C1C}
.aly{background:var(--yl);border:1px solid #FFF176;color:#7c5e00}
.alb{background:var(--pl);border:1px solid #BBDEFB;color:var(--pd)}
.dl{display:flex;padding:6px 0;border-bottom:1px solid var(--bd)}
.dl:last-child{border-bottom:none}
.dk{width:105px;min-width:105px;font-size:11px;color:var(--t3);font-weight:600}
.dv{flex:1;font-size:12px}
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sb2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.hidden{display:none!important}
.cr{color:var(--r)}.cg{color:var(--g)}.co{color:var(--y)}.cb2{color:var(--p)}.cd{color:var(--t3)}

input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
/* ── 登录页样式 ── */
#bg-canvas{position:fixed;inset:0;z-index:99998;pointer-events:none;width:100%;height:100%}
#login-overlay{position:fixed;inset:0;z-index:99999;background:rgba(13,71,161,0.6);display:flex;align-items:center;justify-content:center}
#login-box{background:rgba(255,255,255,0.96);border-radius:14px;padding:36px 40px;width:380px;box-shadow:0 12px 48px rgba(0,0,0,.25);backdrop-filter:blur(8px)}
#login-box h2{font-size:18px;font-weight:700;color:#1a2332;margin-bottom:4px;text-align:center}
#login-box p.sub{font-size:12px;color:#8699AF;margin-bottom:24px;text-align:center}
#login-box label{font-size:12px;font-weight:600;color:#455A74;display:block;margin-bottom:4px}
#login-box input[type=email],#login-box input[type=password]{width:100%;padding:10px 12px;border:1.5px solid #D0D9E8;border-radius:6px;font-size:13px;margin-bottom:16px;box-sizing:border-box;outline:none;transition:border .15s}
#login-box input:focus{border-color:#1565C0;box-shadow:0 0 0 3px rgba(21,101,192,.1)}
#login-box .btn-primary{width:100%;padding:10px;background:#1565C0;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
#login-box .btn-primary:hover{background:#0D47A1}
#login-box .btn-link{background:none;border:none;color:#1565C0;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
#login-box .btn-link:hover{color:#0D47A1}
#login-box .err{font-size:12px;color:#C62828;text-align:center;min-height:18px;margin-bottom:8px}
#login-box .s{font-size:12px;color:#2E7D32;text-align:center;min-height:18px}
#login-ver{font-size:9px;color:#B0BEC5;text-align:center;margin-top:16px}
/* ── 报价单专属大表格（方案A，覆盖全局th/td） ── */
.qt-wrap{overflow-x:auto;border-radius:8px;border:1px solid #d4d0f0}
.qt-wrap table{width:100%;border-collapse:collapse;table-layout:fixed}
.qt-wrap th{background:#eeecff;color:#3730a3;font-weight:600;font-size:11px;padding:7px 10px;border:1px solid #c7c4e8;text-align:left;white-space:nowrap;overflow:hidden}
.qt-wrap td{padding:6px 10px;border:1px solid #e0dff5;font-size:11.5px;vertical-align:middle;overflow:hidden;word-break:break-all}
.qt-wrap tr:hover td{background:#f5f5ff}
.qt-wrap td.qt-no{font-family:monospace;font-weight:700;color:var(--p);white-space:nowrap;width:132px}
.qt-wrap td.qt-cust{font-weight:600;width:148px}
.qt-wrap td.qt-contact{font-size:10.5px;color:var(--t3)}
.qt-wrap td.qt-itno{font-family:monospace;color:#999;width:72px}
.qt-wrap td.qt-fab{color:#1e3a8a;font-weight:600}
.qt-wrap td.qt-spec{color:#444;white-space:nowrap;width:100px}
.qt-wrap td.qt-moq{text-align:center;color:#555;width:52px}
.qt-wrap td.qt-price{color:#1e3a8a;font-weight:700;white-space:nowrap;width:84px}
.qt-wrap td.qt-comp{color:#7C3AED;font-size:10.5px}
.qt-wrap td.qt-ref{color:#059669;font-size:10.5px;white-space:nowrap;width:80px}
.qt-wrap td.qt-date{font-size:11px;white-space:nowrap;width:110px}
.qt-wrap td.qt-st{width:58px;text-align:center}
.qt-wrap td.qt-op{white-space:nowrap;width:148px}
.qt-wrap td.qt-exp-row{background:#fff8f8}
.qt-wrap tr:hover td.qt-exp-row{background:#ffefef}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<body>
<canvas id="bg-canvas"></canvas>
<!-- ── 登录覆盖层 ── -->
<div id="login-overlay">
  <div id="login-box">
    <img id="login-logo" style="width:64px;height:64px;object-fit:contain;margin:0 auto 8px;display:block;border-radius:8px" alt="巨人纺织">

    <p class="sub">东莞市巨人纺织有限公司</p>

// ── 登录页动态粒子背景（纺织丝线流光特效）──
(function(){
  var c=document.getElementById('bg-canvas');
  if(!c)return;
  var ctx=c.getContext('2d'),pts=[],W,H;
  function rs(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  window.addEventListener('resize',rs);rs();
  for(var i=0;i<60;i++)pts.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*2+0.8,h:200+Math.random()*40
  });
  function an(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      for(var j=i+1;j<pts.length;j++){
        var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){
          ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle='hsla('+pts[i].h+',65%,55%,'+(1-d/130)*0.2+')';
          ctx.lineWidth=0.5;ctx.stroke();
        }
      }
    }
    for(var i=0;i<pts.length;i++){
      var p=pts[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='hsla('+p.h+',75%,60%,0.55)';ctx.fill();
    }
    requestAnimationFrame(an);
  }
  an();
})();

// ═══ HELPERS ═══
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function tod(){return new Date().toISOString().slice(0,10);}
function fmt(v){return v||'—';}
function fmtM(n){return n?'¥'+(+n).toLocaleString('zh-CN',{minimumFractionDigits:2}):'—';}
function fmtN(n){return n?(+n).toLocaleString('zh-CN',{maximumFractionDigits:0}):'0';}
function esc(s){if(s===null||s===undefined)s='';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function normSearch(v){return String(v==null?'':v).replace(/[Ａ-Ｚａ-ｚ０-９]/g,function(ch){return String.fromCharCode(ch.charCodeAt(0)-0xFEE0);}).toLowerCase().replace(/[\s\-_\/.#]+/g,'').trim();}
function searchHit(hay,q){q=normSearch(q);return !q||normSearch(hay).includes(q);}
function sameCode(a,b){a=normSearch(a);b=normSearch(b);return !!a&&!!b&&a===b;}
function matCode(m){return String((m&&(m.mid||m.prodNo||m.prod_no||m.materialNo||m.material_no||m.code||m.no))||'');}
function matSearchText(m){
  var cs=Array.isArray(m&&m.comps)?m.comps.map(function(c){return (c.nm||'')+' '+(c.pct||'');}).join(' '):((m&&m.comp)||(m&&m.comps)||'');
  return [matCode(m),(m&&m.fab),(m&&m.alias),(m&&m.origCo),(m&&m.orig_co),(m&&m.origNo),(m&&m.orig_no),(m&&m.contact),(m&&m.weaver),(m&&m.dyer),cs].join(' ');
}
function matMatches(m,q){return searchHit(matSearchText(m),q);}
function mergeMatResults(local,remote,q){
  var seen={},out=[];
  function add(m){
    if(!m||!matMatches(m,q))return;
    var k=normSearch(matCode(m))||(m.id||'');
    if(k&&seen[k])return;
    if(k)seen[k]=1;
    out.push(m);
  }
  (local||[]).forEach(add);(remote||[]).forEach(add);return out;
}
async function fetchRemoteMaterialMatches(q){
  if(_testMode||!q||!isOnline())return [];
  initSupabase();
  if(!_supabaseData)return [];
  try{
    var res=await _supabaseData.from('materials').select('*').limit(1000);
    if(res.error||!res.data)return [];
    return res.data.map(snakeToCamel).filter(function(m){return matMatches(m,q);});
  }catch(e){console.warn('云端物料搜索失败:',e.message);return [];}
}
async function findMaterialByCode(mid){
  var local=(DB.mats||[]).find(function(m){return sameCode(matCode(m),mid);});
  if(local)return local;
  var remote=await fetchRemoteMaterialMatches(mid);
  return remote.find(function(m){return sameCode(matCode(m),mid);})||null;
}
function shortName(name){
  if(!name)return '';
  var s=name;
  // 去地名前缀
  var prefixes=['广东省','东莞市','深圳市','广州市','上海市','上海','中山市','惠州市','佛山市','珠海市','潮州市','汕头市','浙江省','江苏省','福建省'];
  prefixes.forEach(function(p){if(s.startsWith(p))s=s.slice(p.length);});
  // 去后缀
  var suffixes=['有限责任公司','股份有限公司','有限公司','纺织科技','科技','服饰','纺织','印染','印花厂','染整厂','织布厂','加工厂','制衣厂','工厂','厂'];
  suffixes.forEach(function(p){if(s.endsWith(p))s=s.slice(0,s.length-p.length);});
  return s||name;
}

function genNo(){
  var y=new Date().getFullYear();
  var customNext=DB.load('nextNo');if(Array.isArray(customNext))customNext=null;
  // 如果设置了完整订单号（fullNo），优先精确使用
  if(customNext && customNext.fullNo){
    var no=customNext.fullNo;
    // 检查此号码是否已被占用（重复保存安全）
    var exists=DB.orders.some(function(o){return o.no===no;});
    if(!exists){
      // 自动推进：数值部分+1，更新fullNo
      var m=no.match(/^G(\d{4})(\d{3,6})$/);
      if(m){
        var nextNum=parseInt(m[2])+1;
        DB.save('nextNo',{year:parseInt(m[1]),num:nextNum,fullNo:'G'+m[1]+String(nextNum).padStart(4,'0')});
      }else{
        DB.save('nextNo',null);
      }
      return no;
    }
  }
  var customNum=customNext&&customNext.year===y?customNext.num:null;
  var maxN=0;
  DB.orders.forEach(function(o){
    if(o.no&&o.no.startsWith('G'+y)){
      var n=parseInt(o.no.slice(5))||0;
      if(n>maxN)maxN=n;
    }
  });
  var nextN=Math.max(maxN+1, customNum||672);
  if(!customNum||nextN>=customNum){
    DB.save('nextNo',{year:y,num:nextN+1});
  }
  return 'G'+y+String(nextN).padStart(4,'0');
}
function setNextNo(fullNo){
  var m=fullNo.match(/^G(\d{4})(\d{3,6})$/);
  if(!m)return;
  DB.save('nextNo',{year:parseInt(m[1]),num:parseInt(m[2]),fullNo:fullNo});
}

function calcShipStatus(ordId){
  var rolls=fgRolls();
  var ordRolls=rolls.filter(function(r){return r.ordId===ordId;});
  if(!ordRolls.length)return null;
  var outRolls=ordRolls.filter(function(r){return r.status==='out';});
  if(outRolls.length===0)return 'stocked';
  if(outRolls.length>=ordRolls.length)return 'fully_out';
  return 'partial_out';
}
function calcColorShipStatus(ordId,colorNm){
  var rolls=fgRolls();
  var ordRolls=rolls.filter(function(r){return r.ordId===ordId&&(!colorNm||r.colorNm===colorNm);});
  if(!ordRolls.length)return null;
  var outRolls=ordRolls.filter(function(r){return r.status==='out';});
  if(outRolls.length===0)return 'stocked';
  if(outRolls.length>=ordRolls.length)return 'fully_out';
  return 'partial_out';
}
function displayColorStatusForDashboard(ordId,c){

function lifecycleOf(o){
  if(!o)return{hasProd:false,hasShip:false,partialShip:false,shipSt:null,hasArec:false,hasPaid:false};
  var hasProd=(DB.trks||[]).some(function(t){return t&&t.ordId===o.id;});
  var shipSt=calcShipStatus(o.id);
  var hasShip=shipSt==='fully_out'||shipSt==='partial_out';
  var partialShip=shipSt==='partial_out';
  // 对账：该订单的任意一笔fgout是否出现在某个arec的outIds里
  var ordOutIds=(DB.fgouts||[]).filter(function(x){return x&&x.ordNo===o.no;}).map(function(x){return x&&x.id;}).filter(function(id){return id;});
  var allArecOutIds=[];
  (DB.arecs||[]).forEach(function(a){if(a&&a.outIds)(a.outIds||[]).forEach(function(id){allArecOutIds.push(id);});});
  var hasArec=ordOutIds.some(function(id){return allArecOutIds.indexOf(id)>=0;});
  var hasPaid=!!o.paid;
  return{hasProd:hasProd,hasShip:hasShip,partialShip:partialShip,shipSt:shipSt,hasArec:hasArec,hasPaid:hasPaid};
}

// ── 全局修复：箭头键在输入框内智能导航 ──
// 入库明细表格（.fgi-roll-row）：左右=同行，上下=同列跨行
// 其他输入框：上下移动到相邻输入框
document.addEventListener('keydown',function(e){
  var key=e.key;
  if(key!=='ArrowUp'&&key!=='ArrowDown'&&key!=='ArrowLeft'&&key!=='ArrowRight')return;
  var t=e.target;
  if(t.tagName!=='INPUT')return;
  if(t.type==='date'||t.type==='checkbox'||t.type==='radio')return;
  // 仅在没有文字选中时才拦截左右箭头（避免干扰文字光标移动）
  if((key==='ArrowLeft'||key==='ArrowRight')&&t.selectionStart!==t.selectionEnd)return;
  // ── 入库明细表格内：真正的2D导航 ──
  var row=t.closest&&t.closest('.fgi-roll-row');
  if(row){
    e.preventDefault();
    var rowInputs=Array.prototype.slice.call(row.querySelectorAll('input'));
    var colIdx=rowInputs.indexOf(t);
    if(key==='ArrowLeft'&&colIdx>0){rowInputs[colIdx-1].focus();rowInputs[colIdx-1].select&&rowInputs[colIdx-1].select();return;}
    if(key==='ArrowRight'&&colIdx<rowInputs.length-1){rowInputs[colIdx+1].focus();rowInputs[colIdx+1].select&&rowInputs[colIdx+1].select();return;}
    if(key==='ArrowUp'||key==='ArrowDown'){
      var allRows=Array.prototype.slice.call(document.querySelectorAll('.fgi-roll-row'));
      var rowIdx=allRows.indexOf(row);
      var targetRow=key==='ArrowDown'?allRows[rowIdx+1]:allRows[rowIdx-1];
      if(targetRow){
        var targetInputs=Array.prototype.slice.call(targetRow.querySelectorAll('input'));
        var target=targetInputs[Math.min(colIdx,targetInputs.length-1)];
        if(target){target.focus();target.select&&target.select();}
      }
    }
    return;
  }
  // ── 普通输入框：上下移动到相邻可见输入框 ──
  if(key==='ArrowLeft'||key==='ArrowRight')return; // 普通输入框左右不拦截
  e.preventDefault();
  var container=t.closest('.mo')||t.closest('.ov')||document;
  var inputs=Array.prototype.slice.call(container.querySelectorAll('input:not([disabled]):not([readonly]):not([type="hidden"]):not([type="checkbox"]):not([type="radio"]):not([type="date"])'));
  inputs=inputs.filter(function(i){return i.offsetParent!==null;});
  var idx=inputs.indexOf(t);if(idx<0)return;
  var next=key==='ArrowDown'?inputs[idx+1]:inputs[idx-1];
  if(next){next.focus();next.select&&next.select();}
},true);

// 字段名转换：蛇形→驼峰（从Supabase加载到前端）
function snakeToCamel(obj){
  if(!obj || typeof obj !== 'object' || Array.isArray(obj)) return obj;
  var r = {};
  for(var k in obj){
    var ck = k.replace(/_([a-z])/g, function(m, c){return c.toUpperCase();});
    r[ck] = obj[k];
  }
  return r;
}

// 字段名转换：驼峰→蛇形（从前端保存到Supabase）
function camelToSnake(obj){
  if(!obj || typeof obj !== 'object' || Array.isArray(obj)) return obj;
  var r = {};
  for(var k in obj){
    var sk = k.replace(/([a-z])([A-Z])/g, function(m, a, b){return a+'_'+b.toLowerCase();});
    r[sk] = obj[k];
  }
  return r;
}

async function pullFromSupabase(){
  if(_testMode) return;
  initSupabase();
  if(!_supabaseData){ showToast('Supabase 未初始化','error'); return; }
  // Step 1 — 推送脏数据：只记录成功推送的表，不清除 dirty flag（防止 Step 2 拉回旧数据覆盖本地）
  var pushedKeys = [];
  var prePushVers = {};
  for(var key in TABLE_MAP){
    if(localStorage.getItem('gjr5_dirty_'+key) === '1'){
      prePushVers[key] = _syncVersions[key] || 0;
      var table = TABLE_MAP[key];
      var localData = DB.load(key);
      if(localData && localData.length > 0){
        try{
          var {error} = await _supabaseData.from(table).upsert(localData.map(camelToSnake), {onConflict:'id', ignoreDuplicates:false});
          if(!error) pushedKeys.push(key);
          else console.warn('推送失败['+key+']:', error.message);
        }catch(e){ console.warn('推送异常['+key+']:', e.message); }
      }
    }
  }
  // Step 2 — 拉取云端数据（跳过脏表 以及 刚推送成功的表——后者本地已是最新，拉取可能带回旧数据）
  var loaded = 0;
  var fails = [];
  for(var key in TABLE_MAP){
    if(localStorage.getItem('gjr5_dirty_'+key) === '1') continue;
    if(pushedKeys.indexOf(key) >= 0) continue;
    try{
      var table = TABLE_MAP[key];
      var {data, error} = await _supabaseData.from(table).select('*');
      if(error){ fails.push(table); continue; }
      if(data && data.length > 0){
        var camelData = data.map(snakeToCamel);
        // 按编号/日期降序排列，最新数据置顶
        if(key === 'o') camelData.sort(function(a,b){ return (a.no||'') < (b.no||'') ? 1 : -1; });
        else if(['c','f','mat','qt','yn'].indexOf(key)>=0) camelData.sort(function(a,b){ var an=a.nm||a.name||''; var bn=b.nm||b.name||''; return an<bn?-1:an>bn?1:0; });
        localStorage.setItem('gjr5_'+key, JSON.stringify(camelData));
        DB._c[key] = camelData;
        loaded += data.length;
      }
    }catch(e){ fails.push(TABLE_MAP[key]); }
  }
  // Step 3 — 拉取全部完成后，清除成功推送表的 dirty flag（带版本保险：推送期间版本未变才清除）
  for(var i=0;i<pushedKeys.length;i++){
    var key = pushedKeys[i];
    if((_syncVersions[key] || 0) === (prePushVers[key] || 0)){
      localStorage.removeItem('gjr5_dirty_'+key);
    }
  }
  // 处理离线删除队列
  var dq=JSON.parse(localStorage.getItem('gjr5_delq')||'[]');
  if(dq.length){
    for(var i=dq.length-1;i>=0;i--){
      try{
        var{error}=await _supabaseData.from(dq[i].table).delete().eq('id',dq[i].id);
        if(!error)dq.splice(i,1);
      }catch(e){}
    }
    localStorage.setItem('gjr5_delq',JSON.stringify(dq));
  }
  if(fails.length) showToast('加载失败: '+fails.join(', '), 'error');
  else if(loaded > 0) showToast('已加载 '+loaded+' 条数据','success');
  else showToast('未加载到数据','warning');
}

var _origSave = DB.save.bind(DB);
DB.save = function(n, v){
  _origSave(n, v);
  if(_testMode){
    if(TABLE_MAP[n]) localStorage.setItem('gjr5_test_dirty_'+n, '1');
    return;
  }
  // 标记为未同步（离线期间修改过）
  if(TABLE_MAP[n]) localStorage.setItem('gjr5_dirty_'+n, '1');
  if(_supabaseData && isOnline()){
    var table = TABLE_MAP[n];
    if(!table || !Array.isArray(v)) return;
    var snakeData = v.map(camelToSnake);
    // 版本保险：记录当前版本，同步完成后只有版本未变才清理 dirty flag
    _syncVersions[n] = (_syncVersions[n] || 0) + 1;
    var preSyncVer = _syncVersions[n];
    (async function(){
      var maxRetries = 3;
      for(var attempt = 0; attempt < maxRetries; attempt++){
        try{
          var {error} = await _supabaseData.from(table).upsert(snakeData, {onConflict:'id', ignoreDuplicates:false});
          if(!error){
            // 只有版本未变（期间没有新的本地保存）才清理 dirty flag
            if(_syncVersions[n] === preSyncVer){
              localStorage.removeItem('gjr5_dirty_'+n);
            }
            return;
          }
          if(attempt < maxRetries - 1) console.warn('同步重试['+n+']('+(attempt+1)+'):', error.message);
        }catch(e){
          if(attempt < maxRetries - 1) console.warn('同步异常重试['+n+']('+(attempt+1)+'):', e.message);
          else throw e;
        }
        await new Promise(function(r){ setTimeout(r, 2000 * (attempt + 1)); });
      }
      console.warn('Supabase同步失败['+n+']: 已重试'+maxRetries+'次');
      showToast(TABLE_MAP[n]+' 同步失败', 'error');
    })();
  }
};

// ── 上线时自动重试未同步的脏数据和删除队列 ──
window.addEventListener('online', function(){
  if(_testMode || !_supabaseData) return;
  var pending = [];
  for(var key in TABLE_MAP){
    if(localStorage.getItem('gjr5_dirty_'+key) === '1') pending.push(key);
  }
  if(pending.length){
    setTimeout(function(){
      pending.forEach(function(key){
        var v = DB.load(key);
        if(v && v.length){
          var table = TABLE_MAP[key];
          (async function(key, ver){
            var {error} = await _supabaseData.from(table).upsert(v.map(camelToSnake), {onConflict:'id', ignoreDuplicates:false});
            if(!error && (_syncVersions[key] || 0) === ver){
              localStorage.removeItem('gjr5_dirty_'+key);
              console.log('上线重推成功['+key+']');
            }
          })(key, _syncVersions[key] || 0);
        }
      });
    }, 1000);
  }
  // 重试离线删除队列
  var dq = JSON.parse(localStorage.getItem('gjr5_delq')||'[]');
  if(dq.length){
    setTimeout(function(){
      dq.slice().reverse().forEach(function(item){
        (async function(){
          var {error} = await _supabaseData.from(item.table).delete().eq('id', item.id);
          if(!error){
            var idx = dq.findIndex(function(x){ return x.key === item.key && x.id === item.id; });
            if(idx >= 0) dq.splice(idx, 1);
            localStorage.setItem('gjr5_delq', JSON.stringify(dq));
          }
        })();
      });
    }, 2000);
  }
});

// ═══ 自动快照系统（浏览器内7天滚动存档）═══
var SNAP_KEY='gjr5_snaps';
var SNAP_MAX=7;
function autoSnapshot(){
  try{
    var today=tod();
    var snaps=JSON.parse(localStorage.getItem(SNAP_KEY)||'[]');
    // 今天已有快照则跳过
    if(snaps.length&&snaps[snaps.length-1].date===today)return;
    var snap={date:today,ts:new Date().toISOString(),data:DB.snapshot()};
    snaps.push(snap);
    // 只保留最近7天
    if(snaps.length>SNAP_MAX)snaps=snaps.slice(snaps.length-SNAP_MAX);
    localStorage.setItem(SNAP_KEY,JSON.stringify(snaps));
    localStorage.setItem('gjr5_last_backup',new Date().toISOString());
    console.log('[AutoSnap] 已保存今日快照 '+today);
  }catch(e){console.warn('[AutoSnap] 快照失败:',e.message);}
}
function getSnaps(){
  try{return JSON.parse(localStorage.getItem(SNAP_KEY)||'[]');}catch(e){return [];}
}
function rollbackSnap(snap){
  var ts=new Date(snap.ts).toLocaleString();
  // 第一步：密码验证
  verifyPwd(function(){
    // 第二步：恢复前保存当前快照
    try{
      var snaps=JSON.parse(localStorage.getItem(SNAP_KEY)||'[]');
      var emergSnap={date:tod()+'_回滚前',ts:new Date().toISOString(),data:DB.snapshot()};
      snaps.push(emergSnap);
      if(snaps.length>SNAP_MAX+2)snaps=snaps.slice(snaps.length-(SNAP_MAX+2));
      localStorage.setItem(SNAP_KEY,JSON.stringify(snaps));
    }catch(se){console.warn('回滚前快照失败',se);}
    // 第三步：数据对比确认+填写原因
    showRestoreConfirm(snap.data,snap.date+' '+ts,function(reason){
      try{
        applyRestoreData(snap.data);
        var log={time:new Date().toISOString(),action:'rollback',snapDate:snap.date,reason:reason};
        try{var logs=JSON.parse(localStorage.getItem('gjr5_restore_log')||'[]');logs.push(log);localStorage.setItem('gjr5_restore_log',JSON.stringify(logs.slice(-20)));}catch(le){}
        showToast('已回滚到 '+snap.date,'success');
        location.reload();
      }catch(e){alert('回滚失败：'+e.message);}
    });
  });
}

// ── 统一打印函数（隐藏iframe原地打印，零多余窗口） ──
function printHTML(html){
  try{
    html = applyPrintPolish(html);
    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(iframe);
    var doc = iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
    var win = iframe.contentWindow;
    var printed = false;
    var doPrint = function(){ if(printed)return; printed=true; win.focus(); setTimeout(function(){win.print();},50); };
    var rm = function(){ setTimeout(function(){ if(document.body.contains(iframe)) document.body.removeChild(iframe); }, 100); };
    win.addEventListener('afterprint', rm, {once:true});
    win.addEventListener('load', doPrint);
    // fallback: 等3秒后强制打印（防止某些浏览器load不触发）
    setTimeout(doPrint, 3000);
    setTimeout(function(){ if(document.body.contains(iframe)) document.body.removeChild(iframe); }, 61000);
  }catch(e){ alert('打印失败：'+e.message); }
}

  Object.defineProperty(wrap,'onchange',{get:function(){return _chg;},set:function(fn){_chg=fn;}});
  Object.defineProperty(wrap,'__setItems',{value:function(newItems){items=newItems;}});
  return wrap;
}

function pgDash(){
  var orders=DB.orders,trks=DB.trks;
  var active=orders.filter(function(o){return o.status!=='completed'&&o.status!=='cancelled';});
  var inProc=trks.filter(function(t){return t.status==='in_progress';});
  var anom=orders.filter(function(o){
    if(o.status==='cancelled'||o.status==='draft')return false;
    return trks.some(function(t){return t.ordId===o.id;})&&!o.paid;
  });
  var today=new Date();today.setHours(0,0,0,0);
  var in7d=new Date(today.getTime()+7*86400000);
  var pg=document.getElementById('pg');
  pg.innerHTML='';

  // ── 数据巡检横幅（仅有问题时出现）──
  if(_auditIssues&&_auditIssues.length){
    var ab=document.createElement('div');
    ab.style.cssText='background:#FFF3E0;border:1px solid #FFB74D;border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#E65100;display:flex;align-items:center;gap:8px;flex-wrap:wrap';
    ab.innerHTML='<span style="font-size:16px;flex-shrink:0">⚠️</span><span style="font-weight:600;flex-shrink:0">数据巡检发现 '+_auditIssues.length+' 项异常：</span>'
      +'<span style="color:#BF360C;font-size:11px">'+_auditIssues.slice(0,3).join('；')+'</span>'
      +(_auditIssues.length>3?'<span style="color:#888;font-size:10px">等'+_auditIssues.length+'项</span>':'');
    pg.appendChild(ab);_auditIssues=null;
  }

  // ── KPI 卡片（3张，去掉「客户/工厂」）──
  var fullyOutIds=active.filter(function(o){return calcShipStatus(o.id)==='fully_out';}).map(function(o){return o.id;});
  var activeCount=active.length-fullyOutIds.length;
  var activeHint='共'+orders.length+'张'+(fullyOutIds.length?'·出货'+fullyOutIds.length+'张':'');
  var sr=document.createElement('div');sr.className='sr';
  sr.style.gridTemplateColumns='repeat(3,1fr)';
  [[activeCount,'进行中订单',activeHint,'sb',function(){go('orders');}],
   [inProc.length,'加工中批次','在外发','so',function(){go('trk');}],
   [anom.length,'有产无收款','需核查','sr2',function(){go('arec');}]
  ].forEach(function(s){
    var st=document.createElement('div');st.className='st '+s[3];st.style.cursor='pointer';st.onclick=s[4];
    st.innerHTML='<div class="sl">'+s[1]+'</div><div class="sv">'+s[0]+'</div><div class="ss">'+s[2]+'</div>';
    sr.appendChild(st);
  });
  pg.appendChild(sr);

  // ── 本月出货 + 上月趋势对比 ──
  (function(){
    var thisM=new Date().toISOString().slice(0,7);
    var lmDate=new Date();lmDate.setMonth(lmDate.getMonth()-1);
    var lastM=lmDate.toISOString().slice(0,7);
    var allRolls=typeof fgRolls==='function'?fgRolls():[];
    function calcM(m){
      var outs=(DB.fgouts||[]).filter(function(r){return (r.date||'').startsWith(m);});
      var kg=0,amt=0;
      outs.forEach(function(fgo){
        var ord=(DB.orders||[]).find(function(o){return o.id===fgo.ordId;})||{};
        var bpr=parseFloat(ord.unitPr)||0;
        var byM=(String(ord.prUnit||'').toUpperCase().indexOf('M')>=0)||(String(ord.prUnit||'').indexOf('米')>=0);
        (fgo.rollIds||[]).forEach(function(rid){
          if(!rid)return;
          var roll=allRolls.find(function(x){return x&&x.id===rid;});
          if(!roll)return;
          var rkg=parseFloat(roll.kg)||0,rm=parseFloat(roll.m)||0;
          var clr=(ord.colors||[]).find(function(c){return c&&c.nm===roll.colorNm;})||{};
          var upr=bpr+(parseFloat(clr.extraPr)||0);
          kg+=rkg;amt+=(byM?rm:rkg)*upr;
        });
      });
      return {kg:kg,amt:amt,cnt:outs.length};
    }
    var cur=calcM(thisM),last=calcM(lastM);
    function trendBadge(c,l){
      if(!l||l<=0)return '';
      var p=(c-l)/l*100,up=p>=0;
      return '<span style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;background:'+(up?'#D1FAE5':'#FEE2E2')+';color:'+(up?'#065F46':'#991B1B')+'">'+(up?'↑':'↓')+Math.abs(p).toFixed(0)+'%</span>';
    }
    var mLbl=thisM.replace('-','年')+'月';
    var row=document.createElement('div');row.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px';
    var s1=document.createElement('div');s1.className='st sb';s1.style.cursor='pointer';s1.onclick=function(){go('fgstock');};
    s1.innerHTML='<div class="sl">本月出货 KG</div>'
      +'<div class="sv" style="font-size:18px">'+(cur.kg>0?cur.kg.toFixed(1)+' KG':'0 KG')+'</div>'
      +'<div class="ss" style="display:flex;align-items:center;gap:6px"><span>'+mLbl+'·'+cur.cnt+'笔</span>'+(cur.kg>0&&last.kg>0?trendBadge(cur.kg,last.kg):'')+'</div>';
    var s2=document.createElement('div');s2.className='st sg';s2.style.cursor='pointer';s2.onclick=function(){go('fgstock');};
    s2.innerHTML='<div class="sl">本月出货金额</div>'
      +'<div class="sv" style="font-size:18px">'+(cur.amt>0?'¥'+Math.round(cur.amt).toLocaleString():'¥0')+'</div>'
      +'<div class="ss" style="display:flex;align-items:center;gap:6px"><span>含税估算</span>'+(cur.amt>0&&last.amt>0?trendBadge(cur.amt,last.amt):'')+'</div>';
    row.appendChild(s1);row.appendChild(s2);pg.appendChild(row);
  })();

  // ── 今日要事（智能优先级清单）──
  (function(){
    var arecs=DB.arecs||[];
    var unsettled=arecs.filter(function(r){return r.status!=='settled'&&parseFloat(r.balanceAmt||0)>0;});
    var overdueArecs=unsettled.filter(function(r){return getDaysStatus(r.dueDate).type==='overdue';});
    var warnArecs=unsettled.filter(function(r){return getDaysStatus(r.dueDate).type==='warning';});
    var overdueOrds=orders.filter(function(o){
      if(!o||o.paid||o.status==='cancelled'||o.status==='draft')return false;
      return o.delDate&&new Date(o.delDate)<today&&calcShipStatus(o.id)!=='fully_out';
    });
    var todayOrds=active.filter(function(o){
      if(!o.delDate)return false;
      var dd=new Date(o.delDate);
      return dd>=today&&dd<new Date(today.getTime()+86400000)&&calcShipStatus(o.id)!=='fully_out';
    });
    var soonOrds=active.filter(function(o){
      if(!o.delDate)return false;
      var dd=new Date(o.delDate);
      return dd>=new Date(today.getTime()+86400000)&&dd<=in7d&&calcShipStatus(o.id)!=='fully_out';
    });
    // 跳转销售订单页 → 搜索定位 → 自动展开该订单
    function goToOrd(id,no){
      go('orders');
      setTimeout(function(){
        var inp=document.getElementById('oq');
        if(inp){inp.value=no;}
        if(!window._ordExp)window._ordExp={};
        window._ordExp[id]=true;
        if(typeof fOrd==='function')fOrd();
        // 滚动到该行
        setTimeout(function(){
          var row=document.querySelector('[data-oid="'+id+'"]');
          if(row)row.scrollIntoView({behavior:'smooth',block:'center'});
        },80);
      },150);
    }

    var critical=[],warning2=[];
    overdueOrds.forEach(function(o){
      var days=Math.round((today-new Date(o.delDate))/86400000);
      critical.push({icon:'📦',
        text:'<b>'+esc(o.no)+'</b> '+esc(shortName(o.custNm||''))+' — 逾期未出货，已超期 <b style="color:#DC2626">'+days+'天</b>',
        label:'定位订单',
        fn:(function(id,no){return function(){goToOrd(id,no);};})(o.id,o.no)
      });
    });
    overdueArecs.forEach(function(r){
      var s=getDaysStatus(r.dueDate);
      critical.push({icon:'💰',text:'<b>'+esc(r.custNm)+'</b> '+esc(r.month)+'月账款 — 逾期 <b style="color:#DC2626">'+s.days+'天</b>，余款 ¥'+parseFloat(r.balanceAmt||0).toFixed(0),label:'去收款',fn:function(){go('arec');}});
    });
    todayOrds.forEach(function(o){
      critical.push({icon:'🚚',
        text:'<b>'+esc(o.no)+'</b> '+esc(shortName(o.custNm||''))+' — 今天交货，请确认出货',
        label:'定位订单',
        fn:(function(id,no){return function(){goToOrd(id,no);};})(o.id,o.no)
      });
    });
    soonOrds.forEach(function(o){
      var days=Math.round((new Date(o.delDate)-today)/86400000);
      warning2.push({icon:'📅',
        text:'<b>'+esc(o.no)+'</b> '+esc(shortName(o.custNm||''))+' — 还剩 <b style="color:#D97706">'+days+'天</b> 交货（'+esc(o.delDate)+'）',
        label:'定位订单',
        fn:(function(id,no){return function(){goToOrd(id,no);};})(o.id,o.no)
      });
    });
    warnArecs.forEach(function(r){
      var s=getDaysStatus(r.dueDate);
      warning2.push({icon:'🔔',text:'<b>'+esc(r.custNm)+'</b> '+esc(r.month)+'月账款 — 还剩 <b style="color:#D97706">'+s.days+'天</b> 到期，¥'+parseFloat(r.balanceAmt||0).toFixed(0),label:'去对账',fn:function(){go('arec');}});
    });
    var total=critical.length+warning2.length;
    var tcard=document.createElement('div');tcard.className='card';tcard.style.marginBottom='12px';
    var tch=document.createElement('div');tch.className='ch';
    tch.innerHTML='<span class="ct">📋 今日要事'+(total>0?' <span style="background:#EF4444;color:#fff;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;vertical-align:middle">'+total+'</span>':'')+'</span>';
    tcard.appendChild(tch);
    var tcb=document.createElement('div');tcb.className='cb';tcb.style.padding='10px 12px';
    if(total===0){
      tcb.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:12px 4px;color:#16A34A;font-size:12.5px"><span style="font-size:20px">✅</span> 今天一切正常，暂无待处理事项</div>';
    } else {
      function renderItems(items,bg,bc,sectionLabel){

// ══ 客户维度汇总弹窗 ══
function openCustSummary(custId){
  var cust=DB.custs.find(function(x){return x.id===custId;});
  if(!cust)return;
  var orders=DB.orders||[];
  var custOrders=orders.filter(function(o){return o.custNm===cust.nm;});
  var rolls=fgRolls();
  var fgouts=DB.fgouts||[];
  var arecs=DB.arecs||[];

  // 汇总计算
  var activeOrds=custOrders.filter(function(o){return o.status!=='completed'&&o.status!=='cancelled'&&calcShipStatus(o.id)!=='fully_out';});
  var shippedOrds=custOrders.filter(function(o){return calcShipStatus(o.id)==='fully_out'||o.status==='completed';});
  var custRolls=rolls.filter(function(r){return r.custNm===cust.nm;});
  var outRolls=custRolls.filter(function(r){return r.status==='out';});
  var totalInKG=custRolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  var totalOutKG=outRolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  // 估算营收：已出货匹 × 订单单价+加价（按订单的计价单位 元/KG 或 元/M）
  var totalAmt=0;
  custOrders.forEach(function(o){
    var oOutRolls=outRolls.filter(function(r){return r.ordId===o.id;});
    var _byM=(String(o.prUnit||'').toUpperCase().indexOf('M')>=0)||(String(o.prUnit||'').indexOf('米')>=0);
    oOutRolls.forEach(function(r){
      var clr=(o.colors||[]).find(function(c){return c.nm===r.colorNm;})||{};
      var qty=_byM?(parseFloat(r.m)||0):(parseFloat(r.kg)||0);
      totalAmt+=qty*((parseFloat(o.unitPr)||0)+(parseFloat(clr.extraPr)||0));
    });
  });
  var custArecs=arecs.filter(function(r){return r.custNm===cust.nm;});
  var unsettledAmt=custArecs.reduce(function(s,r){return s+(r.status!=='settled'?parseFloat(r.balanceAmt||0):0);},0);

// 成份排序：主体成份按占比降序，氨纶/莱卡弹性纤维排最后
function compSort(arr){
  var elastic=['氨纶','莱卡','斯潘德克斯','弹力纤维'];
  var main=arr.filter(function(c){return elastic.indexOf(c.nm)<0;});
  var last=arr.filter(function(c){return elastic.indexOf(c.nm)>=0;});
  main.sort(function(a,b){return (parseFloat(b.pct)||0)-(parseFloat(a.pct)||0);});
  return main.concat(last);
}

function pgMat(){
  var pg=document.getElementById('pg');if(!pg)return;pg.innerHTML='';

  // 页头
  var hdr=document.createElement('div');hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  var ht=document.createElement('div');
  ht.innerHTML='<div style="font-size:14px;font-weight:700;color:var(--t1)">物料档案</div><div style="font-size:10.5px;color:var(--t3);margin-top:2px">布料溯源 · 样办参考库</div>';
  var nb=mkBtn('＋ 新建物料','btn bp',function(){openMatModal(null);});
  hdr.appendChild(ht);hdr.appendChild(nb);pg.appendChild(hdr);

  // 搜索栏
  var sb=document.createElement('div');sb.style.cssText='display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap';
  var si=document.createElement('input');si.id='mat-search';si.placeholder='🔍 搜索物料编号 / 布类 / 品名 / 原公司...';
  si.style.cssText='flex:2;min-width:160px;padding:7px 12px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;outline:none;background:#fff';
  var ss=document.createElement('select');ss.id='mat-src';
  ss.style.cssText='flex:1;min-width:100px;padding:7px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;background:#fff;outline:none';
  [{v:'',l:'所有来源'},{v:'自产',l:'自产'},{v:'中大调货',l:'中大市场调货'},{v:'其他同行',l:'其他同行'},{v:'pending',l:'⚠ 待确认'}].forEach(function(o){ss.appendChild(new Option(o.l,o.v));});
  ss.id='mat-src';
  var searchFn=function(){renderMatList();};
  si.oninput=searchFn;ss.onchange=searchFn;
  sb.appendChild(si);sb.appendChild(ss);
  pg.appendChild(sb);

  // 列表容器
  var wrap=document.createElement('div');wrap.id='mat-list';pg.appendChild(wrap);

  async function renderMatList(){
    var q=(document.getElementById('mat-search')||{value:''}).value;
    var sf=(document.getElementById('mat-src')||{value:''}).value;
    var mats=DB.mats;
    var filtered=mats.filter(function(m){
      if(sf==='pending'){if(m.status!=='pending')return false;}
      else if(sf&&m.src!==sf)return false;
      if(q){
        var compStr=Array.isArray(m.comps)?m.comps.map(function(c){return c.nm+' '+c.pct+'%';}).join(' '):( m.comp||'');
        var hay=(m.mid||'')+' '+(m.fab||'')+' '+(m.alias||'')+' '+compStr+' '+(m.origCo||'')+' '+(m.origNo||'')+' '+(m.contact||'')+' '+(m.weaver||'')+' '+(m.dyer||'');
        if(!searchHit(hay,q))return false;
      }
      return true;
    });
    var w=document.getElementById('mat-list');if(!w)return;
    w.innerHTML='';
    if(q&&!sf&&!filtered.length&&isOnline()&&!_testMode){
      w.innerHTML='<div style="text-align:center;padding:32px;color:var(--t3)">本地未找到，正在查云端物料档案...</div>';
      var remote=await fetchRemoteMaterialMatches(q);
      filtered=mergeMatResults(mats,remote,q);
      w.innerHTML='';
    }
    // 待确认提醒横幅
    var pendingAll=(DB.mats||[]).filter(function(m){return m.status==='pending';});
    if(pendingAll.length){
      var banner=document.createElement('div');
      banner.style.cssText='background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px';
      var bannerIcon=document.createElement('span');bannerIcon.style.cssText='font-size:16px';bannerIcon.textContent='⚠';
      var bannerTxt=document.createElement('span');bannerTxt.style.cssText='font-size:12px;color:#92400e;flex:1';
      bannerTxt.innerHTML='<b>'+pendingAll.length+'</b> 个物料待确认完善<span style="font-size:10.5px;font-weight:400;margin-left:6px">（由报价单自动收录，请逐一核对补全）</span>';
      var bannerBtn=document.createElement('button');
      bannerBtn.textContent='只看待确认';
      bannerBtn.style.cssText='padding:3px 12px;border-radius:5px;border:1px solid #f97316;background:#fff;color:#c2410c;font-size:11px;cursor:pointer';
      bannerBtn.onclick=function(){
        var el=document.getElementById('mat-src');
        if(el){el.value='pending';searchFn();}
      };
      banner.appendChild(bannerIcon);banner.appendChild(bannerTxt);banner.appendChild(bannerBtn);
      w.appendChild(banner);
    }
    if(!filtered.length){
      var empty=document.createElement('div');empty.style.cssText='text-align:center;padding:32px;color:var(--t3)';
      empty.innerHTML='&#129529; 暂无物料记录<br><span style="font-size:11px">点击「新建物料」开始录入</span>';

function printMatLabel(m){
  // ── 四项必填校验 ──
  var missing=[];
  if(!m.mid)missing.push('编号');
  if(!m.alias&&!m.fab)missing.push('品名');
  if(!m.width||!m.gsm)missing.push('规格（幅宽或克重不完整）');
  if(!Array.isArray(m.comps)||!m.comps.length)missing.push('成份');
  if(missing.length){
    alert('以下信息不完整，无法打印标签：\n\n• '+missing.join('\n• ')+'\n\n请先编辑补全后再打印。');
    return;
  }
  // ── 成份格式处理 ──
  var compStr='';
  if(m.comps.length===1&&(+m.comps[0].pct)===100){
    compStr='100%'+m.comps[0].nm;
  } else {
    compStr=m.comps.map(function(c){return c.pct+c.nm;}).join(' ');
  }
  var widthDisp=m.width+(m.widthUnit||'cm');
  var gsmDisp=m.gsm+'g/m²';
  var specStr=widthDisp+' × '+gsmDisp;
  var alias=m.alias||m.fab;
  // ── 用printHTML方式（和所有单据一致，兼容Chrome本地文件）──
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'    +'<style>'    +'*{margin:0;padding:0;box-sizing:border-box;}'    +'@page{size:80mm 30mm;margin:0;}'    +'body{width:80mm;height:30mm;font-family:"Microsoft YaHei","SimHei",sans-serif;'    +'padding:2mm 3mm;display:flex;flex-direction:column;justify-content:center;gap:1mm;overflow:hidden;}'    +'.row{display:flex;align-items:baseline;gap:2mm;line-height:1.4;}'    +'.lbl{font-size:7pt;color:#444;white-space:nowrap;min-width:7mm;}'    +'.val{font-size:7.5pt;color:#000;word-break:break-all;}'    +'.mid-val{font-size:10pt;font-weight:700;color:#000;letter-spacing:0.5px;}'    +'.alias-val{font-size:8.5pt;font-weight:600;color:#000;}'    +'</style></head><body>'    +'<div class="row"><span class="lbl">编号：</span><span class="mid-val">'+esc(m.mid)+'</span></div>'    +'<div class="row"><span class="lbl">品名</span><span class="alias-val" style="margin-left:2mm">'+esc(alias)+'</span></div>'    +'<div class="row"><span class="lbl">规格：</span><span class="val">'+esc(specStr)+'</span></div>'    +'<div class="row"><span class="lbl">成份：</span><span class="val">'+esc(compStr)+'</span></div>'    +'</body></html>';
  printHTML(html);
}

        var nextN=Math.max(maxN+1,startN);

    gp3.appendChild(srcSel);grid.appendChild(gp3);

    if(dupCheck){showToast('编号 '+data.mid+' 已存在，请修改','error');return;}
    data.status='confirmed';data.pendingFrom=undefined;
    var list=DB.mats;
    var idx=list.findIndex(function(x){return x.id===data.id;});

function matOpenCompPicker(current,cb){
  var selected=current.map(function(c){return c.nm;});

  var overlay=document.createElement('div');

  COMP_LIST.forEach(function(nm){
    var r=document.createElement('div');r.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid #f0f0f0';
    var cb2=document.createElement('input');cb2.type='checkbox';cb2.value=nm;cb2.checked=!!curMap[nm];cb2.style.cursor='pointer';
    var nl=document.createElement('span');nl.style.cssText='flex:1;font-size:12px';nl.textContent=nm;
    var pi=document.createElement('input');pi.type='number';pi.min='1';pi.max='100';pi.value=curMap[nm]||'';pi.placeholder='%';
    pi.style.cssText='width:52px;padding:3px 6px;border:1px solid #DDD6FE;border-radius:4px;font-size:11px;text-align:center;outline:none';
    cb2.onchange=function(){if(this.checked&&!pi.value)pi.focus();};
    r.appendChild(cb2);r.appendChild(nl);r.appendChild(pi);r.appendChild(document.createTextNode('%'));
    boxBody.appendChild(r);rows.push({cb:cb2,nm:nm,pi:pi});
  });
  // 固定底部：合计+按钮
  var boxFtr=document.createElement('div');
  boxFtr.style.cssText='padding:8px 16px 12px;border-top:1px solid #f0f0f0;flex-shrink:0;background:#fff';
  var totalDiv=document.createElement('div');totalDiv.style.cssText='font-size:11px;color:#666;margin-bottom:8px;text-align:right';
  var btnRow=document.createElement('div');btnRow.style.cssText='display:flex;justify-content:flex-end;gap:8px';
  var cancelB=document.createElement('button');cancelB.type='button';cancelB.textContent='取消';
  cancelB.style.cssText='padding:5px 14px;border:1px solid #d0d0d0;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px';
  cancelB.onclick=function(){document.body.removeChild(overlay);};
  var okB=document.createElement('button');okB.type='button';okB.textContent='确定';
  okB.style.cssText='padding:5px 14px;border:none;border-radius:5px;background:#7C3AED;color:#fff;cursor:pointer;font-size:12px;font-weight:600';
  function updateTotal(){
    var sum=0;rows.forEach(function(rw){if(rw.cb.checked)sum+=parseFloat(rw.pi.value)||0;});
    var sumR=Math.round(sum*10)/10;
    totalDiv.textContent='合计：'+sumR+'%';
    totalDiv.style.color=sumR>=100?'#16a34a':(sumR>100?'#dc2626':'#666');
    okB.disabled=(sumR>100);okB.style.opacity=(sumR>100)?'0.5':'1';
  }
  rows.forEach(function(rw){
    rw.cb.onchange=function(){if(this.checked&&!rw.pi.value)rw.pi.focus();updateTotal();};
    rw.pi.oninput=function(){if(this.value&&!rw.cb.checked)rw.cb.checked=true;updateTotal();};
  });
  boxFtr.appendChild(totalDiv);
  okB.onclick=function(){
    var result=[];
    var hasEmpty=false;
    rows.forEach(function(rw){
      if(rw.cb.checked){
        if(!rw.pi.value){hasEmpty=true;alert('请填写「'+rw.nm+'」的百分比');return;}
        result.push({nm:rw.nm,pct:rw.pi.value});

    });
    if(hasEmpty)return;
    var sum=result.reduce(function(a,b){return a+parseFloat(b.pct);},0);

    cb(compSort(result));document.body.removeChild(overlay);
  };
  btnRow.appendChild(cancelB);btnRow.appendChild(okB);
  boxFtr.appendChild(btnRow);box.appendChild(boxFtr);
  overlay.appendChild(box);document.body.appendChild(overlay);
}

  // ── 订单预警横幅 ──
  (function(){
    var today=new Date();today.setHours(0,0,0,0);
    var noShip=[],noArec=[],noPaid=[],overdue=[];
    (DB.orders||[]).filter(function(o){return o.status!=='cancelled'&&o.status!=='draft';}).forEach(function(o){
      var lc=lifecycleOf(o);
      if(lc.hasShip&&!lc.hasArec)noArec.push(o);
      if(lc.hasArec&&!lc.hasPaid)noPaid.push(o);
      if(!lc.hasShip&&o.delDate&&new Date(o.delDate)<today)overdue.push(o);
    });
    var items=[];
    if(overdue.length)items.push({key:'overdue',icon:'🔴',txt:'超期未出货 '+overdue.length+' 张',color:'#FEF2F2',bc:'#FECACA',tc:'#991B1B'});

  if(window._ordWarnFilter)fOrd();else renderOrds(DB.orders);
}

  var today=new Date();today.setHours(0,0,0,0);
  var in7d=new Date(today.getTime()+7*86400000);

  var allRolls=fgRolls();
  function ordFinKgByColor(oid,colorNm){
    return allRolls.filter(function(r){return r.ordId===oid&&r.colorNm===colorNm;})
      .reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  }
  function ordFinKgTotal(oid){
    return allRolls.filter(function(r){return r.ordId===oid;})
      .reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  }

  // 按接单月份分组
  var groups={},gKeys=[];

    if(!groups[m]){groups[m]=[];gKeys.push(m);}
    groups[m].push(o);

  // 组内按接单日期正序（最早接的在最上面）
  gKeys.forEach(function(m){
    groups[m].sort(function(a,b){return (a.ordDate||'').localeCompare(b.ordDate||'');});
  });
  // 月份倒序（最新月份在最上面）
  gKeys.sort(function(a,b){return b.localeCompare(a);});

  if(!window._ordExp)window._ordExp={};

  var NC=COLS.length;

    th.textContent=c.t;
    th.style.cssText='position:sticky;top:0;z-index:2;background:#EEEAFF;color:#3730a3;font-weight:600;font-size:11px;padding:7px 8px;border-right:1px solid #C7C4E8;border-bottom:2px solid #B4B0DC;text-align:left;white-space:nowrap;width:'+c.w+'px';
    htr.appendChild(th);
  });
  thead.appendChild(htr);tbl.appendChild(thead);

  var tbody=document.createElement('tbody');

  function mktd(html,style){

function fOrd(){
  var q=(document.getElementById('oq').value||'');
  var s=(document.getElementById('os').value||'');
  var hideCompleted=window._ordHideCompleted||false;
  var _wf=window._ordWarnFilter||'';
  var today=new Date();today.setHours(0,0,0,0);
  renderOrds(DB.orders.filter(function(o){
    // ── 预警快速筛选 ──
    if(_wf){
      var lc2=lifecycleOf(o);
      if(_wf==='overdue'&&!(!lc2.hasShip&&o.delDate&&new Date(o.delDate)<today&&o.status!=='cancelled'&&o.status!=='draft'))return false;
      if(_wf==='noArec'&&!(lc2.hasShip&&!lc2.hasArec&&o.status!=='cancelled'&&o.status!=='draft'))return false;
      if(_wf==='noPaid'&&!(lc2.hasArec&&!lc2.hasPaid&&o.status!=='cancelled'&&o.status!=='draft'))return false;
    }
    if(searchHit([(o.no||''),(o.prodNo||''),(o.custNm||''),(o.custNo||''),(o.fab||''),(o.fabB||''),(o.sty||''),(o.follower||''),(o.colors||[]).map(function(c){return (c.nm||'')+' '+(c.code||'');}).join(' ')].join(' '),q)){
      if(s&&o.status!==s)return false;
      if(hideCompleted&&(o.status==='completed'||o.status==='cancelled'||calcShipStatus(o.id)==='fully_out'))return false;
      return true;
    }
    return false;
  }));
}

// 米数转KG：幅宽×克重换算，取整（去小数保留到个位）
function metersToKG(meters,width,widthUnit,gsm){
  var w=parseFloat(width),g=parseFloat(gsm),m=parseFloat(meters);
  if(!m||!w||!g)return null;
  var wm=(widthUnit==='"')?w*0.0254:w*0.01; // 英寸或cm → 米
  return Math.round(m*wm*g/1000);           // 取整
}
function getPayClause(p){
  if(!p||p==='—')return '双方另行协商确定';
  if(p==='现金'||p==='现款')return '出货前付清全部货款（现款现货）';
  if(p==='季结')return '按季度结账，当季度末结清货款';
  // 定金类：直接返回原文
  if(p.indexOf('定金')>=0||p.indexOf('订金')>=0)return p;
  var m=p.match(/(\d+)/);
  if(m&&(p.indexOf('月结')>=0||p.indexOf('天')>=0))return '出货后'+m[1]+'天内付清全部货款';
  return p;
}

function renderTrks(list){

  var rows=list.map(function(t){
    var tr=document.createElement('tr');
    var ls=t.sentQ&&t.retQ?((t.sentQ-t.retQ)/t.sentQ*100).toFixed(1):null;

    td.appendChild(mkBtn('详情','btn bsm bq',(function(id){return function(){openTD(id);};})(t.id)));
    td.appendChild(mkBtn('编辑','btn bsm bs',(function(id){return function(){openTM(id);};})(t.id)));

function saveT(id){

}

function getProcList(){
  var DEFAULT=[
    '坯布预定','车边','半漂','食毛','染色','过软','干布','定型','预缩',
    '重软','抓毛','磨毛','剪毛','吸毛','印花',
    '双胶带','1.5KG纸筒','白胶浆','拉封','固色','撞白'
  ];
  // 废弃的旧名称（自动替换）
  var RENAME={'蚀食毛':'食毛','蚀毛':'食毛','下缸食毛':'食毛'};
  var l=DB.load('procs');
  if(!l||!Array.isArray(l)||l.length<8){
    DB.save('procs',DEFAULT.slice());
    return DEFAULT.slice();
  }
  // 替换旧名，去重
  var cleaned=[];
  l.forEach(function(p){
    var newName=RENAME[p]||p;
    if(cleaned.indexOf(newName)<0)cleaned.push(newName);
  });
  // 把DEFAULT里有但cleaned里没有的补进去
  DEFAULT.forEach(function(p){if(cleaned.indexOf(p)<0)cleaned.push(p);});
  // 如果有变化，保存更新后的列表
  if(JSON.stringify(cleaned)!==JSON.stringify(l)){
    DB.save('procs',cleaned);
  }
  return cleaned;
}
function addProcMemory(proc){
  var l=getProcList();
  if(l.indexOf(proc)<0){l.push(proc);DB.save('procs',l);}
}
function updateProcPreview(){
  // Sort checked boxes by seq, update pj field and preview
  var wrap=document.getElementById('dd-proc-checks');
  if(!wrap)return;
  var checked=[];
  wrap.querySelectorAll('input[type=checkbox]:checked').forEach(function(cb){
    checked.push({v:cb.value,seq:parseInt(cb.dataset.seq||'99')});
  });
  checked.sort(function(a,b){return a.seq-b.seq;});
  var result=checked.map(function(x){return x.v;});
  var pjEl=document.getElementById('dd-pj');
  if(pjEl)pjEl.value=result.join('-');
  var prvEl=document.getElementById('dd-proc-preview');
  if(prvEl)prvEl.textContent=result.length?result.join(' → '):'（未选工序）';
}

function buildProcessChecks(currentVal){
  var wrap=document.getElementById('dd-proc-checks');
  if(!wrap)return;
  wrap.innerHTML='';
  var procs=getProcList();
  var defaultProcs=['坯布预定','车边','半漂','食毛','染色','过软','干布','定型','预缩',
    '重软','抓毛','磨毛','剪毛','吸毛','印花','双胶带','1.5KG纸筒','白胶浆','拉封','固色','撞白'];
  var selected=currentVal?currentVal.split('-').map(function(s){return s.trim();}).filter(Boolean):[];

  // 自定义工序和默认工序合并，统一显示
  var customProcs=procs.filter(function(p){return defaultProcs.indexOf(p)<0;});
  var allProcs=defaultProcs.filter(function(p){return procs.indexOf(p)>=0;});
  customProcs.forEach(function(p){if(allProcs.indexOf(p)<0)allProcs.push(p);});

  // 全局点击计数器
  var _globalSeq=0;

  function makeChk(p){
    var isCustom=defaultProcs.indexOf(p)<0;
    var isSelected=selected.indexOf(p)>=0;
    var lbl=document.createElement('label');
    lbl.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;background:'+(isSelected?'var(--pl)':'#fff')+';border:1.5px '+(isCustom?'dashed':'solid')+' '+(isSelected?'var(--p)':'var(--bd)')+';border-radius:4px;padding:5px 9px;font-size:12px;user-select:none;transition:all .15s';
    var cb=document.createElement('input');cb.type='checkbox';cb.value=p;cb.style.cssText='cursor:pointer';
    cb.checked=isSelected;
    cb.onchange=function(){
      lbl.style.borderColor=this.checked?'var(--p)':'var(--bd)';
      lbl.style.background=this.checked?'var(--pl)':'#fff';
      if(this.checked){
        this.dataset.seq=String(_globalSeq++);
      } else {
        delete this.dataset.seq;
      }
      updateProcPreview();
    };
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(p));
    return lbl;
  }

  // 所有工序统一一行显示，自定义工序虚线边框区分
  var checksDiv=document.createElement('div');
  checksDiv.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px';
  allProcs.forEach(function(p){checksDiv.appendChild(makeChk(p));});
  wrap.appendChild(checksDiv);

  // 新增工序栏
  var addRow=document.createElement('div');
  addRow.style.cssText='display:flex;gap:6px;align-items:center;border-top:1px solid var(--bd);padding-top:8px;margin-top:6px';
  var addInp=document.createElement('input');
  addInp.id='proc-add-inp';
  addInp.placeholder='输入新工序名称，回车或点"添加"';
  addInp.style.cssText='flex:1;padding:6px 10px;border:1.5px solid var(--bd);border-radius:5px;font-size:12px;outline:none';
  var addBtn=document.createElement('button');
  addBtn.type='button';addBtn.textContent='+ 添加工序';
  addBtn.style.cssText='padding:6px 12px;background:var(--p);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap';
  addInp.onkeydown=function(e){
    if(e.key==='Enter'){
      e.preventDefault();
      var v=this.value.trim();if(!v)return;
      addProcMemory(v);
      var pjEl=document.getElementById('dd-pj');
      buildProcessChecks(pjEl?pjEl.value:'');
    }
  };
  addBtn.addEventListener('click',function(e){
    e.preventDefault();e.stopPropagation();
    var inp=document.getElementById('proc-add-inp');
    if(!inp)return;
    var v=inp.value.trim();if(!v)return;
    addProcMemory(v);
    var pjEl=document.getElementById('dd-pj');
    buildProcessChecks(pjEl?pjEl.value:'');
  });
  addRow.appendChild(addInp);
  addRow.appendChild(addBtn);
  wrap.appendChild(addRow);
}

// 账期计算工具
function calcDueDate(payType, reconMonth){
  // reconMonth格式: "2023-11"
  if(!reconMonth)return '';
  var parts=reconMonth.split('-');
  var y=parseInt(parts[0]),m=parseInt(parts[1]);
  // 下月1号
  var nextM=m===12?1:m+1;
  var nextY=m===12?y+1:y;
  var base=new Date(nextY,nextM-1,1);
  var days={'现金':0,'月结30天':30,'月结60天':60,'季结':90}[payType]||30;
  if(payType==='现金')return reconMonth+'-15'; // 现金特殊处理
  base.setDate(base.getDate()+days);
  return base.toISOString().slice(0,10);
}

function getDaysStatus(dueDate){
  if(!dueDate)return{type:'normal',days:0,label:'—'};
  var today=new Date();today.setHours(0,0,0,0);
  var due=new Date(dueDate);
  if(isNaN(due.getTime()))return{type:'normal',days:0,label:'日期无效'};
  var diff=Math.round((due-today)/86400000);
  if(diff<0)return{type:'overdue',days:-diff,label:'逾期'+(-diff)+'天'};
  if(diff<=7)return{type:'warning',days:diff,label:'还剩'+diff+'天'};
  return{type:'normal',days:diff,label:'还剩'+diff+'天'};
}

function arecNo(){
  var y=new Date().getFullYear(),max=0;
  (DB.arecs||[]).forEach(function(r){if(r.no&&r.no.startsWith('STM'+y)){var n=parseInt(r.no.slice(7))||0;if(n>max)max=n;}});
  return 'STM'+y+String(max+1).padStart(3,'0');
}

function quotNo(){
  var now=new Date();
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,'0');
  var d=String(now.getDate()).padStart(2,'0');
  var prefix='NO.'+y+m+d+'-';
  var max=0;
  (DB.quots||[]).forEach(function(q){
    if(q.no&&q.no.startsWith(prefix)){
      var n=parseInt(q.no.slice(prefix.length))||0;
      if(n>max)max=n;
    }
  });
  return prefix+(max+1);
}

        var wCm=widthUnit.val==='"'?w*2.54:w;

      var box=document.createElement('div');box.style.cssText='background:#fff;border-radius:8px;padding:16px;width:360px;max-height:420px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)';

      var cancelB=document.createElement('button');cancelB.type='button';cancelB.textContent='取消';cancelB.style.cssText='padding:5px 14px;border:1px solid #d0d0d0;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px';
      cancelB.onclick=function(){document.body.removeChild(overlay);};
      var okB=document.createElement('button');okB.type='button';okB.textContent='确定';okB.style.cssText='padding:5px 14px;border:none;border-radius:5px;background:#7C3AED;color:#fff;cursor:pointer;font-size:12px;font-weight:600';
      // 合计显示
      var totalDiv=document.createElement('div');totalDiv.style.cssText='font-size:11px;color:#666;margin-top:8px;text-align:right';
      function updateTotal(){
        var sum=0;rows.forEach(function(rw){if(rw.cb.checked)sum+=parseFloat(rw.pi.value)||0;});
        var sumR=Math.round(sum*10)/10;
        totalDiv.textContent='合计：'+sumR+'%';
        totalDiv.style.color=sum===100?'#16a34a':(sum>100?'#dc2626':'#666');

      }
      rows.forEach(function(rw){
        rw.cb.onchange=function(){if(this.checked&&!rw.pi.value)rw.pi.focus();updateTotal();};
        rw.pi.oninput=function(){if(this.value&&!rw.cb.checked)rw.cb.checked=true;updateTotal();};
      });
      box.appendChild(totalDiv);
      okB.onclick=function(){
        var result=[];
        rows.forEach(function(rw){
          if(rw.cb.checked){
            if(!rw.pi.value){alert('请填写「'+rw.nm+'」的百分比');return;}
            result.push({nm:rw.nm,pct:rw.pi.value});
          }
        });
        var sum=result.reduce(function(a,b){return a+parseInt(b.pct);},0);
        if(sum>100){alert('成份合计不能超过100%（当前'+sum+'%）');return;}
        cb(compSort(result));document.body.removeChild(overlay);
      };
      btnRow.appendChild(cancelB);btnRow.appendChild(okB);box.appendChild(btnRow);
      overlay.appendChild(box);document.body.appendChild(overlay);

    // ── 黄色区：注意事项 ──
    var noteContent=document.createElement('div');
    // 含税/不含税互斥单选
    var taxRow=document.createElement('div');taxRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:10px';

    var taxVal=rec?(rec.terms&&rec.terms.indexOf('qt-notax')>=0?'notax':'tax'):'tax';
    [{v:'tax',l:'含税（运）'},{v:'notax',l:'不含税'}].forEach(function(o){var opt=new Option(o.l,o.v);if(taxVal===o.v)opt.selected=true;taxSel.appendChild(opt);});

      var ck=document.createElement('input');ck.type='checkbox';ck.id=t.id;ck.checked=initChecked;ck.style.display='none';
      ck.onchange=function(){lbl.style.background=this.checked?'#EAB308':'#fff';lbl.style.color=this.checked?'#fff':'var(--t1)';lbl.style.borderColor=this.checked?'#EAB308':'#FEF08A';};
      lbl.appendChild(ck);lbl.appendChild(document.createTextNode(t.lbl));
      lbl.onclick=function(){ck.checked=!ck.checked;ck.onchange();};
      termRow.appendChild(lbl);
    });

    var moqRow=document.createElement('div');moqRow.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px';
    var moqL=document.createElement('span');moqL.style.cssText='font-size:10px;color:#92400E;font-weight:700;white-space:nowrap';moqL.textContent='起订量说明：';
    var moqI=document.createElement('input');moqI.id='qt-moq-note';moqI.value=rec?rec.moqNote||'':'';moqI.placeholder='如：每色500KG起，不足收费¥300/组（大货可退）';
    moqI.style.cssText='flex:1;padding:6px 10px;border:1.5px solid #FEF08A;border-radius:5px;font-size:11px;background:#FFFBEB;outline:none';
    moqRow.appendChild(moqL);moqRow.appendChild(moqI);

    var rmRow=document.createElement('div');rmRow.style.cssText='display:flex;gap:8px;align-items:center';
    var rmL=document.createElement('span');rmL.style.cssText='font-size:10px;color:#666;font-weight:700;white-space:nowrap';rmL.textContent='补充备注：';
    var rmI=document.createElement('input');rmI.id='qt-rm';rmI.value=rec?rec.rm||'':'';rmI.placeholder='其他特殊说明';
    rmI.style.cssText='flex:1;padding:6px 10px;border:1.5px solid var(--bd);border-radius:5px;font-size:11px;background:#fff;outline:none';

  },function(){

    document.querySelectorAll('.qt-item-row').forEach(function(row){
      var fab=row.querySelector('.qt-item-fab');if(!fab||!fab.value.trim())return;
      var md=row.querySelector('.qt-item-meter');
      var compWrapEl=row.querySelector('.qt-item-comp-wrap');
      var compData=[];
      try{if(compWrapEl&&compWrapEl.dataset.comps)compData=JSON.parse(compWrapEl.dataset.comps);}catch(e){}
      items.push({
        no:row.querySelector('.qt-item-no').value,fab:fab.value,
        width:row.querySelector('.qt-item-w').value,gsm:row.querySelector('.qt-item-g').value,
        moq:row.querySelector('.qt-item-moq').value,price:row.querySelector('.qt-item-pr').value,
        meter:md?md.textContent:'',comps:compData
      });
    });

    ['qt-valid30','qt-ship','qt-ship2'].forEach(function(tid){var el=document.getElementById(tid);if(el&&el.checked)terms.push(tid);});
    var showMeter=(document.getElementById('qt-show-meter')||{checked:false}).checked;
    var data={
      id:rec?rec.id:'qt_'+Date.now(),
      no:(document.getElementById('qt-no')||{value:''}).value||quotNo(),

      rm:(document.getElementById('qt-rm')||{value:''}).value,
      createdDate:rec?rec.createdDate:new Date().toISOString().slice(0,10)
    };
    var list=DB.quots||[];var idx=list.findIndex(function(x){return x.id===data.id;});
    if(idx>=0)list[idx]=data;else list.push(data);DB.quots=list;
    // ── 自动收录新编号到物料档案（待确认状态）──
    var newMats=0;
    (data.items||[]).forEach(function(item){
      var mid=(item.no||'').trim();if(!mid)return;
      var mats=DB.mats||[];
      var exists=mats.find(function(m){return sameCode(m.mid,mid);});
      if(!exists){
        var newMat={
          id:'mt_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
          mid:mid,
          fab:item.fab||'',
          width:item.width||'',
          widthUnit:'cm',
          gsm:item.gsm||'',
          comps:Array.isArray(item.comps)?item.comps:[],
          price:item.price||'',
          src:'自产',
          status:'pending',
          pendingFrom:'报价单 '+data.no,
          createdAt:new Date().toISOString()
        };
        mats.push(newMat);DB.mats=mats;newMats++;
      }
    });
    cm();pgQuot();

    if(newMats>0)toastMsg+='（'+newMats+'个新编号已收录至物料档案待确认）';
    showToast(toastMsg,'success');
    if(confirm('保存成功！是否立即打印/PDF？'))printQuot(data.id);
  },'保存');
  om(modal);
}

    var compStr=Array.isArray(item.comps)?item.comps.map(function(c){return c.nm+' '+c.pct+'%';}).join(' / '):(item.comps||'');

function openMultiColorSheet(){

  fgoutsDB.forEach(function(o){
    if(o.arecId&&!validArecIds.has(o.arecId)){o.arecId='';cleaned=true;}
  });
  if(cleaned)DB.fgouts=fgoutsDB;
  var pg=document.getElementById('pg');if(!pg)return;pg.innerHTML='';
  var recs=DB.arecs||[];
  var today=new Date();today.setHours(0,0,0,0);
