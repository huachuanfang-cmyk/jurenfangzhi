  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  var ht=document.createElement('div');ht.style.cssText='font-size:14px;font-weight:700;color:var(--t1)';ht.textContent='对账单';
  var nb=mkBtn('＋ 新建对账单','btn bp',function(){openARecModal(null);});
  hdr.appendChild(ht);hdr.appendChild(nb);pg.appendChild(hdr);

  // 统计卡
  var sr=document.createElement('div');sr.className='sr';
  var overdueRecs=recs.filter(function(r){if(r.status==='settled')return false;var s=getDaysStatus(r.dueDate);return s.type==='overdue';});
  var warnRecs=recs.filter(function(r){if(r.status==='settled')return false;var s=getDaysStatus(r.dueDate);return s.type==='warning';});
  var totalOwed=recs.filter(function(r){return r.status!=='settled';}).reduce(function(s,r){return s+(parseFloat(r.balanceAmt)||0);},0);
  var overdueAmt=overdueRecs.reduce(function(s,r){return s+(parseFloat(r.balanceAmt)||0);},0);
  [
    [recs.filter(function(r){return r.status!=='settled';}).length+'张','未结清对账单','待收款','sg'],
    ['¥'+totalOwed.toFixed(0),'应收总额','未结清合计','sb'],
    [overdueRecs.length+'张','已逾期','需催款','so'],
    ['¥'+overdueAmt.toFixed(0),'逾期金额','逾期未收','sb2']
  ].forEach(function(s){
    var st=document.createElement('div');st.className='st '+s[3];
    st.innerHTML='<div class="sl">'+s[1]+'</div><div class="sv">'+s[0]+'</div><div class="ss">'+s[2]+'</div>';
    sr.appendChild(st);
  });
  pg.appendChild(sr);

  // ── 未对账出货遗留预警 ──
  (function(){
    var fgoutsAll=DB.fgouts||[];
    var today=new Date();
    // 找所有未挂对账单、出货超过30天的记录，按客户汇总
    var legacyMap={};
    fgoutsAll.forEach(function(o){
      if(o.arecId)return; // 已对账
      if(!o.date)return;
      var d=new Date(o.date);
      var days=Math.floor((today-d)/86400000);
      if(days<1)return; // 今天出货的不算
      var cust=o.custNm||'未知客户';
      if(!legacyMap[cust])legacyMap[cust]={count:0,maxDays:0,amt:0};
      legacyMap[cust].count++;
      if(days>legacyMap[cust].maxDays)legacyMap[cust].maxDays=days;
    });
    var legacyCusts=Object.keys(legacyMap);
    if(!legacyCusts.length)return;
    var warn=document.createElement('div');
    warn.style.cssText='background:#FFF7ED;border:1px solid #FED7AA;border-left:4px solid #F97316;border-radius:6px;padding:10px 14px;margin-bottom:12px';
    var wHdr=document.createElement('div');
    wHdr.style.cssText='font-size:11px;font-weight:700;color:#C2410C;margin-bottom:6px';
    wHdr.textContent='⚠ 以下客户有未对账出货记录';
    warn.appendChild(wHdr);
    legacyCusts.forEach(function(cust){
      var info=legacyMap[cust];
      var row=document.createElement('div');
      row.style.cssText='font-size:10px;color:#92400E;padding:2px 0;display:flex;align-items:center;gap:8px';
      var urgColor=info.maxDays>=60?'#DC2626':info.maxDays>=30?'#F97316':'#D97706';
      row.innerHTML='<span style="font-weight:600">'+esc(cust)+'</span>'
        +'<span>共 <strong>'+info.count+'</strong> 笔未对账</span>'
        +'<span style="color:'+urgColor+';font-weight:700">最长已'+info.maxDays+'天未对账</span>';
      warn.appendChild(row);
    });
    pg.appendChild(warn);
  })();

  // tab筛选
  var tabKeys=['','overdue','warning','unsettled','settled'];
  var tabLabels=['全部','已逾期','即将到期','未结清','已结清'];
  var activeTab=0;
  var tabBar=document.createElement('div');
  tabBar.style.cssText='display:flex;gap:0;margin-bottom:12px;border:0.5px solid var(--bd);border-radius:6px;overflow:hidden';
  var listCard=document.createElement('div');listCard.className='card';

  function getTabRecs(key){
    if(!key)return recs;
    if(key==='settled')return recs.filter(function(r){return r.status==='settled';});
    if(key==='unsettled')return recs.filter(function(r){return r.status!=='settled';});
    return recs.filter(function(r){
      if(r.status==='settled')return false;
      var s=getDaysStatus(r.dueDate);
      return s.type===key;
    });
  }

  function renderList(filterKey){
    var filtered=getTabRecs(filterKey);
    listCard.innerHTML='';
    var ch=document.createElement('div');ch.className='ch';
    ch.innerHTML='<span class="ct">对账单列表（'+filtered.length+'张）</span>';
    listCard.appendChild(ch);
    if(!filtered.length){
      var empty=document.createElement('div');empty.style.cssText='text-align:center;padding:28px;color:var(--t3)';
      empty.innerHTML='&#128203; 暂无记录';listCard.appendChild(empty);return;
    }
    // ── 方案A大表格，统一紫色表头 ──
    var arWrap=document.createElement('div');arWrap.className='qt-wrap';
    var arTbl=document.createElement('table');
    arTbl.style.cssText='width:100%;border-collapse:collapse;table-layout:fixed;font-size:11.5px';
    var arCols=[['对账单号',100],['客户',150],['对账月份',80],['付款方式',90],['到期日',90],['货款合计',100],['应收金额',100],['账期状态',90],['收款状态',90],['操作',150]];
    var arThead=document.createElement('thead');
    var arThRow=document.createElement('tr');
    arCols.forEach(function(col){
      var th=document.createElement('th');th.textContent=col[0];
      th.style.cssText='position:sticky;top:0;z-index:2;background:#eeecff;color:#3730a3;font-weight:600;font-size:11px;padding:7px 10px;border:1px solid #c7c4e8;text-align:left;white-space:nowrap;width:'+col[1]+'px;user-select:none';
      var rsz=document.createElement('div');rsz.style.cssText='position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:3';
      rsz.addEventListener('mousedown',function(e){
        e.preventDefault();var sx=e.clientX,sw=th.offsetWidth;
        function mv(ev){th.style.width=Math.max(40,sw+(ev.clientX-sx))+'px';}
        function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
        document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
      });
      th.appendChild(rsz);arThRow.appendChild(th);
    });
    arThead.appendChild(arThRow);arTbl.appendChild(arThead);
    var arTbody=document.createElement('tbody');
    filtered.slice().reverse().forEach(function(r,idx){
      var st=getDaysStatus(r.dueDate);
      // 行背景：逾期>警告>斑马纹
      var bg=st.type==='overdue'?'#FEF2F2':st.type==='warning'?'#FFFBEB':(idx%2===0?'#ffffff':'#f9f8ff');
      var hoverBg=st.type==='overdue'?'#fde8e8':st.type==='warning'?'#fef6d0':'#f0f0ff';
      var tr=document.createElement('tr');tr.style.cursor='pointer';
      tr.onmouseover=function(){this._tds&&this._tds.forEach(function(td){td.style.background=hoverBg;});};
      tr.onmouseout=function(){this._tds&&this._tds.forEach(function(td){td.style.background=bg;});};
      tr.addEventListener('click',function(e){if(e.target.tagName==='BUTTON')return;openARecModal(r.id);});

      var stTag='';
      if(r.status==='settled'){stTag='<span class="bx bxg">已结清</span>';}
      else if(st.type==='overdue'){stTag='<span class="bx" style="background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;font-weight:700">逾期'+st.days+'天</span>';}
      else if(st.type==='warning'){stTag='<span class="bx" style="background:#FEF3C7;color:#92400E;border:1px solid #FDE68A">还剩'+st.days+'天</span>';}
      else{stTag='<span class="bx" style="background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0">正常</span>';}

      var payTag='';
      if(r.status==='settled'){payTag='<span class="bx bxg">已收款</span>';}
      else{
        var paidAmt=parseFloat(r.paidTotal)||0;
        if(paidAmt>0){payTag='<span class="bx" style="background:#DBEAFE;color:#1e3a8a;border:1px solid #BFDBFE">部分收款</span>';}
        else{payTag='<span class="bx" style="background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;font-weight:700">未收款</span>';}
      }

      var bal=parseFloat(r.balanceAmt)||0;
      var dueDateStyle=st.type==='overdue'?'color:#DC2626;font-weight:700':st.type==='warning'?'color:#D97706;font-weight:600':'color:var(--t2)';

      var tds=[];
      function mkARTd(html,style){
        var td=document.createElement('td');td.innerHTML=html;
        td.style.cssText='padding:7px 10px;border:1px solid #e0dff5;vertical-align:middle;background:'+bg+';'+(style||'');
        tds.push(td);tr.appendChild(td);
      }
      mkARTd(esc(r.no||''),'font-weight:700;color:var(--p);font-family:monospace;font-size:11px');
      mkARTd('<strong>'+esc(r.custNm||'')+'</strong>','');
      mkARTd(esc(r.month||''),'font-size:11px;color:var(--t2)');
      mkARTd(esc(r.payType||''),'font-size:11px;color:var(--t2)');
      mkARTd(esc(r.dueDate||'—'),dueDateStyle+';font-size:11px');
      mkARTd('¥'+(parseFloat(r.totalAmt)||0).toFixed(2),'text-align:right;font-size:11px;white-space:nowrap;color:var(--t1)');
      mkARTd(bal>0?'<span style="color:#C41E3A;font-weight:700;font-size:12px">¥'+bal.toFixed(2)+'</span>':'<span style="color:#16a34a;font-weight:700">¥0</span>','text-align:right;white-space:nowrap');
      mkARTd(stTag,'');
      mkARTd(payTag,'');
      var opTd=document.createElement('td');opTd.style.cssText='padding:5px 10px;border:1px solid #e0dff5;vertical-align:middle;white-space:nowrap;background:'+bg;
      tds.push(opTd);tr.appendChild(opTd);
      tr._tds=tds;
      opTd.appendChild(mkBtn('查看','btn bsm bs',function(id){return function(){openARecModal(id);};}(r.id)));
      opTd.appendChild(mkBtn('打印','btn bsm boo',function(id){return function(){printARec(id);};}(r.id)));
      opTd.appendChild(mkBtn('📊 Excel','btn bsm',function(id){return function(){exportARecExcel(id);};}(r.id)));
      if(r.status!=='settled'&&bal>0){
        opTd.appendChild(mkBtn('录收款','btn bsm bgn',function(id){return function(){openPaymentModal(id);};}(r.id)));
      }
      opTd.appendChild(mkBtn('删除','btn bsm br',function(id){return function(){
        if(!confirm('确认删除此对账单？\n删除后出货记录将恢复为未对账状态。'))return;
        var delRec=(DB.arecs||[]).find(function(x){return x.id===id;});
        if(delRec&&delRec.outIds){
          var fgoutsDB=DB.fgouts||[];
          delRec.outIds.forEach(function(oid){
            var o=fgoutsDB.find(function(x){return x.id===oid;});
            if(o&&o.arecId===id)o.arecId='';
          });
          DB.fgouts=fgoutsDB;
        }
        DB.remove('ar',id);
        pgARec();showToast('已删除，出货记录已恢复为未对账状态','success');
      };}(r.id)));
      arTbody.appendChild(tr);
    });
    arTbl.appendChild(arTbody);arWrap.appendChild(arTbl);listCard.appendChild(arWrap);
    var arInfo=document.createElement('div');arInfo.style.cssText='font-size:10.5px;color:var(--t3);margin:5px 2px';
    arInfo.textContent='共 '+filtered.length+' 张 · 拖动表头边框可调整列宽';
    listCard.appendChild(arInfo);
  }

  tabLabels.forEach(function(t,i){
    var cnt=getTabRecs(tabKeys[i]).length;
    var tab=document.createElement('div');
    var isActive=i===activeTab;
    tab.style.cssText='flex:1;padding:7px 0;text-align:center;font-size:11px;font-weight:500;cursor:pointer;border-right:0.5px solid var(--bd);background:'+(isActive?'#1e3a8a':'var(--b3)')+';color:'+(isActive?'#fff':'var(--t2)');
    if(i===tabLabels.length-1)tab.style.borderRight='none';
    tab.textContent=t+'（'+cnt+'）';
    tab.onclick=function(){
      activeTab=i;
      tabBar.querySelectorAll('div').forEach(function(tb,j){tb.style.background=j===i?'#1e3a8a':'var(--b3)';tb.style.color=j===i?'#fff':'var(--t2)';});
      renderList(tabKeys[i]);
    };
    tabBar.appendChild(tab);
  });
  pg.appendChild(tabBar);
  renderList('');
  pg.appendChild(listCard);
}

// ── 对账单导出Excel（简洁专业版）──
function exportARecExcel(id){
  if(typeof ExcelJS==='undefined'){return alert('Excel导出库未加载，请确保联网后刷新页面（Ctrl+Shift+R）再试。');}
  var r=(DB.arecs||[]).find(function(x){return x.id===id;});
  if(!r)return alert('找不到对账单');
  var displayNo=(r.no||'').replace(/^INV/,'STM');
  var fgoutsDB=DB.fgouts||[];
  var orders=DB.orders||[];
  var rolls=typeof fgRolls==='function'?fgRolls():[];

  // ── 收集明细数据 ──
  var outDataList=[];
  var grandTotal=0,totalFee=0;
  (r.outIds||[]).forEach(function(oid){
    var out=fgoutsDB.find(function(x){return x.id===oid;});if(!out)return;
    var ord=orders.find(function(x){return x.no===out.ordNo;})||{};
    var oRolls=rolls.filter(function(x){return (out.rollIds||[]).indexOf(x.id)>=0;});
    var kg=oRolls.reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0);
    var mSum=oRolls.reduce(function(s,x){return s+(parseFloat(x.m)||0);},0);
    var unitPr=parseFloat(ord.unitPr)||0;
    var _byM=(String(ord.prUnit||'').toUpperCase().indexOf('M')>=0)||(String(ord.prUnit||'').indexOf('米')>=0);
    var amt=(_byM?mSum:kg)*unitPr; grandTotal+=amt;
    var clrNms=[...new Set(oRolls.map(function(x){return x.colorNm||'';}).filter(Boolean))].join('、');
    var feeAmt=parseFloat(out.feeAmt)||0;
    if(feeAmt)totalFee+=feeAmt;
    outDataList.push({date:out.date||'',fab:ord.fab||'',clr:clrNms,pcs:oRolls.length,
      kg:parseFloat(kg.toFixed(2)),m:parseFloat(mSum.toFixed(1)),
      unitPr:unitPr,prUnit:(_byM?'米':'KG'),amt:parseFloat(amt.toFixed(2)),
      no:(out.no||'').replace(/^[A-Z]+/,''),custNo:out.custOrdNo||ord.custNo||'',
      rm:out.feeNm&&feeAmt?(out.feeNm+'¥'+feeAmt.toFixed(0)):''});
  });
  var deductTotal=parseFloat(r.deductTotal)||0;
  var addTotal=parseFloat(r.addTotal)||0;
  var paidTotal=parseFloat(r.paidTotal)||0;
  var balance=Math.max(0,grandTotal+totalFee-deductTotal+addTotal-paidTotal);

  // ── 样式常量（极简：只用蓝色系，白底为主）──
  var FN='Microsoft YaHei';
  var BLUE='FF1E3A8A', LIGHTBLUE='FFDBEAFE', MIDBLUE='FFEFF6FF';
  var RED='FFDC2626', GREEN='FF16A34A', GRAY='FF6B7280', DARK='FF111827';
  var WHITE='FFFFFFFF';
  var F_WHITE={type:'pattern',pattern:'solid',fgColor:{argb:WHITE}};
  var F_STRIPE={type:'pattern',pattern:'solid',fgColor:{argb:'FFF9FAFB'}}; // 极淡斑马（几乎白）
  var F_HDR={type:'pattern',pattern:'solid',fgColor:{argb:BLUE}};          // 深蓝表头
  var F_TITLEBAR={type:'pattern',pattern:'solid',fgColor:{argb:LIGHTBLUE}}; // 浅蓝标题区
  var F_FOOTER={type:'pattern',pattern:'solid',fgColor:{argb:MIDBLUE}};    // 极浅蓝底部
  var F_SUBTOTAL={type:'pattern',pattern:'solid',fgColor:{argb:'FFE2E8F0'}};// 小计行灰底
  var F_BAL={type:'pattern',pattern:'solid',fgColor:{argb:'FFEFF6FF'}};    // 余额行极浅蓝底
  // ★ 现代美学核心：只保留水平细线，完全去掉竖向格线
  var BD_LIGHT={top:{style:'thin',color:{argb:'FFF0F0F0'}},bottom:{style:'thin',color:{argb:'FFF0F0F0'}}};
  var BD_HDR={top:{style:'medium',color:{argb:BLUE}},bottom:{style:'medium',color:{argb:BLUE}}};
  var NO_BD={top:{style:'thin',color:{argb:'FFF0F0F0'}},bottom:{style:'thin',color:{argb:'FFF0F0F0'}}};

  function sc(cell,fill,fontOpts,align,border,numFmt){
    if(fill)cell.fill=fill;
    cell.font=Object.assign({name:FN,size:10},fontOpts||{});
    cell.alignment=Object.assign({vertical:'middle',wrapText:false},align||{});
    cell.border=border!==null?(border||BD_LIGHT):{};
    if(numFmt)cell.numFmt=numFmt;
  }

  var wb=new ExcelJS.Workbook();
  wb.creator=CO.nm; wb.created=new Date();
  var ws=wb.addWorksheet('对账单',{pageSetup:{paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.5,right:0.5,top:0.6,bottom:0.6,header:0.3,footer:0.3}}});
  // A列缩窄至8（≈56px）让Logo充满A1，其余不变
  ws.columns=[{width:8},{width:34},{width:16},{width:6},{width:11},{width:13},{width:13},{width:15},{width:22},{width:20}];

  // ── 行1：LOGO（A1浮层）| 公司名（B-C）| 对账单标题居中（D-H）| 单号（I-J）──
  var r1=ws.addRow(['',CO.nm,'','对  账  单','','','','','单号：'+displayNo,'']);
  r1.height=54;
  // 先铺全行底色+顶部粗线
  for(var _fi=1;_fi<=10;_fi++){
    r1.getCell(_fi).fill=F_TITLEBAR;
    r1.getCell(_fi).font={name:FN,size:10};
    r1.getCell(_fi).border={top:{style:'thick',color:{argb:BLUE}}};
  }
  // 公司名（B列，左对齐，加粗）
  sc(r1.getCell(2),F_TITLEBAR,{bold:true,size:13,color:{argb:BLUE}},{horizontal:'left'},{top:{style:'thick',color:{argb:BLUE}}});
  // 对账单标题（D列，居中，超大字）
  sc(r1.getCell(4),F_TITLEBAR,{bold:true,size:22,color:{argb:BLUE}},{horizontal:'center'},{top:{style:'thick',color:{argb:BLUE}}});
  // 单号（I列，右对齐，小字灰色）
  sc(r1.getCell(9),F_TITLEBAR,{size:10,color:{argb:GRAY}},{horizontal:'right'},{top:{style:'thick',color:{argb:BLUE}}});
  ws.mergeCells('B1:C1'); ws.mergeCells('D1:H1'); ws.mergeCells('I1:J1');
  // 嵌入公司LOGO（浮在A1单元格内）
  if(typeof LOGO==='string'&&LOGO.indexOf('base64,')>=0){
    try{
      var _b64=LOGO.split('base64,')[1];
      var _ext=(LOGO.indexOf('image/png')>=0)?'png':'jpeg';
      var _imgId=wb.addImage({base64:_b64,extension:_ext});
      // A列≈56px，Logo 50px，上下各2px边距，视觉充满A1
      ws.addImage(_imgId,{tl:{col:0.08,row:0.05},ext:{width:50,height:50}});
    }catch(e){}
  }

  // ── 行2：致客户（A-C）| 月份（D-E）| 付款方式（F-G）| 到期日（H-J）──
  var r2=ws.addRow(['致：'+(r.custNm||''),'','','对账月份：'+(r.month||''),'','付款方式：'+(r.payType||''),'','到期日：'+(r.dueDate||''),'','']);
  r2.height=22;
  for(var _gi=1;_gi<=10;_gi++){r2.getCell(_gi).fill=F_TITLEBAR;r2.getCell(_gi).font={name:FN,size:10};r2.getCell(_gi).border={};}
  sc(r2.getCell(1),F_TITLEBAR,{bold:true,size:11,color:{argb:DARK}},{horizontal:'left'},null);
  sc(r2.getCell(4),F_TITLEBAR,{size:10,color:{argb:GRAY}},{horizontal:'left'},null);
  sc(r2.getCell(6),F_TITLEBAR,{size:10,color:{argb:GRAY}},{horizontal:'left'},null);
  sc(r2.getCell(8),F_TITLEBAR,{bold:true,size:10,color:{argb:RED}},{horizontal:'left'},null);
  ws.mergeCells('A2:C2'); ws.mergeCells('D2:E2'); ws.mergeCells('F2:G2'); ws.mergeCells('H2:J2');

  // ── 行3：深蓝色实心分隔条（5px高，强视觉分界线）──
  var sepRow=ws.addRow(['','','','','','','','','','']);
  sepRow.height=5;
  for(var _ki=1;_ki<=10;_ki++){
    sepRow.getCell(_ki).fill={type:'pattern',pattern:'solid',fgColor:{argb:BLUE}};
    sepRow.getCell(_ki).border={};
  }

  // ── 行4：列标题 ──
  var hdr=['出货日期','布类规格','颜色','匹数','数量(KG)','单价(元/KG)','金额(元)','我方出货单号','客户订单号','备注'];
  var r3=ws.addRow(hdr);
  r3.height=24;
  r3.eachCell(function(cell){sc(cell,F_HDR,{bold:true,size:10,color:{argb:WHITE}},{horizontal:'center'},BD_HDR);});

  // ── 数据行（白底 + 极淡斑马，无彩色）──
  outDataList.forEach(function(d,i){
    var bg=i%2===0?F_WHITE:F_STRIPE;
    var dr=ws.addRow([d.date,d.fab,d.clr,d.pcs,d.kg,d.unitPr,d.amt,d.no,d.custNo,d.rm]);
    dr.height=22;
    [1,2,3,8,9].forEach(function(c){sc(dr.getCell(c),bg,{size:10},{horizontal:'left'});});
    sc(dr.getCell(10),bg,{size:9,color:{argb:GRAY}},{horizontal:'left',wrapText:true});
    sc(dr.getCell(4),bg,{size:10},{horizontal:'center'});
    sc(dr.getCell(5),bg,{size:10},{horizontal:'right'},'','#,##0.0');
    sc(dr.getCell(6),bg,{size:10,color:{argb:BLUE}},{horizontal:'right'},BD_LIGHT,'#,##0.00');
    sc(dr.getCell(7),bg,{bold:true,size:10,color:{argb:BLUE}},{horizontal:'right'},BD_LIGHT,'#,##0.00');
  });

  // ── 汇总区域（白底，用字体区分，不用背景色）──
  // 小计

// 录收款快捷弹窗
function printARec(id){
  var r=(DB.arecs||[]).find(function(x){return x.id===id;});
  if(!r)return alert('找不到对账单');
  // 打印显示时统一用STM前缀（兼容旧的INV编号）
  var displayNo=(r.no||'').replace(/^INV/,'STM');
  var fgoutsDB=DB.fgouts||[];
  var orders=DB.orders||[];
  var rolls=typeof fgRolls==='function'?fgRolls():[];

  // 收集明细数据
  var outDataList=[];
  var grandTotal=0;
  var totalFee=0;
  var feeDetails=[];
  var hasMeter=false;

  (r.outIds||[]).forEach(function(oid){
    var out=fgoutsDB.find(function(x){return x.id===oid;});if(!out)return;
    var ord=orders.find(function(x){return x.no===out.ordNo;})||{};
    var oRolls=rolls.filter(function(x){return (out.rollIds||[]).indexOf(x.id)>=0;});
    // KG/米：有疋数据用疋数求和，无疋数据从出货记录取
    var kg=oRolls.length>0
      ?oRolls.reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0)
      :(parseFloat(out.totalKG)||parseFloat(out.kg)||0);
    var mSum=oRolls.length>0
      ?oRolls.reduce(function(s,x){return s+(parseFloat(x.m)||0);},0)
      :(parseFloat((out.approxM||'').replace(/[^0-9.]/g,''))||0);
    var unitPr=parseFloat(ord.unitPr)||0;
    var _byM=(String(ord.prUnit||'').toUpperCase().indexOf('M')>=0)||(String(ord.prUnit||'').indexOf('米')>=0);
    var amt=(_byM?mSum:kg)*unitPr;
    grandTotal+=amt;
    var clrNms=oRolls.length>0
      ?[...new Set(oRolls.map(function(x){return x.colorNm||'';}).filter(Boolean))].join('、')
      :(out.clrNm||out.colorNm||'');
    var custNo=out.custOrdNo||ord.custNo||'';
    var meterVal=_byM?(mSum>0?mSum.toFixed(1):''):((out.approxM||'').replace(/[^0-9.]/g,''));
    if(meterVal)hasMeter=true;
    var feeNm=out.feeNm||'';
    var feeAmt=parseFloat(out.feeAmt)||0;
    var noClean=(out.no||'').replace(/^[A-Z]+/,'');// 去前缀纯数字
    var rm=[];
    if(feeNm&&feeAmt){
      totalFee+=feeAmt;
      feeDetails.push(noClean);
      rm.push(feeNm+'¥'+feeAmt.toFixed(0));
    }
    outDataList.push({
      date:out.date||'',no:noClean,fab:ord.fab||'',clr:clrNms,
      pcs:oRolls.length,kg:kg,meter:meterVal,unitPr:unitPr,amt:amt,

  // 构建明细行
  var outRows='';
  outDataList.forEach(function(d,idx){
    var bg=idx%2===0?'':'background:#f8f9ff';
    var meterTd=hasMeter?'<td style="border:1px solid #e0e0e0;padding:4px 6px;text-align:center;font-size:10px;color:#555">'+(d.meter||'—')+'</td>':'';
    outRows+='<tr style="'+bg+'">'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;font-size:9.5px;color:#555;white-space:nowrap">'+esc(d.date)+'</td>'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;font-size:10px">'+esc(d.fab)+'</td>'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;font-size:10px;white-space:nowrap">'+esc(d.clr)+'</td>'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;text-align:center;font-size:10px">'+d.pcs+'</td>'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;text-align:center;font-size:10px">'+d.kg.toFixed(1)+'</td>'
      +meterTd
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;text-align:center;font-size:10px;color:#1e3a8a;font-weight:600">'+(d.unitPr?'¥'+d.unitPr+'/'+(d.prUnit||'KG'):'—')+'</td>'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;text-align:center;font-family:monospace;font-size:9.5px;color:#1e3a8a">'+esc(d.no)+'</td>'
      +'<td style="border:1px solid #e0e0e0;padding:4px 6px;text-align:right;font-weight:600;font-size:10px">'+(d.amt?'¥'+d.amt.toFixed(2):'—')+'</td>'

function openPaymentModal(arecId){
  var rec=DB.arecs.find(function(x){return x.id===arecId;});

  var modal=buildModal('录入收款 — '+rec.custNm,'',function(body){
    body.style.cssText='padding:16px;display:flex;flex-direction:column;gap:12px';
    var info=document.createElement('div');

    info.innerHTML='<strong>客户：</strong>'+esc(rec.custNm)+'　<strong>对账月份：</strong>'+esc(rec.month)+'　<strong>欠尾款：</strong>¥'+(parseFloat(rec.balanceAmt)||0).toFixed(2);
    body.appendChild(info);
    var g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
    function mF(lbl,el){var w=document.createElement('div');var l=document.createElement('label');l.style.cssText='display:block;font-size:9px;font-weight:700;color:#999;letter-spacing:.5px;margin-bottom:4px';l.textContent=lbl;w.appendChild(l);w.appendChild(el);return w;}
    function mI(id,val,ph,type){var i=document.createElement('input');i.id='pay-'+id;i.value=val||'';i.placeholder=ph||'';i.type=type||'text';i.style.cssText='width:100%;padding:7px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;background:#fff;outline:none;box-sizing:border-box';return i;}
    var amtInp=mI('amt','','¥ 收款金额');amtInp.type='number';amtInp.style.color='#16a34a';amtInp.style.fontWeight='700';amtInp.style.borderColor='#A7F3D0';
    g.appendChild(mF('收款金额 *',amtInp));
    g.appendChild(mF('收款日期',mI('date',new Date().toISOString().slice(0,10),'','date')));
    g.appendChild(mF('收款方式',mI('method','转账','如：转账、现金')));
    g.appendChild(mF('备注',mI('rm','','如：凭证号')));
    body.appendChild(g);
  },function(){
    var amt=parseFloat((document.getElementById('pay-amt')||{value:0}).value)||0;
    if(!amt)return alert('请填写收款金额');
    var date=(document.getElementById('pay-date')||{value:''}).value;
    var method=(document.getElementById('pay-method')||{value:''}).value;
    var rm=(document.getElementById('pay-rm')||{value:''}).value;
    var payment={date:date,amt:String(amt),method:method,rm:rm};
    if(!rec.payments)rec.payments=[];
    rec.payments.push(payment);
    // 重算欠尾款
    var totalPaid=rec.payments.reduce(function(s,p){return s+(parseFloat(p.amt)||0);},0);
    var netAmt=(parseFloat(rec.totalAmt)||0)-(parseFloat(rec.deductTotal)||0)+(parseFloat(rec.addTotal)||0);
    rec.balanceAmt=String(Math.max(0,netAmt-totalPaid));
    if(parseFloat(rec.balanceAmt)<=0)rec.status='settled';
    DB.arecs=DB.arecs;
    cm();pgARec();showToast('收款已录入','success');
  },'确认录入');
  om(modal);
}

    var payHid=document.createElement('input');payHid.type='hidden';payHid.id='ar-payType';payHid.value=rec?rec.payType||'':'';

    // 到期日显示

    function updatePayAndDue(){

      var custOrds=orders.filter(function(o){return (o.custNm||o.cust||'')=== cNm;});

    var outWrap=document.createElement('div');outWrap.id='ar-out-wrap';

    outWrap.appendChild(outInfo);
    body.appendChild(outWrap);

    // 拉取按钮
    var fetchBtn=mkBtn('&#128229; 拉取未对账出货记录','btn bp',function(){
      var cNm=custSel.value;var mVal=monthInp.value;
      if(!cNm||!mVal)return alert('请先选择客户和对账月份');
      var curRecId=rec?rec.id:null;
      var savedOutIds=(rec&&rec.outIds)||[];
      // 找该客人所有未对账的出货记录（编辑模式下，也要包含已经挂在本单里的记录）
      // 拉取：本月出货 + 历史遗留未对账（未挂任何对账单的旧记录）
      var matched=fgouts.filter(function(o){
        if(o.arecId&&o.arecId!==curRecId)return false; // 已在其它对账单
        if((o.custNm||'')!==cNm)return false; // 客户不匹配
        var outYM=(o.date||'').slice(0,7);
        // 本月出货 OR 历史遗留（出货月份早于对账月份且未对账）
        return outYM<=mVal;
      });
      // 标记哪些是遗留（出货月份 < 对账月份）
      matched.forEach(function(o){
        o._isLegacy=(o.date||'').slice(0,7)<mVal;
      });
      // 查找匹配的退货记录（用于红字冲销行）
      var retForMatched={};
      (DB.fgreturns||[]).forEach(function(ret){
        if(!ret.outId||ret.status==='cancelled')return;
        if(matched.some(function(o){return o.id===ret.outId;})||savedOutIds.indexOf(ret.outId)>=0){
          if(!retForMatched[ret.outId])retForMatched[ret.outId]=[];
          retForMatched[ret.outId].push(ret);
        }
      });
      outWrap.innerHTML='';
      if(!matched.length){
        var tip=document.createElement('div');tip.style.cssText='padding:12px;text-align:center;color:var(--t3);font-size:11px';tip.textContent='暂无未对账出货记录';outWrap.appendChild(tip);return;
      }
      var selAll=document.createElement('div');selAll.style.cssText='padding:6px 10px;background:#EFF6FF;display:flex;align-items:center;gap:8px;font-size:11px';
      var saLbl=document.createElement('label');saLbl.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;color:#1e3a8a;font-weight:600';
      var saCb=document.createElement('input');saCb.type='checkbox';
      // 新建：全选；编辑：跟随本单已关联的记录
      saCb.checked=!rec||matched.every(function(o){return savedOutIds.indexOf(o.id)>=0;});
      saCb.onchange=function(){outWrap.querySelectorAll('.ar-out-cb:not(:disabled)').forEach(function(c){c.checked=saCb.checked;});calcTotal();};
      saLbl.appendChild(saCb);saLbl.appendChild(document.createTextNode('全选'));
      var selInfo=document.createElement('span');selInfo.id='ar-sel-info';selInfo.style.cssText='margin-left:auto;color:#1e3a8a;font-weight:600';
      selAll.appendChild(saLbl);selAll.appendChild(selInfo);outWrap.appendChild(selAll);

      var tbl=document.createElement('table');tbl.style.cssText='width:100%;border-collapse:collapse;font-size:11px';
      var thead=document.createElement('thead');
      // 判断本批出货是否为米计价（取第一条出货的订单prUnit）
      var _firstOrd=orders.find(function(x){return matched.length&&x.no===matched[0].ordNo;})||{};
      var _byMHeader=(String(_firstOrd.prUnit||'').toUpperCase().indexOf('M')>=0)||(String(_firstOrd.prUnit||'').indexOf('米')>=0);
      var _qtyLabel=_byMHeader?'米数':'KG';
      thead.innerHTML='<tr style="background:#EFF6FF;border-bottom:2px solid #1e3a8a">'
        +'<th style="padding:5px 8px;width:28px"><input type="checkbox" checked id="ar-all-cb2"></th>'
        +'<th style="padding:5px 8px;text-align:left;color:#1e3a8a;font-size:10px">送货单号</th>'
        +'<th style="padding:5px 8px;text-align:left;color:#1e3a8a;font-size:10px">订单号</th>'
        +'<th style="padding:5px 8px;text-align:left;color:#1e3a8a;font-size:10px">颜色</th>'
        +'<th style="padding:5px 8px;text-align:center;color:#1e3a8a;font-size:10px">'+_qtyLabel+'</th>'
        +'<th style="padding:5px 8px;text-align:center;color:#1e3a8a;font-size:10px">单价</th>'
        +'<th style="padding:5px 8px;text-align:right;color:#1e3a8a;font-size:10px">金额</th>'
        +'<th style="padding:5px 8px;text-align:left;color:#1e3a8a;font-size:10px">出货日期</th></tr>';
      tbl.appendChild(thead);
      var tbody=document.createElement('tbody');
      matched.forEach(function(o,idx){
        var oRolls=rolls.filter(function(r){return (o.rollIds||[]).indexOf(r.id)>=0;});
        // KG：有疋数据求和；无疋数据从出货记录字段取
        var kg=oRolls.length>0
          ?oRolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0)
          :(parseFloat(o.totalKG)||parseFloat(o.kg)||0);
        var mTot=oRolls.length>0
          ?oRolls.reduce(function(s,r){return s+(parseFloat(r.m)||0);},0)
          :(parseFloat((o.approxM||'').replace(/[^0-9.]/g,''))||0);
        // 找订单单价 + 计价单位
        var ord=orders.find(function(x){return x.no===o.ordNo;})||{};
        var baseUnitPr=parseFloat(ord.unitPr)||0;
        var _pu=String(ord.prUnit||'').toUpperCase();
        var byM=(_pu.indexOf('M')>=0)||(String(ord.prUnit||'').indexOf('米')>=0);
        // 金额计算：有疋数据按疋累加；无疋数据按汇总数量×单价
        var amt=0;
        if(baseUnitPr>0){
          if(oRolls.length>0){
            amt=oRolls.reduce(function(s,r){
              var clr=(ord.colors||[]).find(function(c){return c.nm===r.colorNm;})||{};
              var extraPr=parseFloat(clr.extraPr)||0;
              var qty=byM?(parseFloat(r.m)||0):(parseFloat(r.kg)||0);
              return s+qty*(baseUnitPr+extraPr);
            },0);
          } else {
            // 无疋数据：直接用汇总量×单价
            var qty2=byM?mTot:kg;
            amt=qty2*baseUnitPr;
          }
        }
        var unitPr=baseUnitPr;
        var clrNms=oRolls.length>0
          ?[...new Set(oRolls.map(function(r){return r.colorNm||'';}).filter(Boolean))].join('、')
          :(o.clrNm||o.colorNm||'');
        var tr=document.createElement('tr');
        // 遗留记录：橙色背景警示
        if(o._isLegacy){
          tr.style.cssText='border-bottom:.5px solid #FED7AA;background:#FFFBF5';
        } else {
          tr.style.borderBottom='.5px solid #f0f0f0';
        }
        var cb=document.createElement('input');cb.type='checkbox';cb.className='ar-out-cb';cb.value=o.id;
        // 新建默认勾选；编辑模式下，只勾选之前保存的那些
        cb.checked=!rec||savedOutIds.indexOf(o.id)>=0;
        cb.dataset.kg=kg.toFixed(1);cb.dataset.amt=amt.toFixed(2);
        cb.onchange=calcTotal;
        var cbTd=document.createElement('td');cbTd.style.cssText='padding:5px 8px;text-align:center';cbTd.appendChild(cb);
        tr.appendChild(cbTd);
        // 数量列：米计价显示米数，KG计价显示KG
        var _qtyDisp=byM?(mTot>0?mTot.toFixed(1):'—'):kg.toFixed(1);
        var _unitDisp=unitPr?(unitPr+(ord.prUnit||'/KG')):'—';
        // 遗留标签
        var _legacyTag=o._isLegacy
          ?'<span style="display:inline-block;background:#F97316;color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600">⚠ '+(o.date||'').slice(0,7)+' 遗留</span>'
          :'';
        tr.innerHTML+=
          '<td style="padding:5px 8px;font-size:10px;color:var(--p);font-weight:600">'+esc(o.no||'')+_legacyTag+'</td>'+
          '<td style="padding:5px 8px;font-size:10px">'+esc(o.ordNo||'')+'</td>'+
          '<td style="padding:5px 8px;font-size:10px">'+esc(clrNms||'—')+'</td>'+
          '<td style="padding:5px 8px;text-align:center;font-size:10px;font-weight:600">'+_qtyDisp+'</td>'+
          '<td style="padding:5px 8px;text-align:center;font-size:10px;color:#555">'+_unitDisp+'</td>'+
          '<td style="padding:5px 8px;text-align:right;font-size:10px;font-weight:600;color:#1e3a8a">'+(amt?'¥'+amt.toFixed(2):'手填')+'</td>'+
          '<td style="padding:5px 8px;font-size:10px;color:var(--t2)">'+esc(o.date||'')+'</td>';
        tbody.appendChild(tr);
        // ── 退货/扣损红字冲销行 ──
        var retRecs=(retForMatched||{})[o.id];
        if(retRecs&&retRecs.length){
          retRecs.forEach(function(retRec){
            var retTotalKG=parseFloat(retRec.totalKG)||0;
            var retDeductKG=parseFloat(retRec.deductKG)||retTotalKG;
            if(retDeductKG<=0)return;
            // 按扣损KG比例计算金额
            var retAmtVal=0;
            if(kg>0&&amt>0){retAmtVal=-(retDeductKG/kg)*amt;}
            var retTr=document.createElement('tr');
            retTr.style.cssText='background:#FEF2F2;border-bottom:.5px solid #FECACA';
            var retTd=document.createElement('td');retTd.style.cssText='padding:5px 8px;text-align:center';
            var retCb=document.createElement('input');retCb.type='checkbox';retCb.className='ar-out-cb';
            retCb.checked=true;retCb.disabled=true;
            retCb.dataset.kg=(-retDeductKG).toFixed(1);retCb.dataset.amt=retAmtVal.toFixed(2);
            retTd.appendChild(retCb);
            retTr.appendChild(retTd);
            var retNoTd=document.createElement('td');retNoTd.style.cssText='padding:5px 8px;font-size:10px;color:#DC2626;font-weight:600';
            retNoTd.innerHTML='↩ 退货 <span style="font-family:monospace">'+esc(retRec.no||'')+'</span>';
            retTr.appendChild(retNoTd);
            retTr.innerHTML+=
              '<td style="padding:5px 8px;font-size:10px;color:#991B1B">原单 '+esc(o.no||'')+'</td>'+
              '<td style="padding:5px 8px;font-size:10px;color:#B91C1C">'+esc(retRec.reason||'品质问题')+'</td>'+
              '<td style="padding:5px 8px;text-align:center;font-size:10px;font-weight:600;color:#DC2626">-'+retDeductKG.toFixed(1)+'</td>'+
              '<td style="padding:5px 8px;text-align:center;font-size:10px;color:#991B1B">—</td>'+
              '<td style="padding:5px 8px;text-align:right;font-size:10px;font-weight:600;color:#DC2626">¥'+retAmtVal.toFixed(2)+'</td>'+
              '<td style="padding:5px 8px;font-size:10px;color:#991B1B">'+esc(retRec.date||'')+'</td>';
            tbody.appendChild(retTr);
          });
        }
      });
      tbl.appendChild(tbody);outWrap.appendChild(tbl);
      // 绑定表头全选联动
      var allCb2=outWrap.querySelector('#ar-all-cb2');
      if(allCb2){
        allCb2.onchange=function(){
          outWrap.querySelectorAll('.ar-out-cb:not(:disabled)').forEach(function(c){c.checked=allCb2.checked;});
          calcTotal();
        };
      }
      // 单条变化时同步全选状态
      outWrap.querySelectorAll('.ar-out-cb:not(:disabled)').forEach(function(c){
        var orig=c.onchange;
        c.onchange=function(){
          if(orig)orig.call(this);
          var all=outWrap.querySelectorAll('.ar-out-cb:not(:disabled)');
          var chk=outWrap.querySelectorAll('.ar-out-cb:checked:not(:disabled)');
          if(allCb2)allCb2.checked=(all.length>0&&all.length===chk.length);
          calcTotal();
        };
      });
      calcTotal();

      function calcTotal(){
        var cbs=outWrap.querySelectorAll('.ar-out-cb:checked');
        var totKg=0,totAmt=0;
        cbs.forEach(function(c){totKg+=parseFloat(c.dataset.kg||0);totAmt+=parseFloat(c.dataset.amt||0);});
        var si=document.getElementById('ar-sel-info');if(si)si.textContent='已选'+cbs.length+'笔 · ¥'+totAmt.toFixed(2);
        var ta=document.getElementById('ar-calc-total');if(ta)ta.textContent='¥'+totAmt.toFixed(2);
        recalcBalance();
      }
      window._arecCalcTotal=calcTotal;
    });
    body.appendChild(fetchBtn);

    // ③ 扣减/附加
    var s3lbl=document.createElement('div');s3lbl.style.cssText='font-size:10px;font-weight:700;color:#DC2626;letter-spacing:1px;margin-top:4px';s3lbl.textContent='③ 扣减 / 附加费（可选）';
    body.appendChild(s3lbl);
    var adjWrap=document.createElement('div');adjWrap.id='ar-adj-wrap';
    var initAdj=rec&&rec.adjustments?rec.adjustments:[{type:'deduct',desc:'',ref:'',amt:''}];
    function addAdjRow(d){
      var row=document.createElement('div');row.className='ar-adj-row';row.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:6px';
      var typeSel=document.createElement('select');typeSel.className='ar-adj-type';typeSel.style.cssText='padding:5px 8px;border:1.5px solid var(--bd);border-radius:6px;font-size:11px;background:#fff;outline:none;width:80px';
      [{v:'deduct',l:'扣减'},{v:'add',l:'附加费'}].forEach(function(o){var opt=new Option(o.l,o.v);if(d&&d.type===o.v)opt.selected=true;typeSel.appendChild(opt);});
      var descInp=document.createElement('input');descInp.className='ar-adj-desc';descInp.placeholder='说明（如：品质扣款、小缸费）';descInp.value=d?d.desc||'':'';descInp.style.cssText='flex:3;padding:5px 8px;border:1.5px solid var(--bd);border-radius:6px;font-size:11px;background:#fff;outline:none';
      var refInp=document.createElement('input');refInp.className='ar-adj-ref';refInp.placeholder='涉及订单/码单';refInp.value=d?d.ref||'':'';refInp.style.cssText='flex:2;padding:5px 8px;border:1.5px solid var(--bd);border-radius:6px;font-size:11px;background:#fff;outline:none';
      var amtInp=document.createElement('input');amtInp.className='ar-adj-amt';amtInp.placeholder='金额';amtInp.type='number';amtInp.step='0.01';amtInp.value=d?d.amt||'':'';amtInp.style.cssText='flex:1;padding:5px 8px;border:1.5px solid #FECACA;border-radius:6px;font-size:11px;color:#DC2626;font-weight:600;text-align:right;background:#FEF2F2;outline:none';
      amtInp.oninput=recalcBalance;
      var del=mkBtn('×','btn bsm br',function(){row.remove();recalcBalance();});
      row.appendChild(typeSel);row.appendChild(descInp);row.appendChild(refInp);row.appendChild(amtInp);row.appendChild(del);
      adjWrap.appendChild(row);
    }
    initAdj.forEach(function(d){addAdjRow(d);});
    body.appendChild(adjWrap);
    body.appendChild(mkBtn('＋ 添加扣减/附加','btn bsm bs',function(){addAdjRow(null);}));

    // ④ 已收款
    var s4lbl=document.createElement('div');s4lbl.style.cssText='font-size:10px;font-weight:700;color:#15803D;letter-spacing:1px;margin-top:4px';s4lbl.textContent='④ 已收款记录';
    body.appendChild(s4lbl);
    var payWrap=document.createElement('div');payWrap.id='ar-pay-wrap';
    var initPays=rec&&rec.payments?rec.payments:[];
    function addPayRow(p){
      var row=document.createElement('div');row.className='ar-pay-row';row.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:6px;background:#F0FDF4;padding:6px 8px;border-radius:6px;border:1px solid #A7F3D0';
      var dateInp=document.createElement('input');dateInp.className='ar-pay-date';dateInp.type='date';dateInp.value=p?p.date||'':'';dateInp.style.cssText='flex:1;padding:5px 8px;border:1.5px solid #A7F3D0;border-radius:6px;font-size:11px;background:#fff;outline:none';
      var amtInp=document.createElement('input');amtInp.className='ar-pay-amt';amtInp.type='number';amtInp.step='0.01';amtInp.placeholder='收款金额';amtInp.value=p?p.amt||'':'';amtInp.style.cssText='flex:1;padding:5px 8px;border:1.5px solid #A7F3D0;border-radius:6px;font-size:11px;color:#16a34a;font-weight:700;text-align:right;background:#fff;outline:none';
      amtInp.oninput=recalcBalance;
      var methInp=document.createElement('input');methInp.className='ar-pay-meth';methInp.placeholder='方式（转账/现金）';methInp.value=p?p.method||'':'';methInp.style.cssText='flex:1;padding:5px 8px;border:1.5px solid #A7F3D0;border-radius:6px;font-size:11px;background:#fff;outline:none';
      var rmInp=document.createElement('input');rmInp.className='ar-pay-rm';rmInp.placeholder='备注';rmInp.value=p?p.rm||'':'';rmInp.style.cssText='flex:2;padding:5px 8px;border:1.5px solid #A7F3D0;border-radius:6px;font-size:11px;background:#fff;outline:none';
      var del=mkBtn('×','btn bsm br',function(){row.remove();recalcBalance();});
      row.appendChild(dateInp);row.appendChild(amtInp);row.appendChild(methInp);row.appendChild(rmInp);row.appendChild(del);
      payWrap.appendChild(row);
    }
    initPays.forEach(function(p){addPayRow(p);});
    body.appendChild(payWrap);
    body.appendChild(mkBtn('＋ 录入收款','btn bsm bgn',function(){addPayRow(null);}));

    // ⑤ 汇总
    var s5=document.createElement('div');s5.style.cssText='background:#1e3a8a;color:#fff;padding:12px 16px;border-radius:6px;display:flex;justify-content:flex-end;align-items:center;gap:16px;flex-wrap:wrap;margin-top:4px';
    function calcSpan(lbl,id,color){var w=document.createElement('div');w.style.cssText='text-align:right';var l=document.createElement('div');l.style.cssText='font-size:9px;color:#93C5FD;margin-bottom:2px';l.textContent=lbl;var v=document.createElement('div');v.id='ar-calc-'+id;v.style.cssText='font-size:15px;font-weight:800;'+(color||'color:#fff');v.textContent='¥0.00';w.appendChild(l);w.appendChild(v);return w;}
    function opSpan(t){var s=document.createElement('div');s.style.cssText='font-size:18px;color:#93C5FD;padding-top:10px';s.textContent=t;return s;}
    s5.appendChild(calcSpan('货款合计','total'));
    s5.appendChild(opSpan('−'));
    s5.appendChild(calcSpan('扣减合计','deduct','color:#FCA5A5'));
    s5.appendChild(opSpan('+'));
    s5.appendChild(calcSpan('附加费','add','color:#FDE68A'));
    s5.appendChild(opSpan('−'));
    s5.appendChild(calcSpan('已收款','paid','color:#86EFAC'));
    s5.appendChild(opSpan('='));
    s5.appendChild(calcSpan('应收金额','balance','color:#FCA5A5;font-size:18px'));
    body.appendChild(s5);

    function recalcBalance(){
      var total=0;
      document.querySelectorAll('.ar-out-cb:checked').forEach(function(c){total+=parseFloat(c.dataset.amt||0);});
      var deduct=0,add=0;
      document.querySelectorAll('.ar-adj-row').forEach(function(row){
        var t=row.querySelector('.ar-adj-type');var a=parseFloat(row.querySelector('.ar-adj-amt').value)||0;
        if(t&&t.value==='deduct')deduct+=a;else add+=a;
      });
      var paid=0;document.querySelectorAll('.ar-pay-amt').forEach(function(i){paid+=parseFloat(i.value)||0;});
      var bal=Math.max(0,total-deduct+add-paid);
      var f=function(v){return '¥'+v.toFixed(2);};
      var set=function(id,val){var el=document.getElementById('ar-calc-'+id);if(el)el.textContent=val;};
      set('total',f(total));set('deduct',f(deduct));set('add',f(add));set('paid',f(paid));set('balance',f(bal));
    }
    setTimeout(recalcBalance,100);
    // 编辑模式：自动拉取出货记录（客户和月份已回填）并重算汇总
    if(rec){
      setTimeout(function(){try{fetchBtn.click();}catch(_){}},80);
      setTimeout(function(){if(window._arecCalcTotal)window._arecCalcTotal();},180);
    }

  },function(){
    // 保存
    var custNm=(document.getElementById('ar-cust')||{value:''}).value;
    if(!custNm)return alert('请选择客户');
    var month=(document.getElementById('ar-month')||{value:''}).value;
    if(!month)return alert('请填写对账月份');

    // 重复检测：新建时检查同客户+同月份是否已存在
    if(isNew){
      var existing=(DB.arecs||[]).find(function(x){return x.custNm===custNm&&x.month===month;});
      if(existing){
        alert('⚠️ 已存在「'+custNm+'」'+month+'的对账单（'+existing.no+'）\n\n请勿重复建单，如需修改请直接编辑已有的对账单。');
        cm();openARecModal(existing.id);return;
      }
    }

    var payType=(document.getElementById('ar-payType')||{value:''}).value||'月结30天';
    var dueDate=calcDueDate(payType,month);

    // 收集勾选的出货单
    var selOutIds=[];
    document.querySelectorAll('.ar-out-cb:checked').forEach(function(c){selOutIds.push(c.value);});
    var total=0;
    document.querySelectorAll('.ar-out-cb:checked').forEach(function(c){total+=parseFloat(c.dataset.amt||0);});

    // 扣减/附加
    var adjustments=[];
    document.querySelectorAll('.ar-adj-row').forEach(function(row){
      var desc=row.querySelector('.ar-adj-desc').value.trim();
      var ref=row.querySelector('.ar-adj-ref').value.trim();
      var amt=parseFloat(row.querySelector('.ar-adj-amt').value)||0;
      var type=row.querySelector('.ar-adj-type').value;
      if(desc||amt)adjustments.push({type:type,desc:desc,ref:ref,amt:String(amt)});
    });
    var deductTotal=adjustments.filter(function(a){return a.type==='deduct';}).reduce(function(s,a){return s+(parseFloat(a.amt)||0);},0);
    var addTotal=adjustments.filter(function(a){return a.type==='add';}).reduce(function(s,a){return s+(parseFloat(a.amt)||0);},0);

    // 收款
    var payments=[];
    document.querySelectorAll('.ar-pay-row').forEach(function(row){
      var amt=parseFloat(row.querySelector('.ar-pay-amt').value)||0;
      var date=row.querySelector('.ar-pay-date').value;
      var method=row.querySelector('.ar-pay-meth').value;
      var rm=row.querySelector('.ar-pay-rm').value;
      if(amt)payments.push({amt:String(amt),date:date,method:method,rm:rm});
    });
    var paidTotal=payments.reduce(function(s,p){return s+(parseFloat(p.amt)||0);},0);
    var netAmt=total-deductTotal+addTotal;
    var balance=Math.max(0,netAmt-paidTotal);

    var data={
      id:rec?rec.id:'ar_'+Date.now(),
      no:rec?rec.no:arecNo(),
      custNm:custNm,month:month,payType:payType,dueDate:dueDate,
      outIds:selOutIds,totalAmt:String(total),
      adjustments:adjustments,deductTotal:String(deductTotal),addTotal:String(addTotal),
      payments:payments,paidTotal:String(paidTotal),
      balanceAmt:String(balance),
      status:balance<=0?'settled':'pending',
      createdDate:rec?rec.createdDate:new Date().toISOString().slice(0,10)
    };

    // 标记出货记录已对账（编辑时：先清除原本挂在本单但此次未被勾选的记录）
    var fgoutsDB=DB.fgouts||[];
    var prevOutIds=(rec&&rec.outIds)||[];
    prevOutIds.forEach(function(oid){
      if(selOutIds.indexOf(oid)<0){
        var po=fgoutsDB.find(function(x){return x.id===oid;});
        if(po&&po.arecId===data.id)po.arecId='';
      }
    });
    selOutIds.forEach(function(oid){
      var o=fgoutsDB.find(function(x){return x.id===oid;});
      if(o)o.arecId=data.id;
    });
    DB.fgouts=fgoutsDB;

    var list=DB.arecs||[];
    var idx=list.findIndex(function(x){return x.id===data.id;});
    if(idx>=0)list[idx]=data;else list.push(data);
    DB.arecs=list;

    cm();pgARec();showToast('对账单已保存 '+data.no,'success');
  },'保存');
  om(modal);
}

function pgRecon(){
  var pg=document.getElementById('pg');if(!pg)return;pg.innerHTML='';
  var recs=DB.recons||[];
  var facts=DB.facts||[];

  // 页头
  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  var ht=document.createElement('div');ht.style.cssText='font-size:14px;font-weight:700;color:var(--t1)';ht.textContent='加工厂对账单';
  var nb=mkBtn('＋ 新建对账单','btn bp',function(){openReconModal(null);});
  hdr.appendChild(ht);hdr.appendChild(nb);pg.appendChild(hdr);

  // 统计卡
  var sr=document.createElement('div');sr.className='sr';
  var pending=recs.filter(function(r){return r.status==='pending';});
  var confirmed=recs.filter(function(r){return r.status==='confirmed';});
  var paid=recs.filter(function(r){return r.status==='paid';});
  var totalUnpaid=confirmed.reduce(function(s,r){return s+(parseFloat(r.actualAmt)||0);},0);
  [
    [recs.length+'张','对账单总数','累计','sb2'],
    [pending.length+'张','待核对','需处理','sg'],
    [confirmed.length+'张','待付款','已确认','sb'],
    ['¥'+totalUnpaid.toFixed(0),'待付金额','已确认未付','so']
  ].forEach(function(s){
    var st=document.createElement('div');st.className='st '+s[3];
    st.innerHTML='<div class="sl">'+s[1]+'</div><div class="sv">'+s[0]+'</div><div class="ss">'+s[2]+'</div>';
    sr.appendChild(st);
  });
  pg.appendChild(sr);

  // 筛选tab
  var tabs=['全部','待核对','待付款','已付款'];
  var tabKeys=['','pending','confirmed','paid'];
  var activeTab=0;
  var tabBar=document.createElement('div');
  tabBar.style.cssText='display:flex;gap:0;margin-bottom:12px;border:0.5px solid var(--bd);border-radius:6px;overflow:hidden';
  var listCard=document.createElement('div');listCard.className='card';listCard.style.marginBottom='0';

  function renderList(filterKey){
    var filtered=filterKey?recs.filter(function(r){return r.status===filterKey;}):recs;
    listCard.innerHTML='';
    var ch=document.createElement('div');ch.className='ch';
    ch.innerHTML='<span class="ct">对账单列表（'+filtered.length+'张）</span>';
    listCard.appendChild(ch);
    if(!filtered.length){
      var empty=document.createElement('div');empty.style.cssText='text-align:center;padding:28px;color:var(--t3)';
      empty.innerHTML='&#128203; 暂无对账单<br><span style="font-size:11px">点击「新建对账单」开始</span>';
      listCard.appendChild(empty);return;
    }
    var rows=filtered.slice().reverse().map(function(r){
      var tr=document.createElement('tr');
      tr.style.cssText='cursor:pointer;transition:background .12s';
      tr.onmouseover=function(){this.style.background='var(--b3)';};
      tr.onmouseout=function(){this.style.background='';};
      var stBadge={pending:'<span class="bx" style="background:#FEF3C7;color:#92400E;border:1px solid #FDE68A">待核对</span>',confirmed:'<span class="bx" style="background:#DBEAFE;color:#1e3a8a;border:1px solid #BFDBFE">待付款</span>',paid:'<span class="bx bxg">已付款</span>'}[r.status]||'—';
      var typeTag={dyeing:'<span class="bx" style="background:#F0FDF4;color:#166534;border:1px solid #BBF7D0">染厂</span>',finishing:'<span class="bx" style="background:#EFF6FF;color:#1e3a8a;border:1px solid #BFDBFE">后整理</span>',weaving:'<span class="bx" style="background:#FEF3C7;color:#92400E;border:1px solid #FDE68A">织厂</span>'}[r.factType]||'<span class="bx">其他</span>';
      var deductAmt=parseFloat(r.deductTotal)||0;
      var actualAmt=parseFloat(r.actualAmt)||0;
      tr.innerHTML=
        '<td style="font-weight:700;color:var(--p);font-size:11px">'+esc(r.no||'')+'</td>'+
        '<td>'+esc(r.factNm||'')+'</td>'+
        '<td>'+typeTag+'</td>'+
        '<td style="font-size:11px">'+esc(r.month||'')+'</td>'+
        '<td style="text-align:right;font-size:11px">¥'+parseFloat(r.billAmt||0).toFixed(2)+'</td>'+
        '<td style="text-align:right;color:#DC2626;font-size:11px">'+(deductAmt?'-¥'+deductAmt.toFixed(2):'—')+'</td>'+
        '<td style="text-align:right;font-weight:700;color:#C41E3A;font-size:12px">¥'+actualAmt.toFixed(2)+'</td>'+
        '<td>'+stBadge+'</td>';
      var opTd=document.createElement('td');opTd.style.whiteSpace='nowrap';
      opTd.appendChild(mkBtn('查看','btn bsm bs',function(id){return function(){openReconModal(id);};}(r.id)));
      if(r.status==='confirmed'){
        opTd.appendChild(mkBtn('标记付款','btn bsm bgn',function(id){return function(){
          var rec=DB.recons.find(function(x){return x.id===id;});
          if(rec&&confirm('确认已付款 ¥'+parseFloat(rec.actualAmt).toFixed(2)+'？')){
            rec.status='paid';rec.paidDate=new Date().toISOString().slice(0,10);
            DB.recons=DB.recons;pgRecon();showToast('已标记付款','success');
          }
        };}(r.id)));
      }
      opTd.appendChild(mkBtn('删除','btn bsm br',function(id){return function(){
        if(!confirm('确认删除此对账单？'))return;
        DB.remove('rc',id);
        pgRecon();showToast('已删除','success');
      };}(r.id)));
      tr.appendChild(opTd);
      tr.addEventListener('click',function(e){if(e.target.tagName==='BUTTON')return;openReconModal(r.id);});
      return tr;
    });
    listCard.appendChild(buildTable(['对账单号','加工厂','类型','月份','账单金额','扣减','实付金额','状态','操作'],rows));
  }

  tabs.forEach(function(t,i){
    var tab=document.createElement('div');
    tab.style.cssText='flex:1;padding:7px 0;text-align:center;font-size:11px;font-weight:500;cursor:pointer;border-right:0.5px solid var(--bd);'+(i===activeTab?'background:#1e3a8a;color:#fff':'background:var(--b3);color:var(--t2)');
    var cnt=tabKeys[i]?recs.filter(function(r){return r.status===tabKeys[i];}).length:recs.length;
    tab.textContent=t+'（'+cnt+'）';

      activeTab=i;
      tabBar.querySelectorAll('div').forEach(function(tb,j){tb.style.background=j===i?'#1e3a8a':'var(--b3)';tb.style.color=j===i?'#fff':'var(--t2)';});
      renderList(tabKeys[i]);
    };
    tabBar.appendChild(tab);
  });
  pg.appendChild(tabBar);
  renderList('');
  pg.appendChild(listCard);
}

function reconNo(){
  var y=new Date().getFullYear(),max=0;
  (DB.recons||[]).forEach(function(r){if(r.no&&r.no.startsWith('REC'+y)){var n=parseInt(r.no.slice(7))||0;if(n>max)max=n;}});
  return 'REC'+y+String(max+1).padStart(3,'0');
}

function openReconModal(id){
  var rec=id?(DB.recons||[]).find(function(x){return x.id===id;}):null;
  var isNew=!rec;
  var facts=DB.facts||[];
  var modal=buildModal(isNew?'新建对账单':'查看/编辑对账单','mxl',function(body){
    body.style.cssText='padding:16px;display:flex;flex-direction:column;gap:14px';

    // ① 基本信息
    var s1=document.createElement('div');
    s1.innerHTML='<div style="font-size:10px;font-weight:700;color:#1e3a8a;letter-spacing:1px;margin-bottom:10px">① 基本信息</div>';
    var g1=document.createElement('div');g1.style.cssText='display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px';
    function mFld(label,el){var w=document.createElement('div');var l=document.createElement('label');l.style.cssText='display:block;font-size:9px;font-weight:700;color:#999;letter-spacing:.5px;margin-bottom:4px';l.textContent=label;w.appendChild(l);w.appendChild(el);return w;}

    // 加工厂选择
    var factSel=document.createElement('select');factSel.id='rc-fact';factSel.style.cssText='width:100%;padding:7px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;background:#fff;outline:none;cursor:pointer';
    factSel.appendChild(new Option('请选择加工厂',''));
    facts.forEach(function(f){var opt=new Option(f.nm,f.nm);if(rec&&rec.factNm===f.nm)opt.selected=true;factSel.appendChild(opt);});

    // 厂家类型自动识别
    var typeDisp=document.createElement('div');typeDisp.id='rc-type-disp';typeDisp.style.cssText='padding:7px 10px;background:var(--b3);border-radius:6px;font-size:11px;color:var(--t2)';typeDisp.textContent=rec?({dyeing:'染厂',finishing:'后整理厂',weaving:'织厂'}[rec.factType]||'其他'):'选择厂家后自动识别';

    var typeHid=document.createElement('input');typeHid.type='hidden';typeHid.id='rc-factType';typeHid.value=rec?rec.factType||'':'';

    factSel.onchange=function(){
      var fac=facts.find(function(f){return f.nm===this.value;},this);
      var prcs=fac?fac.prcs||[]:[];
      var t='other';
      if(prcs.indexOf('染厂')>=0)t='dyeing';
      else if(prcs.indexOf('织厂')>=0||prcs.indexOf('织布厂')>=0)t='weaving';
      else if(prcs.indexOf('后整理')>=0||prcs.indexOf('定型厂')>=0||prcs.indexOf('印花厂')>=0)t='finishing';
      typeHid.value=t;
      var tNames={dyeing:'染厂',finishing:'后整理厂',weaving:'织厂',other:'其他'};
      typeDisp.textContent=tNames[t]||'其他';
    };

    g1.appendChild(mFld('加工厂 *',factSel));
    g1.appendChild(mFld('厂家类型（自动）',typeDisp));
    g1.appendChild(mFld('对账月份 *',mInp('month',rec?rec.month:'','','month')));
    g1.appendChild(mFld('账单日期',mInp('billDate',rec?rec.billDate:'','','date')));

function pgRecv(){
  var pg=document.getElementById('pg');if(!pg)return;pg.innerHTML='';
  var orders=DB.orders;
  // Unpaid orders with amount info
  var unpaid=orders.filter(function(o){return !o.paid && o.status!=='cancelled' && o.status!=='draft';});
  var paid=orders.filter(function(o){return o.paid;});

  // ── 逾期提醒统计 ──
  var today=new Date();today.setHours(0,0,0,0);
  var overdue=unpaid.filter(function(o){
    if(!o.delDate)return false;
    return new Date(o.delDate)<today;
  });
  var due7=unpaid.filter(function(o){
    if(!o.delDate)return false;
    var d=new Date(o.delDate);
    var diff=(d-today)/86400000;
    return diff>=0&&diff<=7;
  });
  var totalUnpaid=unpaid.reduce(function(s,o){return s+(parseFloat(o.amt)||0);},0);
  var totalPaid=paid.reduce(function(s,o){return s+(parseFloat(o.amt)||0);},0);

  // ── 汇总卡片 ──
  var sr=document.createElement('div');sr.className='sr';
  [
    [unpaid.length+'张','待收款订单','共¥'+(totalUnpaid?totalUnpaid.toLocaleString():'—'),'sb'],
    [overdue.length+'张','已逾期','需立即跟进','sr2'],
    [due7.length+'张','7天内到期','提前跟进','so'],
    [paid.length+'张','已收款','共¥'+(totalPaid?totalPaid.toLocaleString():'—'),'sg']
  ].forEach(function(s){
    var st=document.createElement('div');st.className='st '+s[3];
    st.innerHTML='<div class="sl">'+s[1]+'</div><div class="sv">'+s[0]+'</div><div class="ss">'+s[2]+'</div>';
    sr.appendChild(st);
  });
  pg.appendChild(sr);

  // ── 逾期警告 ──
  if(overdue.length){
    var al=document.createElement('div');al.className='al alr';
    al.innerHTML='&#128680; <strong>'+overdue.length+'张订单已逾期未收款！</strong> '+overdue.map(function(o){return esc(o.no)+'（'+esc(o.custNm)+'，¥'+(o.amt||'金额未填')+'）';}).join('  ');
    pg.appendChild(al);
  }
  if(due7.length){
    var al2=document.createElement('div');al2.className='al aly';
    al2.innerHTML='&#9200; <strong>7天内到期：</strong>'+due7.map(function(o){return esc(o.no)+'（'+esc(o.delDate)+'）';}).join('、');
    pg.appendChild(al2);
  }

  // ── 待收款明细 ──
  var card=document.createElement('div');card.className='card';
  var ch=document.createElement('div');ch.className='ch';
  ch.innerHTML='<span class="ct">&#128181; 待收款订单（'+unpaid.length+'张）</span>';
  card.appendChild(ch);

  if(!unpaid.length){
    var emp=document.createElement('div');emp.style.cssText='text-align:center;padding:28px;color:var(--t3);font-size:13px';emp.textContent='🎉 全部款项已收清！';card.appendChild(emp);
  } else {
    var rows=[];
    unpaid.forEach(function(o){
      var d=o.delDate?new Date(o.delDate):null;
      var diff=d?Math.round((d-today)/86400000):null;
      var dStyle=diff===null?'color:var(--t3)':diff<0?'color:#e74c3c;font-weight:700':diff<=7?'color:#e67e22;font-weight:600':'color:var(--t3)';
      var dLabel=diff===null?'—':diff<0?'逾期'+Math.abs(diff)+'天':diff===0?'今天到期':'还有'+diff+'天';
      var tr=document.createElement('tr');
      tr.innerHTML=
        '<td class="cd">'+esc(o.ordDate||'')+'</td>'+
        '<td class="tc">'+esc(o.no)+'</td>'+
        '<td>'+esc(o.custNm||'')+'</td>'+
        '<td class="cd">'+esc(o.custNo||'')+'</td>'+
        '<td class="cd">'+esc(o.fab?o.fab.slice(0,12):'')+'</td>'+
        '<td style="text-align:right;font-weight:700;color:var(--p)">'+( o.amt?'¥'+parseFloat(o.amt).toLocaleString():'<span style="color:var(--t3)">未填</span>')+'</td>'+
        '<td style="text-align:center"><span style="'+dStyle+'">'+dLabel+'</span></td>'+
        '<td class="cd">'+esc(o.pm||'')+'</td>'+
        '<td style="text-align:center">'+sBx(o.status)+'</td>';
      var tdOp=document.createElement('td');tdOp.className='bg2';
      tdOp.style.cssText='text-align:center;white-space:nowrap';
      var markBtn=mkBtn('✓ 标记收款','btn bsm bq',function(oid){return function(){
        var o2=DB.orders.find(function(x){return x.id===oid;});
        if(o2&&confirm('确认已收款？\n订单：'+o2.no+'\n客户：'+o2.custNm)){
          o2.paid=true;o2.paidDate=new Date().toISOString().slice(0,10);
          DB.orders=DB.orders;pgRecv();showToast('已标记收款','success');
        }
      };}(o.id));
      tdOp.appendChild(markBtn);
      tr.appendChild(tdOp);
      rows.push(tr);
    });
    card.appendChild(buildTable(['下单日期','订单号','客户','客户单号','布类','订单金额','账期状态','付款方式','订单状态','操作'],rows));
  }
  pg.appendChild(card);

  // ── 已收款记录 ──
  if(paid.length){
    var card2=document.createElement('div');card2.className='card';card2.style.marginTop='12px';
    var ch2=document.createElement('div');ch2.className='ch';
    ch2.innerHTML='<span class="ct">&#10003; 已收款记录（'+paid.length+'张，共¥'+(totalPaid?totalPaid.toLocaleString():'0')+'）</span>';
    card2.appendChild(ch2);
    var rows2=[];
    paid.forEach(function(o){
      var tr=document.createElement('tr');
      tr.innerHTML=
        '<td class="cd">'+esc(o.ordDate||'')+'</td>'+
        '<td class="tc">'+esc(o.no)+'</td>'+
        '<td>'+esc(o.custNm||'')+'</td>'+
        '<td style="text-align:right;color:#27ae60;font-weight:700">'+( o.amt?'¥'+parseFloat(o.amt).toLocaleString():'—')+'</td>'+
        '<td class="cd">'+esc(o.paidDate||'')+'</td>'+
        '<td class="cd">'+esc(o.pm||'')+'</td>';
      rows2.push(tr);
    });
    card2.appendChild(buildTable(['下单日期','订单号','客户','金额','收款日期','付款方式'],rows2));
    pg.appendChild(card2);
  }
}

function pgYstock(){
  if(!Array.isArray(DB.yarns))DB.yarns=[];
  if(!Array.isArray(DB.yarnouts))DB.yarnouts=[];
  var pg=document.getElementById('pg');pg.innerHTML='';

  // 按纱支规格+批号汇总库存
  var stockMap={};
  DB.yarns.forEach(function(r){
    var key=r.spec+'||'+r.batchNo;
    if(!stockMap[key])stockMap[key]={spec:r.spec,brand:r.brand,color:r.color,batchNo:r.batchNo,poNo:r.poNo,supplier:r.supplier,inKg:0,outKg:0,retKg:0,unitPr:r.unitPr};
    stockMap[key].inKg+=(parseFloat(r.actKg)||parseFloat(r.ordKg)||0);
  });
  DB.yarnouts.forEach(function(r){
    var yarn=DB.yarns.find(function(y){return y.id===r.yarnId;})||{};
    var key=(yarn.spec||r.spec)+'||-'+(yarn.batchNo||r.batchNo);
    // find matching key
    var matched=Object.keys(stockMap).find(function(k){return k.startsWith((yarn.spec||r.spec)+'||');});
    if(matched){
      if(r.type==='out')stockMap[matched].outKg+=(parseFloat(r.kg)||0);
      else stockMap[matched].retKg+=(parseFloat(r.kg)||0);
    }
  });

  var items=Object.values(stockMap).map(function(s){
    s.balance=Math.max(0,s.inKg-s.outKg+s.retKg);
    return s;
  }).sort(function(a,b){return b.inKg-a.inKg;});

  var totBal=items.reduce(function(s,x){return s+x.balance;},0);
  var totIn=items.reduce(function(s,x){return s+x.inKg;},0);

  var sr=document.createElement('div');sr.className='sr';sr.style.gridTemplateColumns='repeat(2,1fr)';
  [['库存总量','sr2',fmtN(totBal)+' KG',items.length+'个品种'],
   ['累计入库','sb',fmtN(totIn)+' KG','历史采购合计']

    var st=document.createElement('div');st.className='st '+s[1];
    st.innerHTML='<div class="sl">'+s[0]+'</div><div class="sv">'+s[2]+'</div><div class="ss">'+s[3]+'</div>';
    sr.appendChild(st);
  });
  pg.appendChild(sr);

  var card=document.createElement('div');card.className='card';
  var ch=document.createElement('div');ch.className='ch';
  ch.innerHTML='<span class="ct">&#128230; 纱线库存总览</span><span style="font-size:11px;color:var(--t3);margin-left:8px">实时计算：入库 − 发出 + 回仓</span>';
  card.appendChild(ch);
  var cb=document.createElement('div');cb.className='cb';cb.style.padding='0';

  if(!items.length){
    var e=document.createElement('div');e.style.cssText='text-align:center;padding:28px;color:var(--t3)';e.textContent='暂无库存数据，请先录入采购记录';cb.appendChild(e);

    var ysWrap=document.createElement('div');ysWrap.className='qt-wrap';
    var ysTbl=document.createElement('table');ysTbl.style.cssText='width:100%;border-collapse:collapse;table-layout:fixed;font-size:11.5px';
    var ysCols=[['纱支规格',160],['颜色',70],['纱批号',80],['供应商',130],['入库',90],['发出',90],['回仓',80],['库存余量',100],['单价',80]];

      var rsz=document.createElement('div');rsz.style.cssText='position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:3';
      rsz.addEventListener('mousedown',function(e){e.preventDefault();var sx=e.clientX,sw=th.offsetWidth;function mv(ev){th.style.width=Math.max(40,sw+(ev.clientX-sx))+'px';}function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
