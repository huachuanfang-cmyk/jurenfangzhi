    ysInfo.textContent='共 '+items.length+' 个品种 · 拖动表头边框可调整列宽';cb.appendChild(ysInfo);
  }
  card.appendChild(cb);pg.appendChild(card);
}


// ── 纱线采购详情（只读） ──

function fgRolls(){return DB.load('fgr')||[];}
function saveFgRolls(v){DB.save('fgr',v);}

// ── 库存总览页 ──

function pgFGStock(){
  var pg=document.getElementById('pg');if(!pg)return;pg.innerHTML='';
  var rolls=fgRolls();
  var fgins=DB.fgins||[];
  var fgouts=DB.fgouts||[];
  var orders=DB.orders||[];
  var now=new Date();
  var thisMonth=now.getFullYear()+'-'+(String(now.getMonth()+1).padStart(2,'0'));
  var lmD=new Date(now.getFullYear(),now.getMonth()-1,1);
  var lastMonth=lmD.getFullYear()+'-'+(String(lmD.getMonth()+1).padStart(2,'0'));
  var thisYear=String(now.getFullYear());

  // ── 核心统计 ──
  var stockRolls=rolls.filter(function(r){return r.status==='in';});
  var stockKG=stockRolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  var stockCount=stockRolls.length;
  var returnedRolls=rolls.filter(function(r){return r.status==='returned';});
  var retVatCount=[...new Set(returnedRolls.map(function(r){return r.vatNo;}).filter(Boolean))].length;

  var mInKG=0,mOutKG=0,lmInKG=0,lmOutKG=0;
  fgins.forEach(function(r){
    var rs=rolls.filter(function(x){return x.inId===r.id;});
    var kg=rs.reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0);
    if((r.date||'').startsWith(thisMonth))mInKG+=kg;
    if((r.date||'').startsWith(lastMonth))lmInKG+=kg;
  });
  fgouts.forEach(function(r){
    var rs=rolls.filter(function(x){return (r.rollIds||[]).indexOf(x.id)>=0;});
    var kg=rs.reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0);
    if((r.date||'').startsWith(thisMonth))mOutKG+=kg;
    if((r.date||'').startsWith(lastMonth))lmOutKG+=kg;
  });

  function trendBadge(c,l){
    if(!l||l<=0)return '';
    var p=(c-l)/l*100,up=p>=0;
    return '<span style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;background:'+(up?'#D1FAE5':'#FEE2E2')+';color:'+(up?'#065F46':'#991B1B')+'">'+(up?'↑':'↓')+Math.abs(p).toFixed(0)+'%</span>';
  }

  // ── KPI 汇总卡（4格）──
  var sr=document.createElement('div');sr.className='sr';
  sr.style.gridTemplateColumns='repeat(4,1fr)';
  var mInCnt=fgins.filter(function(x){return (x.date||'').startsWith(thisMonth);}).length;
  var mOutCnt=fgouts.filter(function(x){return (x.date||'').startsWith(thisMonth);}).length;
  [
    {lbl:'当前在库',val:stockCount+'匹',sub:stockKG.toFixed(1)+' KG',cls:'sg',badge:'',tab:'stock'},
    {lbl:'本月入库',val:mInKG.toFixed(1)+' KG',sub:'共 '+mInCnt+' 批次',cls:'sb',badge:trendBadge(mInKG,lmInKG),tab:null},
    {lbl:'本月出货',val:mOutKG.toFixed(1)+' KG',sub:'共 '+mOutCnt+' 张',cls:'so',badge:trendBadge(mOutKG,lmOutKG),tab:'out'},
    {lbl:'退货待处理',val:retVatCount?retVatCount+'缸':' — ',sub:returnedRolls.length?returnedRolls.length+'匹待处理':'暂无退货',cls:retVatCount?'sr2':'sg',badge:'',tab:'returned'}
  ].forEach(function(k){
    var st=document.createElement('div');st.className='st '+k.cls;
    if(k.tab){st.style.cursor='pointer';st.onclick=function(){window._fgTab=k.tab;pgFGStock();};}
    st.innerHTML='<div class="sl">'+k.lbl+'</div><div class="sv">'+k.val+'</div><div class="ss">'+k.sub+(k.badge?' '+k.badge:'')+'</div>';
    sr.appendChild(st);
  });
  pg.appendChild(sr);

  // ── 快捷操作 ──
  var qc=document.createElement('div');qc.style.cssText='display:flex;gap:8px;margin-bottom:12px';
  qc.appendChild(mkBtn('＋ 登记入库','btn bp',function(){openFGInM(null);}));
  qc.appendChild(mkBtn('＋ 登记出货','btn bq',function(){openFGOutM(null);}));
  qc.appendChild(mkBtn('⚡ 快速出货（无订单）','btn bs',function(){openQuickOut();}));
  qc.appendChild(mkBtn('📋 多色合并送货单','btn',function(){openMultiColorSheet();}));
  pg.appendChild(qc);

  // ── Tab 切换栏 ──
  var _fgTab=window._fgTab||'stock';
  var tabBar=document.createElement('div');
  tabBar.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap';
  function _fgIco(n){
    var s='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">';
    if(n==='pkg')s+='<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>';
    else if(n==='out')s+='<line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>';
    else if(n==='undo')s+='<path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/>';
    else if(n==='file')s+='<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="18" x2="9" y2="15"/><line x1="15" y1="18" x2="15" y2="15"/>';
    s+='</svg>';return s;
  }
  [['stock','库存台账','#1E3A8A','#EEF2FF','pkg'],
   ['out','出货记录','#1E3A8A','#EEF2FF','out'],
   ['returned','退货待处理','#B45309','#FFFBEB','undo'],
   ['returns','退货单','#B45309','#FFFBEB','file']
  ].forEach(function(t){
    var tbtn=document.createElement('button');tbtn.type='button';
    var isAct=_fgTab===t[0];
    var actBg=t[2],inactBg=t[3];
    tbtn.style.cssText='display:inline-flex;align-items:center;gap:5px;padding:8px 18px;font-size:13px;font-weight:'+(isAct?'700':'500')+';border:none;cursor:pointer;transition:all .2s;background:'+(isAct?actBg:inactBg)+';color:'+(isAct?'#fff':t[2])+';border-radius:99px;box-shadow:'+(isAct?'0 2px 8px '+(t[0].startsWith('ret')?'rgba(180,83,9,.25)':'rgba(30,58,138,.25)'):'none');
    tbtn.onmouseover=function(){if(!isAct)this.style.background=t[0].startsWith('ret')?'#FEF3C7':'#E0E7FF';};
    tbtn.onmouseout=function(){if(!isAct)this.style.background=inactBg;};
    var iw=document.createElement('span');
    iw.innerHTML=_fgIco(t[4]);
    iw.style.cssText='display:inline-flex;align-items:center;width:16px;height:16px';
    tbtn.appendChild(iw);
    tbtn.appendChild(document.createTextNode(t[1]));
    if(t[0]==='returned'&&returnedRolls.length>0){
      var bd=document.createElement('span');
      bd.style.cssText='margin-left:2px;background:#DC2626;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;line-height:1.4';
      bd.textContent=retVatCount;
      tbtn.appendChild(bd);
    }
    tbtn.onclick=function(){window._fgTab=t[0];pgFGStock();};
    tabBar.appendChild(tbtn);
  });
  pg.appendChild(tabBar);

  // ════════════════════════════════════════════
  // Tab: 库存台账（按订单分组，可展开颜色/缸号）
  // ════════════════════════════════════════════
  if(_fgTab==='stock'){
    var sc=document.createElement('div');sc.className='card';
    var sch=document.createElement('div');sch.className='ch';
    sch.style.cssText='padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;background:var(--b3);border-radius:8px 8px 0 0;flex-wrap:wrap';

    var schTitle=document.createElement('span');schTitle.className='ct';
    schTitle.style.marginRight='4px';
    schTitle.textContent='📦 库存台账';
    sch.appendChild(schTitle);

    // 搜索框
    var stockSrchInp=document.createElement('input');
    stockSrchInp.type='text';stockSrchInp.id='fg-stock-srch';
    stockSrchInp.placeholder='搜索订单号 / 客户 / 颜色...';
    stockSrchInp.value=window._fgStockSrch||'';
    stockSrchInp.style.cssText='flex:1;min-width:150px;max-width:240px;padding:5px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;outline:none;transition:border-color .15s';
    stockSrchInp.onfocus=function(){this.style.borderColor='#3B82F6';};
    stockSrchInp.onblur=function(){this.style.borderColor='';};
    stockSrchInp.addEventListener('compositionstart',function(){window._fgSSCmp=true;});
    stockSrchInp.addEventListener('compositionend',function(){
      window._fgSSCmp=false;window._fgStockSrch=this.value;pgFGStock();
      setTimeout(function(){var ni=document.getElementById('fg-stock-srch');if(ni)ni.focus();},0);
    });
    stockSrchInp.oninput=function(){
      if(window._fgSSCmp)return;
      window._fgStockSrch=this.value;pgFGStock();
      setTimeout(function(){var ni=document.getElementById('fg-stock-srch');if(ni)ni.focus();},0);
    };
    sch.appendChild(stockSrchInp);

    // 隐藏已出完
    var _fhe=window._fgHideEmpty||false;
    var fgHideBtn=document.createElement('button');fgHideBtn.type='button';fgHideBtn.id='fg-hide-btn';fgHideBtn.className='btn bs bsm';
    fgHideBtn.textContent=_fhe?'👁 显示全部':'🙈 隐藏已出完';
    if(_fhe){fgHideBtn.style.background='#FFF8E1';fgHideBtn.style.borderColor='#F9A825';}
    fgHideBtn.onclick=function(){window._fgHideEmpty=!window._fgHideEmpty;pgFGStock();};
    sch.appendChild(fgHideBtn);

    // 展开/折叠全部
    var expAllBtn=document.createElement('button');expAllBtn.type='button';expAllBtn.className='btn bs bsm';
    expAllBtn.id='fg-exp-all';expAllBtn.textContent='▶ 展开全部';
    expAllBtn.onclick=function(){
      var nowExp=this.dataset.state==='expanded';
      var toExp=!nowExp;
      this.dataset.state=toExp?'expanded':'';
      this.textContent=toExp?'▼ 折叠全部':'▶ 展开全部';
      if(!window._fgExp)window._fgExp={};
      var tbody=document.querySelector('#fg-stock-tbl tbody');
      if(!tbody)return;
      tbody.querySelectorAll('[data-fg-detail]').forEach(function(r){r.style.display=toExp?'':'none';});
      tbody.querySelectorAll('[data-fg-oid]').forEach(function(r){
        var oid=r.dataset.fgOid;
        window._fgExp[oid]=toExp;
        var btn=r.querySelector('[data-exp-fg]');
        if(btn)btn.textContent=toExp?'▼':'▶';
      });
    };
    sch.appendChild(expAllBtn);
    sc.appendChild(sch);

    // ── 建立入库日期索引 ──
    var inDateMap={};
    (DB.fgins||[]).forEach(function(fi){if(fi.id&&fi.date)inDateMap[fi.id]=fi.date;});

    // ── 按订单分组 ──
    var ordMap={};
    rolls.forEach(function(r){
      if(r.status==='returned')return;
      var oid=r.ordId||'__none__';
      if(!ordMap[oid]){
        var ord=orders.find(function(x){return x.id===r.ordId;})||{};
        ordMap[oid]={
          ordNo:r.ordNo||ord.no||'',ordId:oid,custNm:r.custNm||ord.custNm||'',
          fab:ord.fab||r.fab||'',totalIn:0,totalInKG:0,totalOut:0,totalOutKG:0,
          colors:{},inDate:null
        };
      }
      var og=ordMap[oid];
      og.totalIn++;og.totalInKG+=(parseFloat(r.kg)||0);
      if(r.status==='out'){og.totalOut++;og.totalOutKG+=(parseFloat(r.kg)||0);}
      if(r.inId&&inDateMap[r.inId]){if(!og.inDate||inDateMap[r.inId]<og.inDate)og.inDate=inDateMap[r.inId];}
      // 颜色+缸号子分组
      var cvk=(r.colorNm||'')+'|'+(r.vatNo||'');
      if(!og.colors[cvk]){
        var ord2=orders.find(function(x){return x.id===r.ordId;})||{};
        var clrObj=(ord2.colors||[]).find(function(c){return c.nm===r.colorNm;})||{};
        og.colors[cvk]={
          colorNm:r.colorNm||'',colorCode:clrObj.code||r.colorCode||'',vatNo:r.vatNo||'',
          inCount:0,inKG:0,outCount:0,outKG:0,inDate:null,
          rollGroupKey:(r.ordId||'')+'|'+(r.colorNm||'')+'|'+(r.vatNo||'')
        };
      }
      var cg=og.colors[cvk];
      cg.inCount++;cg.inKG+=(parseFloat(r.kg)||0);
      if(r.status==='out'){cg.outCount++;cg.outKG+=(parseFloat(r.kg)||0);}
      if(r.inId&&inDateMap[r.inId]){if(!cg.inDate||inDateMap[r.inId]<cg.inDate)cg.inDate=inDateMap[r.inId];}
    });

    var _fgStockQ=(window._fgStockSrch||'').toLowerCase();
    var ordKeys=Object.keys(ordMap);

    // 按搜索过滤
    if(_fgStockQ){
      ordKeys=ordKeys.filter(function(k){
        var g=ordMap[k];if(!g)return false;
        if((g.ordNo||'').toLowerCase().includes(_fgStockQ))return true;
        if((g.custNm||'').toLowerCase().includes(_fgStockQ))return true;
        if((g.fab||'').toLowerCase().includes(_fgStockQ))return true;
        var cvks=Object.keys(g.colors);
        for(var i=0;i<cvks.length;i++){if((g.colors[cvks[i]].colorNm||'').toLowerCase().includes(_fgStockQ))return true;}
        return false;
      });
    }

    // 隐藏已出完
    var hiddenCnt=0;
    if(_fhe){
      var bef=ordKeys.length;
      ordKeys=ordKeys.filter(function(k){var g=ordMap[k];return g&&(g.totalIn-g.totalOut)>0;});
      hiddenCnt=bef-ordKeys.length;
    }

    // 排序：在库订单优先（按入库日期倒序），已出完靠后
    ordKeys.sort(function(a,b){
      var ga=ordMap[a],gb=ordMap[b];
      var aS=(ga.totalIn-ga.totalOut)>0,bS=(gb.totalIn-gb.totalOut)>0;
      if(aS!==bS)return aS?-1:1;
      var ad=ga.inDate||'',bd=gb.inDate||'';
      return ad<bd?1:ad>bd?-1:0;
    });

    var scb=document.createElement('div');scb.className='cb';scb.style.padding='0';
    if(!ordKeys.length){
      var emDiv=document.createElement('div');emDiv.style.cssText='text-align:center;padding:36px 20px;color:var(--t3)';
      emDiv.innerHTML=(_fgStockQ
        ?'🔍 没有匹配的库存记录'
        :'📦 暂无入库记录<br><span style="font-size:11px">点击「登记入库」开始录入</span>');
      scb.appendChild(emDiv);
    }else{
      if(!window._fgExp)window._fgExp={};
      var stWrap=document.createElement('div');stWrap.style.cssText='overflow:auto;max-height:calc(100vh - 310px)';
      var tbl=document.createElement('table');tbl.id='fg-stock-tbl';
      tbl.style.cssText='width:100%;border-collapse:collapse;font-size:12px';

      // 表头
      var thead=document.createElement('thead');
      var thRow=document.createElement('tr');
      [['',26],['订单号',110],['客户',120],['布类',150],['在库',110],['已入',100],['状态',88],['操作',90]].forEach(function(col){
        var th=document.createElement('th');th.textContent=col[0];
        th.style.cssText='position:sticky;top:0;z-index:2;background:#EFF6FF;color:#1e3a8a;font-weight:700;font-size:11px;padding:7px 8px;border:1px solid #bfdbfe;text-align:left;white-space:nowrap;min-width:'+col[1]+'px';
        // 列宽拖拽
        var rsz=document.createElement('div');rsz.style.cssText='position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:3';
        rsz.addEventListener('mousedown',function(e){
          e.preventDefault();var sx=e.clientX,sw=th.offsetWidth;
          function mv(ev){th.style.minWidth=Math.max(40,sw+(ev.clientX-sx))+'px';}
          function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
          document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
        });
        th.appendChild(rsz);thRow.appendChild(th);
      });
      thead.appendChild(thRow);tbl.appendChild(thead);
      var tbody=document.createElement('tbody');

      ordKeys.forEach(function(oid,idx){
        var og=ordMap[oid];if(!og)return;
        var stockN=og.totalIn-og.totalOut;
        var stockKG2=(og.totalInKG-og.totalOutKG).toFixed(1);
        var isAllOut=stockN<=0;
        var isPartial=!isAllOut&&og.totalOut>0;
        var expanded=!!window._fgExp[oid];

        // 行状态视觉
        var bdrClr=isAllOut?'#D1D5DB':isPartial?'#F97316':'#10B981';
        var rowBg=isAllOut?'#FAFAFA':(idx%2===0?'#FFFFFF':'#F0F9FF');
        var statusBadge=isAllOut
          ?'<span style="font-size:10px;background:#F3F4F6;color:#9CA3AF;padding:2px 8px;border-radius:99px;font-weight:600">已出完</span>'
          :isPartial
            ?'<span style="font-size:10px;background:#FFF7ED;color:#C2410C;padding:2px 8px;border-radius:99px;font-weight:600">部分在库</span>'
            :'<span style="font-size:10px;background:#ECFDF5;color:#065F46;padding:2px 8px;border-radius:99px;font-weight:600">在库</span>';

        // 摘要行
        var tr=document.createElement('tr');
        tr.dataset.fgOid=oid;
        tr.style.cssText='cursor:pointer;background:'+rowBg+';border-left:3px solid '+bdrClr+';transition:background .1s';
        tr.onmouseover=function(){this.style.background=isAllOut?'#F3F4F6':'#E0F2FE';};
        tr.onmouseout=function(){this.style.background=rowBg;};
        tr.onclick=function(){
          var isExp=!!window._fgExp[oid];
          window._fgExp[oid]=!isExp;
          var btn=this.querySelector('[data-exp-fg]');
          if(btn)btn.textContent=window._fgExp[oid]?'▼':'▶';
          tbody.querySelectorAll('[data-fg-detail="'+oid+'"]').forEach(function(r){
            r.style.display=window._fgExp[oid]?'':'none';
          });
        };

        function mkSumTd(html,style){
          var td=document.createElement('td');
          td.style.cssText='padding:8px 8px;border-bottom:1px solid #E5E7EB;vertical-align:middle;'+(style||'');
          td.innerHTML=html;return td;
        }

        var expTd=mkSumTd('<span data-exp-fg style="font-size:11px;font-weight:700;color:#9CA3AF">'+(expanded?'▼':'▶')+'</span>','width:26px;text-align:center;padding:8px 2px');
        tr.appendChild(expTd);

        var fabSh=og.fab&&og.fab.length>18?og.fab.slice(0,18)+'…':og.fab||'—';
        tr.appendChild(mkSumTd('<span style="font-weight:700;color:#003087;font-family:monospace;font-size:11.5px">'+esc(og.ordNo||'')+'</span>'));
        tr.appendChild(mkSumTd('<span style="font-size:12px;color:#1F2937;font-weight:600">'+esc(og.custNm||'—')+'</span>'));
        var fTd=mkSumTd('<span style="font-size:11px;color:#374151">'+esc(fabSh)+'</span>');
        if(og.fab&&og.fab.length>18)fTd.title=og.fab;
        tr.appendChild(fTd);

        var stockTxt=isAllOut
          ?'<span style="color:#9CA3AF">—</span>'
          :'<b>'+stockN+'匹</b> / <span style="color:#065F46;font-weight:700">'+stockKG2+'KG</span>';
        tr.appendChild(mkSumTd(stockTxt));
        tr.appendChild(mkSumTd('<span style="color:#64748B;font-size:11.5px">'+og.totalIn+'匹 / '+og.totalInKG.toFixed(1)+'KG</span>'));
        tr.appendChild(mkSumTd(statusBadge));

        // 操作列（阻止行点击冒泡）
        var opTd=mkSumTd('','white-space:nowrap;text-align:left');
        opTd.onclick=function(e){e.stopPropagation();};
        if(!isAllOut){
          var outBtnG=document.createElement('button');outBtnG.type='button';outBtnG.className='btn bsm bq';
          outBtnG.style.fontSize='11px';outBtnG.textContent='登记出货';
          outBtnG.onclick=function(e){e.stopPropagation();openFGOutM(null);};
          opTd.appendChild(outBtnG);
        }
        tr.appendChild(opTd);
        tbody.appendChild(tr);

        // ── 颜色/缸号明细行 ──
        var cvks=Object.keys(og.colors);
        cvks.forEach(function(cvk,ci){
          var cv=og.colors[cvk];
          var dN=cv.inCount-cv.outCount;
          var dKG=(cv.inKG-cv.outKG).toFixed(1);
          var dEmpty=dN<=0;
          var dBg=ci%2===0?'#F8FAFC':'#EFF6FF';
          if(dEmpty)dBg='#F9FAFB';

          var dtr=document.createElement('tr');
          dtr.dataset.fgDetail=oid;
          dtr.style.cssText='display:'+(expanded?'':'none')+';background:'+dBg;

          function mkDTd(html,style){
            var td=document.createElement('td');
            td.style.cssText='padding:5px 8px;border-bottom:1px solid #E2E8F0;font-size:11px;vertical-align:middle;'+(style||'');
            td.innerHTML=html;return td;
          }

          // 左边框缩进感

// ── 退货处理 ──
function openFGReturn(outId){
  var r=DB.fgouts.find(function(x){return x.id===outId;});
  if(!r)return alert('找不到出货记录');
  var allRolls=fgRolls();
  var outRolls=allRolls.filter(function(x){return (r.rollIds||[]).indexOf(x.id)>=0;});
  if(!outRolls.length)return alert('该出货记录没有疋数据');
  var totKG=outRolls.reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0);
  var modal=buildModal('退货处理 — '+(r.no||''),'mxl',function(body){
    // 出货摘要
    var sum=document.createElement('div');
    sum.style.cssText='background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;line-height:1.8;color:#92400E';
    sum.innerHTML='<b>送货单：</b>'+esc(r.no||'')+'　<b>日期：</b>'+esc(r.date||'')+'<br><b>客户：</b>'+esc(r.custNm||'')+'　<b>订单：</b>'+esc(r.ordNo||'');
    body.appendChild(sum);
    // 退货原因
    var reasonWrap=document.createElement('div');reasonWrap.style.cssText='margin-bottom:10px';
    reasonWrap.appendChild(fv('退货原因',mkInput('fgret-reason','品质问题','如：品质问题、客户拒收等','text')));
    body.appendChild(reasonWrap);
    // 协商扣损KG（用于对账自动扣减）
    var deductWrap=document.createElement('div');deductWrap.style.cssText='margin-bottom:10px;display:flex;align-items:center;gap:8px;background:#FFF8E1;border:1px solid #FDE68A;border-radius:6px;padding:8px 10px';
    deductWrap.innerHTML='<span style="font-size:11px;font-weight:700;color:#92400E">对账扣损</span>';
    var deductKGInp=document.createElement('input');deductKGInp.type='number';deductKGInp.step='0.1';deductKGInp.min='0';
    deductKGInp.id='fgret-deduct-kg';
    deductKGInp.style.cssText='flex:1;padding:5px 8px;border:1.5px solid #FDE68A;border-radius:6px;font-size:12px;font-weight:600;color:#92400E;background:#fff;outline:none;text-align:right';
    var deductUnit=document.createElement('span');deductUnit.style.cssText='font-size:11px;color:#92400E;font-weight:500';
    deductUnit.textContent='KG';
    deductWrap.appendChild(deductKGInp);deductWrap.appendChild(deductUnit);
    var deductTip=document.createElement('span');deductTip.style.cssText='font-size:10.5px;color:#B45309;margin-left:auto';
    deductTip.textContent='与客户协商的扣减重量，对账时自动抵扣';
    deductWrap.appendChild(deductTip);
    body.appendChild(deductWrap);
    // 备注
    var rmWrap=document.createElement('div');rmWrap.style.cssText='margin-bottom:10px';
    rmWrap.appendChild(fv('备注',mkInput('fgret-rm','','可选填退货处理说明','text')));
    body.appendChild(rmWrap);
    // 疋列表（全选 + 逐条勾选）
    var selAllWrap=document.createElement('div');selAllWrap.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 10px;background:#F8FAFC;border-radius:6px;border:1px solid #E2E8F0';
    var selAllCb=document.createElement('input');selAllCb.type='checkbox';selAllCb.checked=true;
    selAllCb.style.cssText='width:16px;height:16px;accent-color:#DC2626;cursor:pointer';
    selAllWrap.appendChild(selAllCb);
    selAllWrap.appendChild(document.createTextNode('全选 — 退回以下疋料'));
    body.appendChild(selAllWrap);
    var rollCount=document.createElement('span');rollCount.style.cssText='font-size:11px;color:#666';
    selAllWrap.appendChild(rollCount);
    var listWrap=document.createElement('div');
    listWrap.style.cssText='max-height:320px;overflow-y:auto;border:1px solid #E2E8F0;border-radius:6px;margin-bottom:10px';
    var rollCbs=[];
    outRolls.forEach(function(rl,idx){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid #F1F5F9;font-size:11.5px'+(idx%2===0?';background:#FAFBFC':'');
      var cb=document.createElement('input');cb.type='checkbox';cb.checked=true;
      cb.className='fgret-roll-cb';
      cb.style.cssText='width:15px;height:15px;accent-color:#DC2626;cursor:pointer';
      cb.dataset.kg=rl.kg||'0';
      rollCbs.push(cb);
      row.appendChild(cb);
      row.appendChild(document.createTextNode(
        (rl.rollNo||'')+' | '+(rl.colorNm||'')+' '+(rl.colorCode||'')+' | 缸号:'+(rl.vatNo||'')+' | '+(rl.kg||'0')+'KG'
      ));
      listWrap.appendChild(row);
    });
    body.appendChild(listWrap);
    // 统计
    var stat=document.createElement('div');
    stat.style.cssText='font-size:11.5px;color:#374151;margin-bottom:8px;padding:0 4px';
    body.appendChild(stat);
    function updateStat(){
      var n=0,kg=0;
      rollCbs.forEach(function(cb){if(cb.checked){n++;kg+=parseFloat(cb.dataset.kg||0);}});
      stat.innerHTML='已选 <b>'+n+'</b> 匹，约 <b>'+kg.toFixed(1)+'</b> KG';
      rollCount.textContent='（共 '+outRolls.length+' 匹）';
      if(deductKGInp&&!deductKGInp._userSet){deductKGInp.value=kg.toFixed(1);}
    }
    updateStat();
    rollCbs.forEach(function(cb){cb.onchange=updateStat;});
    selAllCb.onchange=function(){rollCbs.forEach(function(cb){cb.checked=selAllCb.checked;});updateStat();};
    // 扣损KG输入框：用户手动修改后标记_userSet，不再自动跟随
    deductKGInp._userSet=false;
    deductKGInp.oninput=function(){this._userSet=true;};
    // 提示
    var tip=document.createElement('div');
    tip.style.cssText='font-size:11px;color:#92400E;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:8px 10px;line-height:1.7;margin-bottom:6px';
    tip.innerHTML='<b>两种用法：</b><br>'
      +'① <b>退货</b>：勾选疋料 → 实物回仓(B级) + 扣损KG自动抵扣对账<br>'
      +'② <b>纯扣损</b>：不勾疋料，仅填扣损KG → 只抵扣对账，不回仓';
    body.appendChild(tip);
  },function(){
    // ── 保存逻辑 ──
    var reason=document.getElementById('fgret-reason');
    var rm=document.getElementById('fgret-rm');
    var deductKGInp=document.getElementById('fgret-deduct-kg');
    var deductKG=parseFloat(deductKGInp?deductKGInp.value:0)||0;
    // 收集选中的疋
    var selRollIds=[];var selRolls=[];
    outRolls.forEach(function(rl,i){
      // 通过DOM查找对应checkbox（避免闭包变量作用域问题）
      var cbs=document.querySelectorAll('.fgret-roll-cb');
      if(cbs[i]&&cbs[i].checked){selRollIds.push(rl.id);selRolls.push(rl);}
    });
    // 允许两种场景：选了疋退货，或纯扣损（不选疋但有扣损KG）
    if(!selRollIds.length&&deductKG<=0)return alert('请选择退货疋料，或填写扣损KG');
    // 创建退货记录
    var ret={
      id:'ret_'+Date.now(),
      no:fgReturnNo(),
      date:new Date().toISOString().slice(0,10),
      outId:r.id,outNo:r.no,
      ordId:r.ordId,ordNo:r.ordNo,custNm:r.custNm,
      reason:reason?reason.value:'品质问题',
      rollIds:selRollIds,
      totalKG:selRolls.reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0),
      deductKG:deductKG,
      status:selRollIds.length?'completed':'deduction_only',
      rm:rm?rm.value:''
    };
    // 有实物退回时更新疋状态
    if(selRollIds.length){
      var allR=fgRolls();
      selRollIds.forEach(function(rlid){
        var rl=allR.find(function(x){return x.id===rlid;});
        if(rl){rl.status='returned';rl.outId='';rl.grade='B';rl.returned=true;rl.retId=ret.id;}
      });
      saveFgRolls(allR);
    }
    // 保存退货记录
    var list=DB.fgreturns||[];
    list.push(ret);
    DB.fgreturns=list;
    // 反馈：先显示Toast，延迟关闭确保用户看到
    showToast((selRollIds.length?'✅ 退货完成':'✅ 扣损已记录')+' — '+ret.no+(selRollIds.length?'，共 '+selRollIds.length+' 匹回仓':''),'success');
    var saveBtn=document.querySelector('.mo .btn.bp');
    if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='✓ 已完成';}
    setTimeout(function(){cm();pgFGStock();},800);
  },'确认退货');
  om(modal);
}

  if(!r)return alert('找不到出货记录');
  var allRolls=fgRolls();
  var outRolls=allRolls.filter(function(x){return (r.rollIds||[]).indexOf(x.id)>=0;});

    fg.appendChild(fv('备注',mkInput('fge-rm',r.rm||'','')));

    h1.textContent='当前出货疋（勾选取消 = 撤回到在库）';
    sec1.appendChild(h1);
    var g1=document.createElement('div');g1.style.cssText='display:flex;flex-wrap:wrap;gap:5px';
    outRolls.forEach(function(rl){
      var lbl=document.createElement('label');
      lbl.style.cssText='display:flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid #e67e22;border-radius:4px;cursor:pointer;font-size:11px;background:#FFF7ED;color:#92400E';
      var cb=document.createElement('input');cb.type='checkbox';cb.className='fge-out-cb';cb.value=rl.id;
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode('疋'+esc(rl.rollNo)+' '+esc(rl.kg)+'KG'));

      var h2=document.createElement('div');
      h2.style.cssText='font-size:11px;font-weight:700;color:#27ae60;margin-bottom:6px';
      h2.textContent='同缸在库疋（勾选 = 补入本张出货单）';
      sec2.appendChild(h2);
      var g2=document.createElement('div');g2.style.cssText='display:flex;flex-wrap:wrap;gap:5px';
      sameGroup.forEach(function(rl){
        var lbl=document.createElement('label');
        lbl.style.cssText='display:flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid #27ae60;border-radius:4px;cursor:pointer;font-size:11px;background:#F0FDF4;color:#15803D';

    saveFgRolls(cur);
    DB.fgouts=DB.fgouts;
    cm();pgFGStock();showToast('出货记录已更新','success');
    if(confirm('更新成功！是否立即重新打印送货单？'))printFGOut(outId);

  om(modal);

  var modal=buildModal('登记出货 — '+esc(grp.ordNo)+' · '+esc(grp.colorNm),'mxl',function(body){

    fg.appendChild(fv('附加金额（元）',mkInput('fgo2-feeAmt','','如：300')));
    fg.appendChild(fv('备注',mkInput('fgo2-rm','','')));

    selHdr.style.cssText='display:flex;align-items:center;gap:8px;margin:10px 0 6px;font-size:11px;font-weight:700;color:var(--t2)';
    var saLbl=document.createElement('label');saLbl.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--p)';
    var saCb=document.createElement('input');saCb.type='checkbox';saCb.checked=true;
    saCb.onchange=function(){document.querySelectorAll('.fgo2-cb').forEach(function(c){c.checked=saCb.checked;});updateSt();};
    saLbl.appendChild(saCb);saLbl.appendChild(document.createTextNode('全选'));
    var stSpan=document.createElement('span');stSpan.id='fgo2-stats';stSpan.style.cssText='margin-left:auto;color:var(--p)';
    selHdr.appendChild(saLbl);selHdr.appendChild(stSpan);
    body.appendChild(selHdr);
    var grid=document.createElement('div');grid.style.cssText='display:flex;flex-wrap:wrap;gap:5px';
    rolls.forEach(function(r){
      var lbl=document.createElement('label');
      lbl.style.cssText='display:flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:11px;background:#fff';
      var cb=document.createElement('input');cb.type='checkbox';cb.className='fgo2-cb';cb.value=r.id;cb.checked=true;
      cb.onchange=updateSt;
      lbl.appendChild(cb);lbl.appendChild(document.createTextNode('疋'+esc(r.rollNo)+' '+esc(r.kg)+'KG'));
      grid.appendChild(lbl);
    });
    body.appendChild(grid);
    function updateSt(){
      var cbs=document.querySelectorAll('.fgo2-cb:checked');
      var tot=0;var allR=fgRolls();
      cbs.forEach(function(cb){var r=allR.find(function(x){return x.id===cb.value;});if(r)tot+=(parseFloat(r.kg)||0);});
      var s=document.getElementById('fgo2-stats');
      if(s)s.textContent='已选 '+cbs.length+'匹 / '+tot.toFixed(1)+'KG';
    }
    updateSt();
  },function(){
    var selCbs=document.querySelectorAll('.fgo2-cb:checked');
    if(!selCbs.length)return alert('请勾选要出货的疋');
    var date=(document.getElementById('fgo2-date')||{value:''}).value;
    var dlvNo=(document.getElementById('fgo2-dlv')||{value:''}).value;
    var approxM=(document.getElementById('fgo2-m')||{value:''}).value;
    var feeNm=(document.getElementById('fgo2-feeNm')||{value:''}).value;
    var feeAmt=(document.getElementById('fgo2-feeAmt')||{value:''}).value;
    var rm=(document.getElementById('fgo2-rm')||{value:''}).value;
    var rollIds=[];selCbs.forEach(function(cb){rollIds.push(cb.value);});
    var outNo=fgOutNo();
    var custOrdNo=(document.getElementById('fgo2-cono')||{value:''}).value;
    var outRec={id:'fgo_'+Date.now(),no:outNo,date:date,ordId:grp.ordId,ordNo:grp.ordNo,custNm:grp.custNm,dlvNo:dlvNo,custOrdNo:custOrdNo,approxM:approxM,feeNm:feeNm,feeAmt:feeAmt,rm:rm,rollIds:rollIds};
    var list=DB.fgouts||[];list.push(outRec);DB.fgouts=list;
    var allR=fgRolls();
    rollIds.forEach(function(rid){var r=allR.find(function(x){return x.id===rid;});if(r){r.status='out';r.outId=outRec.id;}});
    saveFgRolls(allR);
    cm();pgFGStock();showToast('出货登记完成！'+outNo,'success');
    if(confirm('出货登记完成！是否立即打印送货单？'))printFGOut(outRec.id);
  });
  om(modal);
}

      tr.innerHTML=
        '<td style="padding:6px 10px;font-weight:600">'+esc(r.rollNo||'')+'</td>'+
        '<td style="padding:6px 10px;text-align:center;font-weight:700">'+esc(r.kg||'')+'</td>'+
        '<td style="padding:6px 10px;text-align:center;color:var(--t2)">'+esc(r.m||'—')+'</td>'+
        '<td style="padding:6px 10px;text-align:center">'+stBadge+'</td>'+
        '<td style="padding:6px 10px;font-size:10.5px;color:var(--t3)">'+esc(r.rm||'')+'</td>';
      tbody.appendChild(tr);
    });
    // Summary row
    var totKG=grpRolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
    var inN=grpRolls.filter(function(r){return r.status==='in';}).length;
    var sumTr=document.createElement('tr');
    sumTr.style.cssText='background:var(--b3);font-weight:700;border-top:2px solid var(--bd)';

      '<td></td>'+
      '<td style="padding:6px 10px;text-align:center;color:#27ae60">在库'+inN+'匹</td>'+
      '<td></td>';
    tbody.appendChild(sumTr);
    tbl.appendChild(tbody);body.appendChild(tbl);
  },null);
  om(modal);
}

function buildColorSel(selId,orders,ordId,selectedClr){
  var sel=mkSelect(selId,[{v:'',l:'先选择订单'}],[]);
  function fill(oid,sc){
    var o=(orders||[]).find(function(x){return x.id===oid;});
    sel.innerHTML='';
    var baseOpt=[{v:'',l:'请选择颜色'}];
    var clrOpts=o?baseOpt.concat((o.colors||[]).map(function(c){return{v:c.nm,l:c.nm+(c.code?' ('+c.code+')':'')};})): baseOpt;
    clrOpts.forEach(function(item){
      var opt=document.createElement('option');opt.value=item.v;opt.textContent=item.l;
      if(item.v===sc)opt.selected=true;
      sel.appendChild(opt);
    });
  }
  if(ordId)fill(ordId,selectedClr||'');
  sel._fill=fill;
  return sel;
}

document.addEventListener('wheel',function(e){
  if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT')){
    e.preventDefault();
  }
},{passive:false});

function fgInNo(){
  var y=new Date().getFullYear(),max=0;
  (DB.fgins||[]).forEach(function(r){if(r.no&&r.no.startsWith('IN'+y)){var n=parseInt(r.no.slice(6))||0;if(n>max)max=n;}});
  return 'IN'+y+String(max+1).padStart(4,'0');
}

function openFGInM(id){
  var ords=(DB.orders||[]).filter(function(o){return o.status!=='cancelled';});
  var modal=buildModal('登记成品入库','mxl',function(body){

    // ── 第一步：选订单（组合式下拉 Combobox）──
    var step1=document.createElement('div');step1.className='fg';
    step1.style.gridTemplateColumns='2.2fr 1fr 1fr 0.9fr';
    function _ordFullyIn(o){
      var cs=o.colors||[];if(!cs.length)return false;
      return cs.every(function(c){return c.clrStatus==='finished';});
    }
    function _ordMatchesSearch(o,q){
      if(!q)return true;q=q.toLowerCase();
      return (o.no||'').toLowerCase().indexOf(q)>=0
        ||(o.custNm||'').toLowerCase().indexOf(q)>=0
        ||(o.fab||'').toLowerCase().indexOf(q)>=0;
    }
    // 隐藏的 select（保留 id=fgi-ord，供保存回调与 onchange 使用）
    var ordSel=mkSelect('fgi-ord',[{v:'',l:'请选择订单'}],'');
    ordSel.style.display='none';
    ords.forEach(function(o){var op=document.createElement('option');op.value=o.id;op.textContent=o.no;ordSel.appendChild(op);});
    // Combobox 壳
    var cb=document.createElement('div');cb.style.cssText='position:relative';
    var cbInp=document.createElement('input');cbInp.type='text';cbInp.readOnly=true;cbInp.placeholder='点击选择订单';
    cbInp.style.cssText='width:100%;padding:7px 28px 7px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:12px;cursor:pointer;background:#fff;box-sizing:border-box;outline:none;transition:border-color .15s';
    cbInp.onfocus=function(){cbInp.style.borderColor='var(--p)';};
    cbInp.onblur=function(){cbInp.style.borderColor='var(--bd)';};
    var cbArrow=document.createElement('span');cbArrow.textContent='▾';
    cbArrow.style.cssText='position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:10px;pointer-events:none';
    // 面板使用 position:fixed 并挂载到 body，避免被模态 overflow 裁切
    var cbPanel=document.createElement('div');
    cbPanel.className='fgi-cb-panel';
    cbPanel.style.cssText='position:fixed;background:#fff;border:1px solid #d0d7de;border-radius:6px;box-shadow:0 12px 28px rgba(0,0,0,.18);display:none;z-index:9999;overflow:hidden';
    var cbSearch=document.createElement('input');cbSearch.type='text';cbSearch.placeholder='🔍 搜索订单号 / 客户 / 布类...';
    cbSearch.style.cssText='width:calc(100% - 16px);margin:8px 8px 4px;padding:6px 10px;border:1px solid var(--bd);border-radius:4px;font-size:12px;outline:none;box-sizing:border-box';
    var cbBar=document.createElement('div');
    cbBar.style.cssText='padding:2px 10px 6px;display:flex;align-items:center;font-size:10.5px;color:var(--t3);border-bottom:1px solid #eef0f2';
    var cbTogLbl=document.createElement('label');
    cbTogLbl.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none';
    var cbTog=document.createElement('input');cbTog.type='checkbox';cbTog.style.margin='0';
    cbTogLbl.appendChild(cbTog);
    var cbTogTxt=document.createElement('span');cbTogTxt.textContent='显示已全部出货';
    cbTogLbl.appendChild(cbTogTxt);
    cbBar.appendChild(cbTogLbl);
    var cbHint=document.createElement('span');cbHint.style.cssText='margin-left:auto;font-family:monospace';
    cbBar.appendChild(cbHint);
    var cbList=document.createElement('div');cbList.style.cssText='max-height:320px;overflow-y:auto';
    cbPanel.appendChild(cbSearch);cbPanel.appendChild(cbBar);cbPanel.appendChild(cbList);
    cb.appendChild(cbInp);cb.appendChild(cbArrow);cb.appendChild(ordSel);
    document.body.appendChild(cbPanel);
    // 根据输入框位置更新面板位置（fixed 坐标）
    function _positionCbPanel(){
      var rect=cbInp.getBoundingClientRect();
      var vh=window.innerHeight;
      var panelH=360; // 预估高度（搜索+工具条+列表）
      var spaceBelow=vh-rect.bottom;
      var spaceAbove=rect.top;
      // 空间不够就向上展开
      if(spaceBelow<panelH&&spaceAbove>spaceBelow){
        cbPanel.style.top=Math.max(8,rect.top-panelH-4)+'px';
      }else{
        cbPanel.style.top=(rect.bottom+4)+'px';
      }
      cbPanel.style.left=rect.left+'px';
      cbPanel.style.width=rect.width+'px';
    }
    function refreshCbList(){
      var q=cbSearch.value.trim();
      var showAll=cbTog.checked;
      var filtered=ords.filter(function(o){
        // 只有「已全部出货」的订单才默认隐藏，避免把「货在库未出货」的订单漏掉
        if(!showAll&&calcShipStatus(o.id)==='fully_out')return false;
        return _ordMatchesSearch(o,q);
      });
      cbList.innerHTML='';
      if(!filtered.length){
        cbList.innerHTML='<div style="padding:24px;text-align:center;color:var(--t3);font-size:11px">无匹配订单</div>';
      }else{
        filtered.forEach(function(o){
          var it=document.createElement('div');
          var fin=_ordFullyIn(o);
          it.style.cssText='padding:8px 12px;cursor:pointer;font-size:11.5px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:10px;'+(fin?'color:#9ca3af;':'');
          it.innerHTML='<span style="font-family:monospace;font-weight:600;color:'+(fin?'#9ca3af':'#1E40AF')+';min-width:95px;flex-shrink:0">'+esc(o.no)+'</span>'
            +'<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(shortName(o.custNm||''))+' <span style="color:var(--t3);margin-left:4px">'+esc(shortName(o.fab||''))+'</span></span>'
            +(fin?'<span style="color:#16a34a;font-size:10px;flex-shrink:0">✓已全部入库</span>':'');
          it.onmouseover=function(){this.style.background='#EFF6FF';};
          it.onmouseout=function(){this.style.background='';};
          it.onclick=function(ev){
            ev.stopPropagation();
            ordSel.value=o.id;
            cbInp.value=o.no+' — '+shortName(o.custNm||'')+'  '+shortName(o.fab||'');
            cbInp.style.color='#111';
            cbPanel.style.display='none';
            if(ordSel.onchange)ordSel.onchange.call(ordSel);
          };
          cbList.appendChild(it);
        });
      }
      cbHint.textContent=filtered.length+' / '+ords.length;
    }
    cbInp.onclick=function(ev){
      ev.stopPropagation();
      var op=cbPanel.style.display==='block';
      if(op){cbPanel.style.display='none';return;}
      refreshCbList();
      _positionCbPanel();
      cbPanel.style.display='block';
      setTimeout(function(){cbSearch.focus();},10);
    };
    cbSearch.oninput=refreshCbList;
    cbTog.onchange=refreshCbList;
    // 面板开启时随滚动/缩放重新定位
    var _cbReflow=function(){if(cbPanel.style.display==='block')_positionCbPanel();};
    window.addEventListener('scroll',_cbReflow,true);
    window.addEventListener('resize',_cbReflow);
    // 点击外部关闭面板（排除 cb 自身 和 面板本身）
    var _cbOutside=function(e){
      if(cb&&cb.contains(e.target))return;
      if(cbPanel.contains(e.target))return;
      cbPanel.style.display='none';
    };
    document.addEventListener('click',_cbOutside);
    // 模态关闭时清理 body 上挂载的面板和事件
    var _cbCleanup=function(){
      try{if(cbPanel&&cbPanel.parentNode===document.body)document.body.removeChild(cbPanel);}catch(_){}
      try{document.removeEventListener('click',_cbOutside);}catch(_){}
      try{window.removeEventListener('scroll',_cbReflow,true);}catch(_){}
      try{window.removeEventListener('resize',_cbReflow);}catch(_){}
    };
    // 观察 overlay 变空 => 模态被关闭 => 清理
    try{
      var _ovEl=document.getElementById('ov');
      if(_ovEl&&window.MutationObserver){
        var _cbObs=new MutationObserver(function(){
          if(!_ovEl.childNodes||_ovEl.childNodes.length===0){
            _cbCleanup();
            try{_cbObs.disconnect();}catch(_){}
          }
        });
        _cbObs.observe(_ovEl,{childList:true});
      }
    }catch(_){}
    step1.appendChild(fv('关联订单 *',cb));

    // 颜色选择（选订单后自动填充选项）
    var colorSel=mkSelect('fgi-clr',[{v:'',l:'先选择订单'}],[]);
    step1.appendChild(fv('颜色 *',colorSel));
    step1.appendChild(fv('缸号 *',mkInput('fgi-vat','','染厂缸号，如：23-04520-C')));
    step1.appendChild(fv('入库日期',mkInput('fgi-date',new Date().toISOString().slice(0,10),'','date')));
    body.appendChild(step1);

    // ── 自动带入信息展示区 ──
    var infoBar=document.createElement('div');infoBar.id='fgi-info-bar';
    infoBar.style.cssText='display:none;background:#EFF6FF;border-left:3px solid #BFDBFE;border-radius:3px;padding:8px 12px;margin:8px 0;font-size:11px;line-height:2;color:#1e3a8a';
    body.appendChild(infoBar);

    // ── 匹明细录入区（渐进式 1/2/3 列）──
    var rollSec=document.createElement('div');rollSec.style.cssText='margin-top:10px;border-top:1px solid var(--bd);padding-top:10px';
    var rollHdr=document.createElement('div');rollHdr.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap';
    var rollTitle=document.createElement('span');rollTitle.style.cssText='font-weight:700;color:var(--p);font-size:12px;margin-right:auto';
    rollTitle.innerHTML='&#128230; 疋明细录入（从染厂送货单抄入）';
    rollHdr.appendChild(rollTitle);
    var addRowBtn=mkBtn('＋ 添加一行','btn bsm bp',function(){addRollRow(null);});
    rollHdr.appendChild(addRowBtn);
    // 快捷批量按钮
    [10,25,50].forEach(function(n){
      var b=mkBtn('+'+n,'btn bsm bs',function(){
        var cur=_allRolls().length;
        var remain=75-cur;
        if(remain<=0){alert('一张送货单最多 75 疋');return;}

        for(var i=0;i<add;i++)addRollRow(null);

    // ── 三列表头：左(1-25) / 中(26-50) / 右(51-75)，未启用的列隐藏 ──
    var tblHdr=document.createElement('div');tblHdr.id='fgi-tbl-hdr';

    // ── 三列主体容器（渐进式：初始仅第1列可见）──
    var rollBody=document.createElement('div');rollBody.id='fgi-roll-body';
    rollBody.style.cssText='display:grid;grid-template-columns:1fr;gap:10px';
    var colEls=[];

function printQuickOut(id){
  var fgoutsDB=DB.fgouts||[];
  var r=fgoutsDB.find(function(x){return x.id===id;});
  if(!r)return alert('找不到记录');
  var pcs=r.pcsData||[];
  var totKG=pcs.reduce(function(s,p){return s+(parseFloat(p.kg)||0);},0);
  var rawNoQ=(r.no||'').replace(/^[A-Z]*/,'');
  var noClean=rawNoQ.length>8?rawNoQ.slice(-8):rawNoQ.padStart(8,'0');
  var specStr=[r.width,r.gsm?r.gsm+'g/m²':''].filter(Boolean).join('×')||'—';
  var hasMeter=pcs.some(function(p){return p.meter;});

  // 疋明细行（三列布局，跟正式送货单一样）
  var colSize=Math.ceil(pcs.length/3);
  function buildPcsCol(startIdx,count){
    var rows='';
    for(var i=startIdx;i<startIdx+count&&i<pcs.length;i++){
      var p=pcs[i];
      rows+='<tr>'
        +'<td style="border-bottom:1px solid #eee;padding:4px 6px;text-align:center;font-size:11px">'+(i+1)+'</td>'
        +'<td style="border-bottom:1px solid #eee;padding:4px 6px;text-align:center;font-size:11px;font-family:monospace">'+esc(p.piNo||'')+'</td>'
        +'<td style="border-bottom:1px solid #eee;padding:4px 6px;text-align:center;font-weight:700;font-size:11px">'+(parseFloat(p.kg||0)>0?parseFloat(p.kg).toFixed(1):'')+'</td>'
        +(hasMeter?'<td style="border-bottom:1px solid #eee;padding:4px 6px;text-align:center;font-size:11px">'+esc(p.meter||'')+'</td>':'')
        +'</tr>';
    }
    return rows;
  }

function fgOutNo(){
  return fgOutNoFromList(DB.fgouts||[]);
}

function fgOutNoFromList(list){
  var y=new Date().getFullYear(),max=0;
  (list||[]).forEach(function(r){if(r.no&&r.no.startsWith('DH'+y)){var n=parseInt(r.no.slice(6))||0;if(n>max)max=n;}});
  return 'DH'+y+String(max+1).padStart(4,'0');
}

function fgReturnNo(){
  var y=String(new Date().getFullYear());var max=0;
  (DB.fgreturns||[]).forEach(function(r){if(r.no&&r.no.startsWith('TH'+y)){var n=parseInt(r.no.slice(6))||0;if(n>max)max=n;}});
  return 'TH'+y+String(max+1).padStart(4,'0');
}

  var o=(DB.orders||[]).find(function(x){return x.id===out.ordId;})||{};
  var totKG=rolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  var totM=rolls.reduce(function(s,r){return s+(parseFloat(r.m)||0);},0);
  var hasKG=totKG>0, hasM=totM>0;
  if(!hasKG&&!hasM)hasKG=true; // 两者都空时仍打印 KG 列占位

  var fgOutGroups=[];

  var ret=(DB.fgreturns||[]).find(function(x){return x.id===retId;});
  if(!ret)return;
  var allRolls=fgRolls();
  var rolls=allRolls.filter(function(r){return (ret.rollIds||[]).indexOf(r.id)>=0;});
  var totKG=rolls.reduce(function(s,r){return s+(parseFloat(r.kg)||0);},0);
  var hasRolls=rolls.length>0;
  var rawNo=(ret.no||'').replace(/^[A-Z]*/,'');
  var shNo=rawNo.length>8?rawNo.slice(-8):rawNo.padStart(8,'0');

  // 找到原出货单的布类、颜色等信息
  var out=(DB.fgouts||[]).find(function(x){return x.id===ret.outId;})||{};
  var o=(DB.orders||[]).find(function(x){return x.id===ret.ordId;})||{};

  // 如果有实际退货疋料，取第一匹的颜色/缸号；否则从原出货单取
  var firstRoll=rolls.length?rolls[0]:null;

function openFGOutM(id){
  var ords=(DB.orders||[]).filter(function(o){return o.status!=='cancelled';}).sort(function(a,b){return (a.no||'')<(b.no||'')?1:-1;});
  var modal=buildModal('登记出货 — 勾选在库匹','mxl',function(body){
    var hdrDiv=document.createElement('div');hdrDiv.className='fg';
    var ordSel=mkSearchableSelect('fgo-ord',ords.map(function(o){return{v:o.id,l:o.no+' | '+shortName(o.custNm||'')+(o.fab?' | '+o.fab:'')+(o.colors&&o.colors.length?' ('+o.colors.length+'色)':'')};}),'','输入订单号/客户名搜索');
    hdrDiv.appendChild(fv('关联订单',ordSel));
    hdrDiv.appendChild(fv('出货日期',mkInput('fgo-date',new Date().toISOString().slice(0,10),'','date')));
    hdrDiv.appendChild(fv('客户送货单号',mkInput('fgo-dlv','','客户单号（可选）')));
    hdrDiv.appendChild(fv('约米数（可选）',mkInput('fgo-m','','如：约143米左右')));
    hdrDiv.appendChild(fv('附加费说明',mkInput('fgo-feeNm','','如：小缸费（无则留空）')));
    hdrDiv.appendChild(fv('附加金额（元）',mkInput('fgo-feeAmt','','如：300')));
    hdrDiv.appendChild(fvFull('备注',mkInput('fgo-rm','','')));
    body.appendChild(hdrDiv);

    // Roll selection area
    var rollSelDiv=document.createElement('div');rollSelDiv.id='fgo-roll-area';
    rollSelDiv.style.cssText='margin-top:12px;border-top:1px solid var(--bd);padding-top:10px';
    rollSelDiv.innerHTML='<div style="color:var(--t3);padding:20px;text-align:center">请先选择订单</div>';
    body.appendChild(rollSelDiv);

    ordSel.onchange=function(){
      var ordId=this.value;
      var rolls=fgRolls().filter(function(r){return r.ordId===ordId&&r.status==='in';});
      rollSelDiv.innerHTML='';
      if(!rolls.length){
        rollSelDiv.innerHTML='<div style="color:var(--t3);padding:20px;text-align:center">该订单暂无在库布匹</div>';
        return;
      }
      // Group by colorNm+vatNo
      var groups={};
      rolls.forEach(function(r){
        var k=r.colorNm+'|'+r.vatNo;
        if(!groups[k])groups[k]={colorNm:r.colorNm,vatNo:r.vatNo,rolls:[]};
        groups[k].rolls.push(r);
      });
      Object.keys(groups).forEach(function(k){
        var grp=groups[k];
        var grpDiv=document.createElement('div');grpDiv.style.cssText='margin-bottom:12px';
        var grpHdr=document.createElement('div');
        grpHdr.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--b3);border-radius:4px;margin-bottom:6px;font-weight:700;font-size:12px';
        grpHdr.innerHTML='<span style="color:var(--p)">'+esc(grp.colorNm)+'</span><span style="color:var(--t3)">缸：'+esc(grp.vatNo)+'</span><span style="color:var(--t3);margin-left:auto">'+grp.rolls.length+'匹在库</span>';
        // Select all checkbox
        var selAllLbl=document.createElement('label');selAllLbl.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:8px;font-size:11px;font-weight:400;color:var(--p)';
        var selAllCb=document.createElement('input');selAllCb.type='checkbox';
        selAllCb.onchange=function(){
          grpDiv.querySelectorAll('.fgo-roll-cb').forEach(function(cb){cb.checked=selAllCb.checked;});
          updateFGOutStats();
        };
        selAllLbl.appendChild(selAllCb);selAllLbl.appendChild(document.createTextNode('全选'));
        grpHdr.appendChild(selAllLbl);
        grpDiv.appendChild(grpHdr);

        // Roll checkboxes grid
        var grid=document.createElement('div');
        grid.style.cssText='display:flex;flex-wrap:wrap;gap:5px;padding:0 4px';
        grp.rolls.forEach(function(r){
          var lbl=document.createElement('label');
          lbl.style.cssText='display:flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:11px;background:#fff;white-space:nowrap';
          var cb=document.createElement('input');cb.type='checkbox';cb.className='fgo-roll-cb';cb.value=r.id;
          cb.onchange=updateFGOutStats;
          lbl.appendChild(cb);
          lbl.appendChild(document.createTextNode('疋'+esc(r.rollNo)+' '+esc(r.kg)+'KG'));
          grid.appendChild(lbl);
        });
        grpDiv.appendChild(grid);rollSelDiv.appendChild(grpDiv);
      });

      // Stats
      var stats=document.createElement('div');stats.id='fgo-stats';
      stats.style.cssText='margin-top:8px;padding:6px 10px;background:var(--b3);border-radius:4px;font-size:11px;color:var(--t3)';
      stats.textContent='已选 0 匹，合计 0.0 KG';
      rollSelDiv.appendChild(stats);
    };

    function updateFGOutStats(){
      var cbs=document.querySelectorAll('.fgo-roll-cb:checked');
      var tot=0;
      var allRolls=fgRolls();
      cbs.forEach(function(cb){
        var r=allRolls.find(function(x){return x.id===cb.value;});
        if(r)tot+=(parseFloat(r.kg)||0);
      });
      var stats=document.getElementById('fgo-stats');
      if(stats){stats.textContent='已选 '+cbs.length+' 匹，合计 '+tot.toFixed(1)+' KG';stats.style.color=cbs.length?'var(--p)':'var(--t3)';}
    }
    window._updateFGOutStats=updateFGOutStats;

  },function(){
    var ordId=(document.getElementById('fgo-ord')||{value:''}).value;
    var o=ords.find(function(x){return x.id===ordId;});
    if(!ordId||!o)return alert('请选择订单');
    var selCbs=document.querySelectorAll('.fgo-roll-cb:checked');
    if(!selCbs.length)return alert('请勾选要出货的疋');
    var date=(document.getElementById('fgo-date')||{value:''}).value;
    var dlvNo=(document.getElementById('fgo-dlv')||{value:''}).value;
    var approxM=(document.getElementById('fgo-m')||{value:''}).value;
    var feeNm=(document.getElementById('fgo-feeNm')||{value:''}).value;
    var feeAmt=(document.getElementById('fgo-feeAmt')||{value:''}).value;
    var rm=(document.getElementById('fgo-rm')||{value:''}).value;
    var allRolls=fgRolls();
    var fgoGroupsByKey=[];
    selCbs.forEach(function(cb){
      var r=allRolls.find(function(x){return x.id===cb.value;});
      if(!r)return;
      var k=(r.colorNm||'')+'|'+(r.vatNo||'');
      var g=fgoGroupsByKey.find(function(x){return x.key===k;});
      if(!g){
        g={key:k,colorNm:r.colorNm||'',vatNo:r.vatNo||'',rolls:[]};
        fgoGroupsByKey.push(g);
      }
      g.rolls.push(r);
    });
    if(!fgoGroupsByKey.length)return alert('未找到可出货的疋');

function calcGFTotal(){
  var kgs=document.querySelectorAll('.gf-kg');
  var prs=document.querySelectorAll('.gf-pr');
  var totalKg=0,totalAmt=0;
  kgs.forEach(function(inp,i){
    var kg=parseFloat(inp.value)||0;
    var pr=parseFloat((prs[i]||{value:''}).value)||0;
    var amt=kg*pr;
    totalKg+=kg;totalAmt+=amt;
    var amtEl=document.getElementById('gf-amt-'+i);
    if(amtEl)amtEl.textContent=amt>0?'¥'+amt.toFixed(2):'—';
  });
  var tkg=document.getElementById('gf-total-kg');if(tkg)tkg.textContent=totalKg.toFixed(1)+' KG';
  var tamt=document.getElementById('gf-total-amt');if(tamt)tamt.textContent='¥'+totalAmt.toFixed(2);
}

    DB.save('ret',[{id:'tret-005',outId:'tout-005',reason:'质量问题',status:'pending'}]);

    if(r5&&r5.status==='return_pending'&&r5.retId==='tret-005')

  }catch(e){results.push({name:'退货标记后布卷状态正确',pass:false,detail:e.message});}
  // Test 6

  }catch(e){results.push({name:'应收对账记录可保存',pass:false,detail:e.message});}
  // Test 7

  // 显示结果
  var passed=results.filter(function(r){return r.pass;}).length;

  results.forEach(function(r){

      +'</tr>';
  });
  html+='</table>';
  document.getElementById('test-results').innerHTML=html;
  if(btn){btn.disabled=false;btn.textContent='▶ 重新运行 7 项回归测试';}
}
